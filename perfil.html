<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mi Perfil Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 20px 24px; }
  .header-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .header-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-editar{ background:rgba(255,255,255,0.08); color:white; border:none; padding:8px 14px; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; }
  .perfil-hero{ display:flex; align-items:center; gap:14px; }
  .perfil-avatar{ width:64px; height:64px; border-radius:20px; background:var(--naranja); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:800; color:#000; flex-shrink:0; }
  .perfil-info{ flex:1; }
  .perfil-nombre{ font-size:1.2rem; font-weight:800; color:white; }
  .perfil-empresa{ font-size:0.82rem; color:var(--naranja); margin-top:2px; font-weight:600; }
  .perfil-ciudad{ font-size:0.76rem; color:#555; margin-top:4px; }
  .stats-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:16px 20px; }
  .stat-card{ background:#111; border-radius:16px; padding:14px 10px; text-align:center; border:1px solid #1e1e1e; }
  .stat-val{ font-size:1.3rem; font-weight:800; color:white; }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-lbl{ font-size:0.6rem; color:#555; font-weight:600; margin-top:3px; text-transform:uppercase; }
  .section-card{ margin:0 20px 12px; background:#111; border-radius:18px; overflow:hidden; border:1px solid #1e1e1e; }
  .section-title{ font-size:0.7rem; font-weight:700; color:#444; text-transform:uppercase; letter-spacing:1px; padding:14px 16px 8px; }
  .menu-item{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #161616; cursor:pointer; transition:0.15s; }
  .menu-item:last-child{ border-bottom:none; }
  .menu-item:active{ background:#161616; }
  .menu-icon{ width:36px; height:36px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .menu-icon svg{ width:18px; height:18px; fill:none; stroke-width:2; }
  .menu-label{ flex:1; font-size:0.88rem; font-weight:600; color:#aaa; }
  .menu-arrow{ width:16px; height:16px; stroke:#333; fill:none; stroke-width:2.5; }
  .menu-item.danger .menu-label{ color:var(--rojo); }
  .menu-item.danger .menu-icon{ background:rgba(255,77,77,0.1); }
  .menu-item.danger .menu-icon svg{ stroke:var(--rojo); }
  .edit-modal{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:flex-end; z-index:500; }
  .edit-modal.show{ display:flex; }
  .edit-sheet{ background:#111; width:100%; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); max-height:85vh; overflow-y:auto; border:1px solid #1e1e1e; border-bottom:none; }
  .edit-modal.show .edit-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
  .edit-title{ font-size:1rem; font-weight:700; color:white; margin-bottom:18px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; outline:none; -webkit-appearance:none; }
  .field input:focus,.field textarea:focus{ border-color:var(--naranja); }
  .field textarea{ height:70px; resize:none; line-height:1.5; }
  .btn-guardar{ width:100%; padding:14px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="header-title">Mi Perfil</div>
    <button class="btn-editar" onclick="abrirEdit()">Editar</button>
  </div>
  <div class="perfil-hero">
    <div class="perfil-avatar" id="p-avatar">P</div>
    <div class="perfil-info">
      <div class="perfil-nombre" id="p-nombre">Cargando...</div>
      <div class="perfil-empresa" id="p-empresa">—</div>
      <div class="perfil-ciudad" id="p-ciudad">—</div>
    </div>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card"><div class="stat-val" id="st-prods">—</div><div class="stat-lbl">Productos</div></div>
  <div class="stat-card"><div class="stat-val naranja" id="st-ventas">—</div><div class="stat-lbl">Ventas</div></div>
  <div class="stat-card"><div class="stat-val" id="st-chats">—</div><div class="stat-lbl">Chats</div></div>
</div>

<div class="section-card">
  <div class="section-title">Gestión</div>
  <div class="menu-item" onclick="window.location.href='productos.html'"><div class="menu-icon" style="background:rgba(255,140,0,0.1)"><svg style="stroke:var(--naranja)" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><div class="menu-label">Mis productos</div><svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="menu-item" onclick="window.location.href='pedidos.html'"><div class="menu-icon" style="background:rgba(0,122,255,0.1)"><svg style="stroke:#007AFF" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div><div class="menu-label">Mis pedidos</div><svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="menu-item" onclick="window.location.href='plugins.html'"><div class="menu-icon" style="background:rgba(175,82,222,0.1)"><svg style="stroke:#AF52DE" viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg></div><div class="menu-label">Mis plugins</div><svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>

<div class="section-card">
  <div class="menu-item danger" onclick="cerrarSesion()"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><div class="menu-label">Cerrar sesión</div></div>
</div>

<div class="edit-modal" id="edit-modal" onclick="cerrarEdit(event)">
  <div class="edit-sheet">
    <div class="drag"></div>
    <div class="edit-title">Editar perfil</div>
    <div class="field"><label>Nombre del responsable</label><input type="text" id="e-nombre"></div>
    <div class="field"><label>Nombre de la empresa</label><input type="text" id="e-empresa"></div>
    <div class="field"><label>Ciudad</label><input type="text" id="e-ciudad"></div>
    <div class="field"><label>RUC</label><input type="text" id="e-ruc"></div>
    <div class="field"><label>Descripción de la empresa</label><textarea id="e-desc" placeholder="Cuéntanos sobre tu empresa..."></textarea></div>
    <button class="btn-guardar" onclick="guardarPerfil()">GUARDAR CAMBIOS</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab" href="tips.html"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Tips</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab active" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='';

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  const { data:u } = await sb.from('usuarios').select('*').eq('id',userId).single();
  if(u){
    const nombre=u.nombre||'Proveedor';
    const empresa=u.empresa||'—';
    document.getElementById('p-avatar').textContent=empresa[0].toUpperCase();
    document.getElementById('p-nombre').textContent=nombre;
    document.getElementById('p-empresa').textContent=empresa;
    document.getElementById('p-ciudad').textContent=(u.ciudad||'—')+' · RUC: '+(u.ruc||'—');
    document.getElementById('e-nombre').value=nombre;
    document.getElementById('e-empresa').value=empresa;
    document.getElementById('e-ciudad').value=u.ciudad||'';
    document.getElementById('e-ruc').value=u.ruc||'';
    document.getElementById('e-desc').value=u.descripcion||'';
  }
  const { count:prods } = await sb.from('productos').select('*',{count:'exact',head:true}).eq('proveedor_id',userId);
  const { data:pedidos } = await sb.from('pedidos').select('total,items');
  const { count:chats } = await sb.from('chats').select('*',{count:'exact',head:true}).eq('proveedor_id',userId);
  document.getElementById('st-prods').textContent=prods||0;
  document.getElementById('st-ventas').textContent='$'+((pedidos||[]).reduce((s,p)=>s+(p.total||0),0)).toFixed(0);
  document.getElementById('st-chats').textContent=chats||0;
})();

window.abrirEdit=()=>document.getElementById('edit-modal').classList.add('show');
window.cerrarEdit=e=>{ if(e.target===document.getElementById('edit-modal')) document.getElementById('edit-modal').classList.remove('show'); };

window.guardarPerfil=async function(){
  const nombre=document.getElementById('e-nombre').value.trim();
  const empresa=document.getElementById('e-empresa').value.trim();
  const ciudad=document.getElementById('e-ciudad').value.trim();
  const ruc=document.getElementById('e-ruc').value.trim();
  const descripcion=document.getElementById('e-desc').value.trim();
  await sb.from('usuarios').update({nombre,empresa,ciudad,ruc,descripcion}).eq('id',userId);
  document.getElementById('p-nombre').textContent=nombre;
  document.getElementById('p-empresa').textContent=empresa;
  document.getElementById('p-avatar').textContent=empresa[0].toUpperCase();
  document.getElementById('p-ciudad').textContent=ciudad+' · RUC: '+ruc;
  document.getElementById('edit-modal').classList.remove('show');
};

window.cerrarSesion=async function(){ await sb.auth.signOut(); window.location.href='login.html'; };
</script>
</body>
</html>
