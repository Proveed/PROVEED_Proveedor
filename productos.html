<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Mis Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --negro:#0A0A0A; --blanco:#F8F8F5; --gris:#F0F1EE; --verde:#32CD32; --rojo:#FF4D4D; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:90px; }

  /* HEADER */
  .header{ background:var(--negro); color:var(--blanco); padding:48px 20px 20px; border-radius:0 0 28px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:38px; height:38px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:800; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:12px 18px; border-radius:14px; font-weight:700; font-size:0.88rem; cursor:pointer; font-family:'DM Sans',sans-serif; }

  /* TABS */
  .tabs{ display:flex; gap:8px; padding:16px 20px 8px; }
  .vtab{ padding:9px 18px; border-radius:20px; font-size:0.82rem; font-weight:600; cursor:pointer; border:1.5px solid #e0e0e0; background:white; color:#777; }
  .vtab.active{ background:var(--negro); color:white; border-color:var(--negro); }

  /* LISTA */
  .prod-lista{ padding:8px 20px; }
  .prod-row{ background:white; border-radius:18px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .prod-thumb{ width:64px; height:64px; border-radius:14px; background:#f5f5f5; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .prod-thumb img{ width:100%; height:100%; object-fit:cover; }
  .prod-data{ flex:1; min-width:0; }
  .prod-nombre{ font-weight:700; font-size:0.92rem; color:var(--negro); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prod-cat{ font-size:0.72rem; color:#aaa; margin-bottom:6px; }
  .prod-stats{ display:flex; gap:10px; font-size:0.78rem; }
  .stat-price{ color:var(--naranja); font-weight:700; }
  .stat-stock{ color:#aaa; }
  .prod-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .act-btn{ border:none; border-radius:10px; padding:6px 12px; font-size:0.72rem; font-weight:700; cursor:pointer; }
  .act-edit{ background:#f0f0f0; color:var(--negro); }
  .act-on{ background:rgba(50,205,50,0.12); color:var(--verde); }
  .act-off{ background:rgba(255,77,77,0.1); color:var(--rojo); }

  /* MODAL ESTILO */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; z-index:500; align-items:flex-end; justify-content:center; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:white; width:100%; max-width:600px; max-height:90vh; border-radius:28px 28px 0 0; padding:20px; overflow-y:auto; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .modal-titulo{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }

  /* FOTOS GRID */
  .fotos-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
  .foto-slot{ aspect-ratio:1; border:2px dashed #e0e0e0; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:#fafafa; }
  .foto-slot img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .foto-slot input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .foto-slot span{ font-size:0.6rem; color:#ccc; margin-top:4px; }
  .foto-slot svg{ width:20px; height:20px; stroke:#ccc; fill:none; stroke-width:2; }

  /* FORM FIELDS */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.72rem; font-weight:600; color:#aaa; text-transform:uppercase; margin-bottom:6px; }
  .field input, .field select, .field textarea{ width:100%; padding:13px 15px; background:#f8f8f8; border:1.5px solid #eee; border-radius:14px; font-family:inherit; font-size:0.95rem; outline:none; }
  .field input:focus{ border-color:var(--naranja); background:white; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-pub{ width:100%; padding:17px; background:var(--naranja); color:#000; border:none; border-radius:16px; font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; margin-top:10px; }
  .btn-pub:disabled{ opacity:0.6; }

  /* TAB BAR */
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:23px; height:23px; stroke:currentColor; fill:none; stroke-width:2; }
  .tab span{ font-size:0.62rem; font-weight:700; text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <div class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div class="page-title">Mis Productos</div>
  </div>
  <button class="btn-nuevo" onclick="abrirForm()">+ Nuevo</button>
</div>

<div class="tabs">
  <div class="vtab active" onclick="cambiarFiltro('activos', this)">Activos</div>
  <div class="vtab" onclick="cambiarFiltro('pausados', this)">Pausados</div>
</div>

<div class="prod-lista" id="prod-lista">
  <p style="text-align:center; padding:40px; color:#aaa;">Cargando catálogo...</p>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarForm(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-titulo" id="form-titulo">Nuevo Producto</span>
      <div onclick="cerrarFormDirecto()" style="cursor:pointer; color:#aaa;">✕</div>
    </div>
    
    <div class="fotos-grid">
      <script>
        for(let i=0; i<6; i++) {
          document.write(`
            <div class="foto-slot" id="slot-${i}">
              <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span>Foto ${i+1}</span>
              <input type="file" accept="image/*" onchange="previewFoto(this, ${i})">
            </div>
          `);
        }
      </script>
    </div>

    <div class="field">
      <label>Nombre del producto *</label>
      <input type="text" id="f-nombre" placeholder="Nombre descriptivo">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Categoría *</label>
        <select id="f-cat">
          <option value="Textiles">Textiles</option>
          <option value="Tecnología">Tecnología</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Otros">Otros</option>
        </select>
      </div>
      <div class="field">
        <label>Unidad</label>
        <input type="text" id="f-unidad" placeholder="unidad, metro, kg">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Precio Unitario ($) *</label>
        <input type="number" id="f-precio" step="0.01">
      </div>
      <div class="field">
        <label>Stock Inicial</label>
        <input type="number" id="f-stock" value="0">
      </div>
    </div>
    <button class="btn-pub" id="btn-pub" onclick="publicar()">PUBLICAR AHORA</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Panel</span></a>
  <a class="tab active" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7M5 19a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM18 19a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a class="tab" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://pqoqirousggkjnkzxkhy.supabase.co'
const supabaseKey = 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I'
const supabase = createClient(supabaseUrl, supabaseKey)

let currentUid = null;
let empresaNombre = '';
let filtro = 'activos';
let fotosAsubir = [null,null,null,null,null,null];
let editandoId = null;

async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUid = session.user.id;
  
  const { data: user } = await supabase.from('usuarios').select('empresa, nombre').eq('id', currentUid).single();
  empresaNombre = user?.empresa || user?.nombre || 'Proveedor';
  
  cargarProductos();
}

async function cargarProductos() {
  const lista = document.getElementById('prod-lista');
  const esActivo = (filtro === 'activos');
  
  const { data: prods, error } = await supabase
    .from('productos')
    .select('*')
    .eq('proveedorId', currentUid)
    .eq('activo', esActivo)
    .order('creadoEn', { ascending: false });

  if (!prods || prods.length === 0) {
    lista.innerHTML = `<p style="text-align:center; padding:40px; color:#aaa;">No hay productos ${filtro}.</p>`;
    return;
  }

  lista.innerHTML = prods.map(p => `
    <div class="prod-row">
      <div class="prod-thumb">
        ${p.imagen ? `<img src="${p.imagen}">` : '📦'}
      </div>
      <div class="prod-data">
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-cat">${p.categoria} · ${p.unidad || 'ud'}</div>
        <div class="prod-stats">
          <span class="stat-price">$${Number(p.precio).toFixed(2)}</span>
          <span class="stat-stock">Stock: ${p.stock}</span>
        </div>
      </div>
      <div class="prod-actions">
        <button class="act-btn act-edit" onclick="editarProducto('${p.id}')">Editar</button>
        <button class="act-btn ${p.activo?'act-on':'act-off'}" onclick="toggleStatus('${p.id}', ${p.activo})">
          ${p.activo ? 'Activo' : 'Pausado'}
        </button>
      </div>
    </div>
  `).join('');
}

window.cambiarFiltro = (f, el) => {
  filtro = f;
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  cargarProductos();
}

window.previewFoto = (input, idx) => {
  const file = input.files[0];
  if(!file) return;
  fotosAsubir[idx] = file;
  const slot = document.getElementById(`slot-${idx}`);
  slot.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
}

window.abrirForm = () => {
  editandoId = null;
  document.getElementById('form-titulo').textContent = 'Nuevo Producto';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-precio').value = '';
  document.getElementById('f-stock').value = '0';
  document.getElementById('modal-overlay').classList.add('show');
}

window.cerrarFormDirecto = () => {
  document.getElementById('modal-overlay').classList.remove('show');
}

window.toggleStatus = async (id, actual) => {
  await supabase.from('productos').update({ activo: !actual }).eq('id', id);
  cargarProductos();
}

window.publicar = async () => {
  const btn = document.getElementById('btn-pub');
  const nombre = document.getElementById('f-nombre').value;
  const precio = document.getElementById('f-precio').value;
  
  if(!nombre || !precio) { alert("Completa los campos obligatorios"); return; }
  
  btn.disabled = true;
  btn.textContent = "Subiendo...";

  try {
    let urls = [];
    // Subida de imágenes al Storage de Supabase
    for (let file of fotosAsubir) {
      if (file) {
        const path = `productos/${currentUid}/${Date.now()}_${file.name}`;
        const { data } = await supabase.storage.from('fotos_productos').upload(path, file);
        if (data) {
          const { data: urlData } = supabase.storage.from('fotos_productos').getPublicUrl(path);
          urls.push(urlData.publicUrl);
        }
      }
    }

    const payload = {
      nombre,
      categoria: document.getElementById('f-cat').value,
      unidad: document.getElementById('f-unidad').value,
      precio: parseFloat(precio),
      stock: parseInt(document.getElementById('f-stock').value),
      proveedorId: currentUid,
      nombreProveedor: empresaNombre,
      imagen: urls[0] || null,
      imagenes: urls,
      activo: true
    };

    const { error } = await supabase.from('productos').insert(payload);
    if(error) throw error;

    cerrarFormDirecto();
    cargarProductos();
    alert("¡Producto publicado!");

  } catch (e) {
    alert("Error al publicar: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "PUBLICAR AHORA";
  }
}

checkAuth();
</script>
</body>
</html>
