<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Mis Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --negro:#0A0A0A; --blanco:#F8F8F5; --gris:#F0F1EE; --verde:#32CD32; --rojo:#FF4D4D; }
  html{ font-size:16px; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }

  /* HEADER */
  .header{ background:var(--negro); color:var(--blanco); padding:48px 20px 20px; border-radius:0 0 28px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:38px; height:38px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:800; letter-spacing:-0.3px; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:12px 18px; border-radius:14px; font-weight:700; font-size:0.88rem; cursor:pointer; font-family:'DM Sans',sans-serif; letter-spacing:0.2px; white-space:nowrap; }

  /* TABS */
  .tabs{ display:flex; gap:8px; padding:16px 20px 8px; }
  .vtab{ padding:9px 18px; border-radius:20px; font-size:0.82rem; font-weight:600; cursor:pointer; transition:0.2s; border:1.5px solid #e0e0e0; background:white; color:#777; font-family:'DM Sans',sans-serif; }
  .vtab.active{ background:var(--negro); color:white; border-color:var(--negro); }

  /* LISTA */
  .prod-lista{ padding:8px 20px; }
  .prod-row{ background:white; border-radius:18px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .prod-thumb{ width:64px; height:64px; border-radius:14px; background:#f5f5f5; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .prod-thumb img{ width:100%; height:100%; object-fit:cover; }
  .prod-thumb svg{ width:28px; height:28px; stroke:#ddd; fill:none; stroke-width:1.5; }
  .prod-data{ flex:1; min-width:0; }
  .prod-nombre{ font-weight:700; font-size:0.92rem; color:var(--negro); line-height:1.3; margin-bottom:2px; }
  .prod-cat{ font-size:0.72rem; color:#aaa; margin-bottom:6px; }
  .prod-stats{ display:flex; gap:10px; flex-wrap:wrap; }
  .stat-price{ color:var(--naranja); font-weight:700; font-size:0.78rem; }
  .stat-stock{ color:#aaa; font-size:0.72rem; }
  .prod-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
  .act-btn{ border:none; border-radius:10px; padding:6px 12px; font-size:0.72rem; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; }
  .act-edit{ background:#f0f0f0; color:var(--negro); }
  .act-on{ background:rgba(50,205,50,0.12); color:var(--verde); }
  .act-off{ background:rgba(255,77,77,0.1); color:var(--rojo); }

  .empty{ text-align:center; padding:50px 20px; color:#bbb; }
  .empty svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty p{ font-size:0.88rem; }

  /* MODAL */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:none; z-index:500;
    align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{
    background:white; width:100%;
    max-width:600px;
    max-height:88vh;
    border-radius:28px 28px 0 0;
    padding:0;
    transform:translateY(100%);
    transition:0.4s cubic-bezier(0.16,1,0.3,1);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }

  /* DRAG HANDLE */
  .drag-handle{ width:40px; height:4px; background:#e0e0e0; border-radius:4px; margin:14px auto 0; flex-shrink:0; }

  /* MODAL HEADER */
  .modal-header{
    padding:16px 20px 14px; display:flex; justify-content:space-between;
    align-items:center; border-bottom:1px solid #f5f5f5; flex-shrink:0;
  }
  .modal-titulo{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; color:var(--negro); }
  .close-btn{ width:32px; height:32px; background:#f5f5f5; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .close-btn svg{ width:16px; height:16px; stroke:#666; fill:none; stroke-width:2.5; }

  /* MODAL CONTENT - SCROLLABLE */
  .modal-content{ overflow-y:auto; padding:16px 20px 32px; flex:1; -webkit-overflow-scrolling:touch; }

  /* FOTOS GRID */
  .fotos-label{ font-size:0.72rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; display:block; }
  .fotos-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
  .foto-slot{
    aspect-ratio:1; border:2px dashed #e0e0e0; border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:0.2s; background:#fafafa; position:relative; overflow:hidden;
  }
  .foto-slot:hover{ border-color:var(--naranja); background:#fff8f0; }
  .foto-slot.tiene-foto{ border-color:var(--naranja); border-style:solid; }
  .foto-slot img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:12px; }
  .foto-slot input{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .foto-slot svg{ width:22px; height:22px; stroke:#ccc; fill:none; stroke-width:2; }
  .foto-slot span{ font-size:0.6rem; color:#ccc; margin-top:4px; }
  .foto-del{ position:absolute; top:4px; right:4px; width:20px; height:20px; background:rgba(255,77,77,0.9); border-radius:50%; display:none; align-items:center; justify-content:center; z-index:2; cursor:pointer; border:none; }
  .foto-slot.tiene-foto .foto-del{ display:flex; }
  .foto-del svg{ width:10px; height:10px; stroke:white; fill:none; stroke-width:3; }

  /* FIELDS */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.72rem; font-weight:600; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field select,.field textarea{
    width:100%; padding:13px 15px; background:#f8f8f8; border:1.5px solid #eee;
    border-radius:14px; outline:none; font-family:'DM Sans',sans-serif;
    font-size:0.95rem; color:var(--negro); transition:border-color 0.2s;
    -webkit-appearance:none; appearance:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{ border-color:var(--naranja); background:white; }
  .field textarea{ resize:none; height:75px; line-height:1.5; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  /* BTN PUBLICAR */
  .btn-pub{
    width:100%; padding:17px; background:var(--naranja); color:#000;
    border:none; border-radius:16px;
    font-family:'Syne',sans-serif; font-size:1rem; font-weight:800;
    cursor:pointer; margin-top:10px; transition:0.2s; letter-spacing:0.3px;
  }
  .btn-pub:active{ transform:scale(0.98); }
  .btn-pub:disabled{ opacity:0.5; cursor:not-allowed; }

  /* TAB BAR */
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:23px; height:23px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

const app=initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let currentUser=null, empresaData={}, filtroActual='activos', editandoId=null;
let fotosFiles=[null,null,null,null,null,null];
let fotosURLs=['','','','','',''];

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='login.html';return;}
  currentUser=user;
  const snap=await getDoc(doc(db,'usuarios',user.uid));
  if(snap.exists()) empresaData=snap.data();
  cargarProductos();
});

async function cargarProductos(){
  const lista=document.getElementById('prod-lista');
  lista.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><p>Cargando...</p></div>';
  try{
    // Sin orderBy para evitar error de índice
    const q=query(collection(db,'productos'),where('proveedorId','==',currentUser.uid));
    const snap=await getDocs(q);
    let prods=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Ordenar en cliente
    prods.sort((a,b)=>{
      const ta=a.creadoEn?.toMillis?.()||0;
      const tb=b.creadoEn?.toMillis?.()||0;
      return tb-ta;
    });
    if(filtroActual==='activos') prods=prods.filter(p=>p.activo);
    if(filtroActual==='inactivos') prods=prods.filter(p=>!p.activo);
    if(!prods.length){
      lista.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><p>${filtroActual==='activos'?'Sin productos activos':'Sin productos'}. Pulsa "+ Nuevo"</p></div>`;
      return;
    }
    lista.innerHTML='';
    prods.forEach(p=>{
      const div=document.createElement('div');
      div.className='prod-row';
      const img=p.imagen||p.imagenes?.[0]||'';
      div.innerHTML=`
        <div class="prod-thumb">
          ${img?`<img src="${img}" alt="${p.nombre}">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
        </div>
        <div class="prod-data">
          <div class="prod-nombre">${p.nombre||'Producto'}</div>
          <div class="prod-cat">${p.categoria||''} · ${p.unidad||'unidad'}</div>
          <div class="prod-stats">
            <span class="stat-price">$${Number(p.precio||0).toFixed(2)}</span>
            <span class="stat-stock">Stock: ${p.stock||0}</span>
            <span class="stat-stock">Mín: ${p.minimo||1}</span>
          </div>
        </div>
        <div class="prod-actions">
          <button class="act-btn act-edit" onclick="editarProducto('${p.id}')">Editar</button>
          <button class="act-btn ${p.activo?'act-on':'act-off'}" onclick="toggleActivo('${p.id}',${!!p.activo})">${p.activo?'Activo':'Pausado'}</button>
        </div>`;
      lista.appendChild(div);
    });
  }catch(e){
    lista.innerHTML=`<div class="empty"><p>Error: ${e.message}</p></div>`;
  }
}

window.filtrar=function(f,el){
  filtroActual=f;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  cargarProductos();
};

// FOTOS
window.previewFoto=function(input,idx){
  const file=input.files[0];
  if(!file) return;
  fotosFiles[idx]=file;
  const url=URL.createObjectURL(file);
  const slot=document.getElementById('slot-'+idx);
  let img=slot.querySelector('img');
  if(!img){img=document.createElement('img');slot.appendChild(img);}
  img.src=url;
  slot.classList.add('tiene-foto');
  slot.querySelector('svg').style.display='none';
  slot.querySelector('span').style.display='none';
};

window.borrarFoto=function(e,idx){
  e.stopPropagation();
  e.preventDefault();
  fotosFiles[idx]=null;
  fotosURLs[idx]='';
  const slot=document.getElementById('slot-'+idx);
  const img=slot.querySelector('img');
  if(img) img.remove();
  slot.classList.remove('tiene-foto');
  slot.querySelector('svg').style.display='block';
  slot.querySelector('span').style.display='block';
  slot.querySelector('input').value='';
};

window.abrirForm=function(){
  editandoId=null;
  document.getElementById('form-titulo').textContent='Nuevo Producto';
  document.getElementById('btn-pub').textContent='PUBLICAR EN PROVEED';
  ['f-nombre','f-desc','f-precio','f-minimo','f-stock'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='';
  document.getElementById('f-unidad').value='unidad';
  // Limpiar fotos
  fotosFiles=[null,null,null,null,null,null];
  fotosURLs=['','','','','',''];
  for(let i=0;i<6;i++){
    const slot=document.getElementById('slot-'+i);
    const img=slot.querySelector('img');
    if(img) img.remove();
    slot.classList.remove('tiene-foto');
    slot.querySelector('svg').style.display='block';
    slot.querySelector('span').style.display='block';
    slot.querySelector('input').value='';
  }
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-content') || document.querySelector('.modal-content').scrollTo(0,0);
};

window.cerrarForm=function(e){
  if(e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('show');
};
window.cerrarFormDirecto=function(){
  document.getElementById('modal-overlay').classList.remove('show');
};

window.editarProducto=async function(id){
  editandoId=id;
  const snap=await getDoc(doc(db,'productos',id));
  const p=snap.data();
  document.getElementById('f-nombre').value=p.nombre||'';
  document.getElementById('f-desc').value=p.descripcion||'';
  document.getElementById('f-cat').value=p.categoria||'';
  document.getElementById('f-precio').value=p.precio||'';
  document.getElementById('f-minimo').value=p.minimo||'';
  document.getElementById('f-stock').value=p.stock||'';
  document.getElementById('f-unidad').value=p.unidad||'unidad';
  document.getElementById('f-entrega').value=p.tiempoEntrega||'inmediato';
  document.getElementById('form-titulo').textContent='Editar Producto';
  document.getElementById('btn-pub').textContent='GUARDAR CAMBIOS';
  // Cargar fotos existentes
  fotosFiles=[null,null,null,null,null,null];
  const imgs=p.imagenes||[p.imagen||'','','','','',''];
  fotosURLs=[...imgs,'','','','','',''].slice(0,6);
  for(let i=0;i<6;i++){
    const slot=document.getElementById('slot-'+i);
    const imgEl=slot.querySelector('img');
    if(imgEl) imgEl.remove();
    slot.classList.remove('tiene-foto');
    slot.querySelector('svg').style.display='block';
    slot.querySelector('span').style.display='block';
    if(fotosURLs[i]){
      const img=document.createElement('img');
      img.src=fotosURLs[i];
      slot.appendChild(img);
      slot.classList.add('tiene-foto');
      slot.querySelector('svg').style.display='none';
      slot.querySelector('span').style.display='none';
    }
  }
  document.getElementById('modal-overlay').classList.add('show');
};

window.toggleActivo=async function(id,actual){
  await updateDoc(doc(db,'productos',id),{activo:!actual});
  cargarProductos();
};

window.publicar=async function(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const cat=document.getElementById('f-cat').value;
  const precio=parseFloat(document.getElementById('f-precio').value);
  const minimo=parseInt(document.getElementById('f-minimo').value);
  if(!nombre||!cat||!precio||!minimo){alert('Completa los campos obligatorios (*)');return;}
  const btn=document.getElementById('btn-pub');
  btn.disabled=true;
  btn.textContent='Subiendo...';
  try{
    // Subir fotos nuevas a Storage
    const urlsFinales=[];
    for(let i=0;i<6;i++){
      if(fotosFiles[i]){
        const storageRef=ref(storage,`productos/${currentUser.uid}/${Date.now()}_${i}`);
        await uploadBytes(storageRef,fotosFiles[i]);
        const url=await getDownloadURL(storageRef);
        urlsFinales.push(url);
      } else if(fotosURLs[i]){
        urlsFinales.push(fotosURLs[i]);
      }
    }
    const datos={
      nombre,
      descripcion:document.getElementById('f-desc').value.trim(),
      categoria:cat,
      precio,minimo,
      stock:parseInt(document.getElementById('f-stock').value)||0,
      unidad:document.getElementById('f-unidad').value,
      tiempoEntrega:document.getElementById('f-entrega').value,
      proveedorId:currentUser.uid,
      nombreProveedor:empresaData.empresa||empresaData.nombre||'Proveedor',
      imagen:urlsFinales[0]||'',
      imagenes:urlsFinales,
      activo:true
    };
    if(editandoId){
      await updateDoc(doc(db,'productos',editandoId),datos);
    } else {
      datos.creadoEn=serverTimestamp();
      await addDoc(collection(db,'productos'),datos);
    }
    document.getElementById('modal-overlay').classList.remove('show');
    cargarProductos();
  }catch(e){
    alert('Error: '+e.message);
    btn.disabled=false;
    btn.textContent=editandoId?'GUARDAR CAMBIOS':'PUBLICAR EN PROVEED';
  }
};
</script>
