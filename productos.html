<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mis Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:white; border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat-val{ font-size:1.3rem; font-weight:800; color:var(--negro); }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-lbl{ font-size:0.6rem; color:#bbb; font-weight:600; text-transform:uppercase; margin-top:3px; }
  .search-wrap{ margin:14px 16px 0; background:white; border-radius:13px; padding:11px 14px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .search-wrap input{ flex:1; background:transparent; border:none; outline:none; color:var(--negro); font-family:'Inter',sans-serif; font-size:0.9rem; }
  .search-wrap input::placeholder{ color:#bbb; }
  .search-wrap svg{ width:16px; height:16px; stroke:#bbb; fill:none; stroke-width:2.5; flex-shrink:0; }
  .tabs-row{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:7px 14px; border-radius:20px; border:1.5px solid #eee; background:white; font-size:0.76rem; font-weight:600; color:#aaa; cursor:pointer; white-space:nowrap; transition:0.2s; }
  .vtab.active{ background:var(--negro); color:white; border-color:var(--negro); }
  .prods-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 16px; }
  .prod-card{ background:white; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .prod-img{ width:100%; height:140px; background:#f5f5f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; }
  .prod-img svg{ width:36px; height:36px; stroke:#ddd; fill:none; stroke-width:1.5; }
  .prod-estado-badge{ position:absolute; top:8px; right:8px; font-size:0.6rem; font-weight:700; padding:3px 8px; border-radius:6px; }
  .est-activo{ background:rgba(168,230,61,0.9); color:#000; }
  .est-inactivo{ background:rgba(255,77,77,0.8); color:white; }
  .prod-body{ padding:10px 12px 12px; }
  .prod-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); line-height:1.3; margin-bottom:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .prod-cat{ font-size:0.65rem; color:#bbb; margin-bottom:6px; }
  .prod-precio{ font-size:0.92rem; font-weight:700; color:var(--naranja); }
  .prod-vistas{ font-size:0.62rem; color:#ccc; margin-top:2px; }
  .prod-actions{ display:flex; gap:6px; margin-top:8px; }
  .prod-btn{ flex:1; padding:7px; border-radius:9px; border:none; font-family:'Inter',sans-serif; font-size:0.7rem; font-weight:700; cursor:pointer; }
  .btn-edit{ background:var(--gris); color:var(--negro); }
  .btn-toggle-on{ background:rgba(255,77,77,0.08); color:var(--rojo); }
  .btn-toggle-off{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .empty{ grid-column:1/-1; text-align:center; padding:48px 20px; color:#bbb; }
  .empty svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }

  /* MODAL */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:white; width:100%; max-height:92vh; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag-handle{ width:36px; height:4px; background:#e0e0e0; border-radius:4px; margin:14px auto 0; flex-shrink:0; }
  .modal-header{ padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f5f5f5; flex-shrink:0; }
  .modal-title{ font-size:1rem; font-weight:700; color:var(--negro); }
  .close-btn{ width:30px; height:30px; background:#f5f5f5; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .close-btn svg{ width:14px; height:14px; stroke:#666; fill:none; stroke-width:2.5; }
  .modal-body{ overflow-y:auto; padding:16px 16px 32px; flex:1; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:var(--gris); border:1.5px solid #eee; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--negro); -webkit-appearance:none; }
  .field input:focus,.field textarea:focus{ border-color:var(--naranja); background:white; }
  .field textarea{ resize:none; height:80px; line-height:1.5; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .fotos-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .foto-slot{ aspect-ratio:1; border-radius:12px; border:2px dashed #e0e0e0; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:#fafafa; }
  .foto-slot img{ width:100%; height:100%; object-fit:cover; }
  .foto-slot svg{ width:24px; height:24px; stroke:#ccc; fill:none; stroke-width:1.5; }
  .foto-del{ position:absolute; top:4px; right:4px; width:22px; height:22px; background:rgba(255,77,77,0.9); border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .foto-del svg{ width:10px; height:10px; stroke:white; fill:none; stroke-width:3; }
  .foto-file{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .video-area{ border:2px dashed #e0e0e0; border-radius:14px; padding:20px; text-align:center; cursor:pointer; background:#fafafa; position:relative; transition:0.2s; }
  .video-area.filled{ border-color:var(--azul); background:#f0f7ff; }
  .video-area svg{ width:32px; height:32px; stroke:#ccc; fill:none; stroke-width:1.5; display:block; margin:0 auto 8px; }
  .video-area.filled svg{ stroke:var(--azul); }
  .video-area p{ font-size:0.8rem; color:#bbb; }
  .video-area.filled p{ color:var(--azul); }
  .video-file{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .btn-pub{ width:100%; padding:14px; background:var(--negro); color:white; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }
  .btn-pub:disabled{ opacity:0.5; cursor:not-allowed; }
  .upload-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; }
  .upload-overlay.show{ display:flex; }
  .upload-box{ background:white; border-radius:20px; padding:28px 24px; width:82%; max-width:300px; text-align:center; }
  .upload-box h3{ font-size:1rem; font-weight:700; margin-bottom:6px; color:var(--negro); }
  .upload-box p{ font-size:0.82rem; color:#aaa; margin-bottom:18px; }
  .upload-bar-track{ height:6px; background:#f0f0f0; border-radius:6px; overflow:hidden; }
  .upload-bar{ height:100%; background:var(--naranja); border-radius:6px; width:0%; transition:width 0.3s; }
  .upload-pct{ font-size:1.3rem; font-weight:800; color:var(--naranja); margin-top:10px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Mis Productos</div>
  </div>
  <button class="btn-nuevo" onclick="abrirModal()">+ Nuevo</button>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total</div></div>
  <div class="stat-box"><div class="stat-val naranja" id="st-activos">—</div><div class="stat-lbl">Activos</div></div>
  <div class="stat-box"><div class="stat-val" id="st-vistas">—</div><div class="stat-lbl">Vistas</div></div>
</div>

<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" placeholder="Buscar producto..." oninput="buscar(this.value)">
</div>

<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todos</div>
  <div class="vtab" onclick="filtrar('activos',this)">Activos</div>
  <div class="vtab" onclick="filtrar('inactivos',this)">Inactivos</div>
</div>

<div class="prods-grid" id="prods-grid">
  <div class="empty"><p>Cargando productos...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-titulo">Nuevo Producto</span>
      <button class="close-btn" onclick="cerrarModalDirecto()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Fotos del producto (máx. 6)</label>
        <div class="fotos-grid" id="fotos-grid">
          <div class="foto-slot" id="slot-0"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,0)"></div>
          <div class="foto-slot" id="slot-1"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,1)"></div>
          <div class="foto-slot" id="slot-2"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,2)"></div>
          <div class="foto-slot" id="slot-3"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,3)"></div>
          <div class="foto-slot" id="slot-4"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,4)"></div>
          <div class="foto-slot" id="slot-5"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,5)"></div>
        </div>
      </div>
      <div class="field"><label>Video del producto (máx. 100MB)</label>
        <div class="video-area" id="video-area">
          <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg>
          <p id="video-label">Toca para subir video</p>
          <input type="file" accept="video/*" class="video-file" onchange="cargarVideo(this)">
        </div>
      </div>
      <div class="field"><label>Nombre del producto *</label><input type="text" id="f-nombre" placeholder="Ej: Camiseta de algodón pima"></div>
      <div class="field"><label>Descripción</label><textarea id="f-desc" placeholder="Describe tu producto..."></textarea></div>
      <div class="field-row">
        <div class="field"><label>Categoría</label>
          <select id="f-cat">
            <option value="">Seleccionar</option>
            <option value="textiles">Textiles</option>
            <option value="tecnologia">Tecnología</option>
            <option value="alimentos">Alimentos</option>
            <option value="cosmeticos">Cosméticos</option>
            <option value="construccion">Construcción</option>
            <option value="maquinaria">Maquinaria</option>
            <option value="agricultura">Agricultura</option>
            <option value="automotriz">Automotriz</option>
            <option value="otros">Otros</option>
          </select>
        </div>
        <div class="field"><label>Unidad</label>
          <select id="f-unidad">
            <option value="unidad">Unidad</option>
            <option value="caja">Caja</option>
            <option value="docena">Docena</option>
            <option value="kg">Kilogramo</option>
            <option value="litro">Litro</option>
            <option value="metro">Metro</option>
            <option value="rollo">Rollo</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Precio unitario *</label><input type="number" id="f-precio" placeholder="0.00" min="0" step="0.01"></div>
        <div class="field"><label>Pedido mínimo</label><input type="number" id="f-minimo" placeholder="1" min="1"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Stock disponible</label><input type="number" id="f-stock" placeholder="0" min="0"></div>
        <div class="field"><label>Tiempo entrega</label><input type="text" id="f-entrega" placeholder="Ej: 2-3 días"></div>
      </div>
      <button class="btn-pub" id="btn-pub" onclick="publicarProducto()">PUBLICAR PRODUCTO</button>
    </div>
  </div>
</div>

<div class="upload-overlay" id="upload-overlay">
  <div class="upload-box">
    <h3 id="up-titulo">Subiendo imágenes</h3>
    <p id="up-desc">Por favor espera...</p>
    <div class="upload-bar-track"><div class="upload-bar" id="upload-bar"></div></div>
    <div class="upload-pct" id="upload-pct">0%</div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>

</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', userData={}, todosProds=[], filtroActual='todos', busquedaActual='';
let fotosFiles=[null,null,null,null,null,null], videoFile=null, editandoId=null;

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  const { data:u } = await sb.from('usuarios').select('*').eq('id',userId).single();
  if(u) userData=u;
  cargarProductos();
})();

async function cargarProductos(){
  const { data } = await sb.from('productos').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  todosProds=data||[];
  const activos=todosProds.filter(p=>p.activo);
  const vistas=todosProds.reduce((s,p)=>s+(p.vistas||0),0);
  document.getElementById('st-total').textContent=todosProds.length;
  document.getElementById('st-activos').textContent=activos.length;
  document.getElementById('st-vistas').textContent=vistas;
  renderGrid();
}

function renderGrid(){
  let lista=[...todosProds];
  if(filtroActual==='activos') lista=lista.filter(p=>p.activo);
  if(filtroActual==='inactivos') lista=lista.filter(p=>!p.activo);
  if(busquedaActual) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(busquedaActual));
  const grid=document.getElementById('prods-grid');
  if(!lista.length){ grid.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><p>Sin productos aún</p></div>'; return; }
  grid.innerHTML='';
  lista.forEach(p=>{
    const img=p.imagenes?.[0]||p.imagen||'';
    const activo=p.activo!==false;
    const div=document.createElement('div'); div.className='prod-card';
    div.innerHTML=`<div class="prod-img">${img?`<img src="${img}" alt="" loading="lazy">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}<div class="prod-estado-badge ${activo?'est-activo':'est-inactivo'}">${activo?'Activo':'Inactivo'}</div></div><div class="prod-body"><div class="prod-nombre">${p.nombre||'Producto'}</div><div class="prod-cat">${p.categoria||'Sin categoría'}</div><div class="prod-precio">$${Number(p.precio||0).toFixed(2)}</div><div class="prod-vistas">👁 ${p.vistas||0} vistas</div><div class="prod-actions"><button class="prod-btn btn-edit" onclick="editarProducto('${p.id}')">Editar</button><button class="prod-btn ${activo?'btn-toggle-on':'btn-toggle-off'}" onclick="toggleActivo('${p.id}',${activo})">${activo?'Pausar':'Activar'}</button></div></div>`;
    grid.appendChild(div);
  });
}

window.filtrar=(f,el)=>{ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderGrid(); };
window.buscar=v=>{ busquedaActual=v.toLowerCase(); renderGrid(); };

window.cargarFoto=function(input,idx){
  const file=input.files[0];
  if(!file) return;
  fotosFiles[idx]=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const slot=document.getElementById('slot-'+idx);
    slot.innerHTML=`<img src="${e.target.result}" alt=""><button class="foto-del" onclick="borrarFoto(${idx})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  };
  reader.readAsDataURL(file);
};

window.borrarFoto=function(idx){
  fotosFiles[idx]=null;
  const slot=document.getElementById('slot-'+idx);
  slot.innerHTML=`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" class="foto-file" onchange="cargarFoto(this,${idx})">`;
};

window.cargarVideo=function(input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>100*1024*1024){ alert('El video no puede pesar más de 100MB'); return; }
  videoFile=file;
  const area=document.getElementById('video-area');
  area.classList.add('filled');
  document.getElementById('video-label').textContent=file.name;
};

function setProgress(pct,titulo,desc){
  document.getElementById('upload-bar').style.width=pct+'%';
  document.getElementById('upload-pct').textContent=pct+'%';
  if(titulo) document.getElementById('up-titulo').textContent=titulo;
  if(desc) document.getElementById('up-desc').textContent=desc;
}

async function subirArchivo(file,path){
  const { data,error } = await sb.storage.from('proveed-media').upload(path,file,{upsert:true});
  if(error) throw error;
  const { data:url } = sb.storage.from('proveed-media').getPublicUrl(path);
  return url.publicUrl;
}

window.abrirModal=function(){
  editandoId=null; fotosFiles=[null,null,null,null,null,null]; videoFile=null;
  document.getElementById('modal-titulo').textContent='Nuevo Producto';
  document.getElementById('btn-pub').textContent='PUBLICAR PRODUCTO';
  ['nombre','desc','precio','minimo','stock','entrega'].forEach(f=>{ const el=document.getElementById('f-'+f); if(el) el.value=''; });
  document.getElementById('f-cat').value='';
  document.getElementById('f-unidad').value='unidad';
  for(let i=0;i<6;i++) borrarFoto(i);
  document.getElementById('video-area').classList.remove('filled');
  document.getElementById('video-label').textContent='Toca para subir video';
  document.getElementById('modal-overlay').classList.add('show');
};

window.editarProducto=function(id){
  const p=todosProds.find(p=>p.id===id);
  if(!p) return;
  editandoId=id; fotosFiles=[null,null,null,null,null,null]; videoFile=null;
  document.getElementById('modal-titulo').textContent='Editar Producto';
  document.getElementById('btn-pub').textContent='GUARDAR CAMBIOS';
  document.getElementById('f-nombre').value=p.nombre||'';
  document.getElementById('f-desc').value=p.descripcion||'';
  document.getElementById('f-precio').value=p.precio||'';
  document.getElementById('f-minimo').value=p.minimo||1;
  document.getElementById('f-stock').value=p.stock||0;
  document.getElementById('f-entrega').value=p.tiempo_entrega||'';
  document.getElementById('f-cat').value=p.categoria||'';
  document.getElementById('f-unidad').value=p.unidad||'unidad';
  const imgs=p.imagenes||[];
  imgs.forEach((url,i)=>{
    if(i<6){
      const slot=document.getElementById('slot-'+i);
      slot.innerHTML=`<img src="${url}" alt=""><button class="foto-del" onclick="borrarFoto(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    }
  });
  document.getElementById('modal-overlay').classList.add('show');
};

window.cerrarModal=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
window.cerrarModalDirecto=()=>document.getElementById('modal-overlay').classList.remove('show');

window.publicarProducto=async function(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const precio=parseFloat(document.getElementById('f-precio').value);
  if(!nombre){ alert('El nombre es obligatorio'); return; }
  if(!precio||precio<=0){ alert('El precio es obligatorio'); return; }
  const btn=document.getElementById('btn-pub');
  btn.disabled=true;
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('upload-overlay').classList.add('show');
  try {
    const fotos=fotosFiles.filter(Boolean);
    const urls=[];
    for(let i=0;i<fotos.length;i++){
      setProgress(Math.round(i/fotos.length*70),'Subiendo imágenes...','Espera un momento');
      const url=await subirArchivo(fotos[i],`productos/${userId}/${Date.now()}_${i}`);
      urls.push(url);
    }
    let videoURL='';
    if(videoFile){
      setProgress(75,'Subiendo video...','Puede tardar unos segundos');
      videoURL=await subirArchivo(videoFile,`videos/${userId}/${Date.now()}`);
    }
    setProgress(95,'Guardando producto...','Casi listo');
    const empresa=userData.empresa||userData.nombre||'Proveedor';
    const datos={
      nombre, descripcion:document.getElementById('f-desc').value.trim(),
      precio, minimo:parseInt(document.getElementById('f-minimo').value)||1,
      stock:parseInt(document.getElementById('f-stock').value)||0,
      tiempo_entrega:document.getElementById('f-entrega').value.trim(),
      categoria:document.getElementById('f-cat').value,
      unidad:document.getElementById('f-unidad').value,
      proveedor_id:userId, nombre_proveedor:empresa,
      activo:true
    };
    if(urls.length){ datos.imagenes=urls; datos.imagen=urls[0]; }
    if(videoURL) datos.video_url=videoURL;
    if(editandoId){
      await sb.from('productos').update(datos).eq('id',editandoId);
    } else {
      datos.vistas=0;
      await sb.from('productos').insert(datos);
    }
    setProgress(100,'¡Listo!','Producto guardado');
    setTimeout(()=>{ document.getElementById('upload-overlay').classList.remove('show'); btn.disabled=false; cargarProductos(); },800);
  } catch(e){
    document.getElementById('upload-overlay').classList.remove('show');
    alert('Error: '+e.message);
    btn.disabled=false;
    document.getElementById('modal-overlay').classList.add('show');
  }
};

window.toggleActivo=async(id,activo)=>{ await sb.from('productos').update({activo:!activo}).eq('id',id); cargarProductos(); };
</script>
</body>
