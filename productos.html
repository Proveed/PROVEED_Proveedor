<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mis productos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* MODO CLARO/OSCURO UNIVERSAL */
body.dark{background:#0A0A0A;color:white;}
body.light{background:#F5F6F2;color:#111;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--acc:#FF8C00;--verde:#A8E63D;--negro:#0A0A0A;--rojo:#FF4D4D;--azul:#007AFF;}
body{background:var(--negro);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:90px;}

.header{background:#111;padding:44px 16px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:100;}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,0.07);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.back-btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2.5;}
.page-title{font-size:1rem;font-weight:800;color:white;}
.page-sub{font-size:0.65rem;color:#444;margin-top:1px;}
.btn-nuevo{margin-left:auto;padding:9px 16px;background:var(--acc);color:white;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}

/* STATS */
.stats-row{display:flex;gap:1px;background:#1e1e1e;border-bottom:1px solid #1e1e1e;}
.stat{flex:1;background:#111;padding:14px 12px;text-align:center;}
.stat-val{font-size:1.3rem;font-weight:900;color:white;}
.stat-val.acc{color:var(--acc);}
.stat-val.verde{color:var(--verde);}
.stat-val.rojo{color:var(--rojo);}
.stat-lbl{font-size:0.58rem;font-weight:700;color:#333;text-transform:uppercase;margin-top:4px;}

/* FILTROS */
.filtros-wrap{background:#111;padding:12px 16px;border-bottom:1px solid #1e1e1e;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filtros-wrap::-webkit-scrollbar{display:none;}
.filtro{padding:7px 14px;border-radius:20px;border:1px solid #222;background:transparent;font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:600;color:#444;cursor:pointer;white-space:nowrap;}
.filtro.active{background:#1e1e1e;color:white;border-color:#333;}

/* SEARCH */
.search-wrap{padding:12px 16px;background:#111;border-bottom:1px solid #1e1e1e;}
.search-box{display:flex;align-items:center;gap:9px;background:#1a1a1a;border:1.5px solid #1e1e1e;border-radius:28px;padding:10px 14px;}
.search-box svg{width:15px;height:15px;stroke:#333;fill:none;stroke-width:2.5;flex-shrink:0;}
.search-box input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.88rem;color:white;}
.search-box input::placeholder{color:#333;}

/* LISTA */
.prods-lista{padding:12px 16px;}
.prod-card{background:#111;border:1px solid #1e1e1e;border-radius:18px;margin-bottom:10px;overflow:hidden;display:flex;gap:0;transition:0.15s;}
.prod-card:active{transform:scale(0.99);}
.prod-card.inactivo{opacity:0.5;}
.prod-img-wrap{width:90px;height:90px;flex-shrink:0;overflow:hidden;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1;padding:12px;min-width:0;}
.prod-nombre{font-size:0.88rem;font-weight:700;color:white;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;}
.prod-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.prod-badge{font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:20px;text-transform:uppercase;}
.badge-activo{background:rgba(168,230,61,0.1);color:var(--verde);}
.badge-inactivo{background:rgba(255,77,77,0.08);color:var(--rojo);}
.badge-borrador{background:rgba(255,255,255,0.05);color:#444;}
.badge-cat{background:rgba(255,140,0,0.1);color:var(--acc);}
.prod-precio{font-size:1rem;font-weight:900;color:var(--acc);}
.prod-stock{font-size:0.65rem;color:#444;margin-top:2px;}
.prod-stock.bajo{color:var(--rojo);}
.prod-actions{display:flex;gap:6px;margin-top:8px;}
.btn-action{padding:5px 10px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;cursor:pointer;}
.btn-editar{background:rgba(255,140,0,0.1);color:var(--acc);}
.btn-toggle{background:rgba(255,255,255,0.05);color:#555;}
.btn-eliminar{background:rgba(255,77,77,0.08);color:var(--rojo);}

.empty{text-align:center;padding:50px 20px;color:#333;}
.empty div{font-size:3rem;margin-bottom:12px;}
.empty p{font-size:0.82rem;color:#444;margin-bottom:16px;}
.btn-empty{padding:12px 24px;background:var(--acc);color:white;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;}

/* MODAL EDITAR */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;z-index:500;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:#111;width:100%;border-radius:24px 24px 0 0;transform:translateY(100%);transition:0.4s cubic-bezier(0.16,1,0.3,1);max-height:95vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid #1e1e1e;border-bottom:none;}
.modal-overlay.show .modal-sheet{transform:translateY(0);}
.drag{width:36px;height:4px;background:#333;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modal-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.modal-title{font-size:0.95rem;font-weight:700;color:white;}
.close-btn{width:28px;height:28px;background:#1e1e1e;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.close-btn svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:2.5;}
.modal-body{overflow-y:auto;padding:16px 16px 40px;flex:1;}

.field{margin-bottom:12px;}
.field label{display:block;font-size:0.65rem;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;background:#1a1a1a;border:1.5px solid #222;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.9rem;color:white;outline:none;-webkit-appearance:none;transition:0.2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field input::placeholder,.field textarea::placeholder{color:#333;}
.field select option{background:#111;color:white;}
.field textarea{resize:none;height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* FOTOS EDICIÓN */
.fotos-edit-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.fotos-edit-row::-webkit-scrollbar{display:none;}
.foto-edit-slot{width:70px;height:70px;flex-shrink:0;border-radius:12px;background:#1a1a1a;border:1.5px dashed #333;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;}
.foto-edit-slot img{width:100%;height:100%;object-fit:cover;}
.foto-edit-slot svg{width:20px;height:20px;stroke:#333;fill:none;stroke-width:1.5;}
.foto-edit-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.foto-edit-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(255,77,77,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.foto-edit-del svg{width:8px;height:8px;stroke:white;fill:none;stroke-width:2.5;}

/* CATEGORÍAS EDICIÓN */
.cat-select-wrap{background:#1a1a1a;border:1.5px solid #222;border-radius:12px;padding:8px;}
.cat-buscador-edit{width:100%;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.85rem;color:white;padding:4px 6px;margin-bottom:8px;}
.cat-buscador-edit::placeholder{color:#333;}
.cat-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:200px;overflow-y:auto;scrollbar-width:none;}
.cat-mini-grid::-webkit-scrollbar{display:none;}
.cat-mini{background:#222;border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:0.15s;}
.cat-mini.sel{border-color:var(--acc);background:rgba(255,140,0,0.08);}
.cat-mini-emoji{font-size:1.1rem;display:block;margin-bottom:3px;}
.cat-mini-lbl{font-size:0.6rem;font-weight:700;color:#555;line-height:1.2;}
.cat-mini.sel .cat-mini-lbl{color:var(--acc);}
.subcat-mini-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.subcat-mini{padding:5px 10px;border-radius:20px;border:1px solid #222;background:transparent;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:600;color:#444;cursor:pointer;}
.subcat-mini.sel{border-color:var(--acc);color:var(--acc);}

.btn-save{width:100%;padding:14px;background:var(--acc);color:white;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;margin-top:4px;}
.btn-borrador{width:100%;padding:12px;background:#1a1a1a;color:#555;border:1px solid #222;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:8px;}
.msg-ok{display:none;background:rgba(168,230,61,0.08);border:1px solid rgba(168,230,61,0.2);border-radius:12px;padding:10px 14px;font-size:0.8rem;color:var(--verde);margin-bottom:12px;font-weight:600;}
.msg-ok.show{display:block;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;color:white;padding:10px 20px;border-radius:24px;font-size:0.82rem;font-weight:600;opacity:0;transition:0.3s;pointer-events:none;z-index:2000;white-space:nowrap;border:1px solid #333;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.upload-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;}
.upload-overlay.show{display:flex;}
.upload-box{background:#111;border-radius:20px;padding:24px;width:80%;max-width:280px;text-align:center;border:1px solid #1e1e1e;}
.spinner{width:34px;height:34px;border:3px solid #1e1e1e;border-top-color:var(--acc);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px;}
.upload-box p{font-size:0.8rem;color:#444;}
@keyframes spin{to{transform:rotate(360deg);}}

.tab-bar{position:fixed;bottom:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px 0 22px;border-top:1px solid #1e1e1e;z-index:200;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;color:#333;text-decoration:none;}
.tab.active{color:var(--acc);}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:0.54rem;font-weight:600;text-transform:uppercase;}
</style>
<!-- MODO CLARO/OSCURO UNIVERSAL — mismo en todas las páginas -->
<script>
(function(){
  const m=localStorage.getItem('proveed_modo')||'dark';
  document.documentElement.setAttribute('data-modo',m);
  // Aplicar clase apenas carga, sin parpadeo
  document.addEventListener('DOMContentLoaded',function(){
    document.body.className=m;
  });
})();
</script>

</head>

  </button>

    <div class="page-sub" id="hdr-sub">Cargando...</div>
  </div>
  <button class="btn-nuevo" onclick="window.location.href='subir-producto.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Nuevo
  </button>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat"><div class="stat-val acc" id="st-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val verde" id="st-activos">0</div><div class="stat-lbl">Activos</div></div>
  <div class="stat"><div class="stat-val rojo" id="st-stock">0</div><div class="stat-lbl">Sin stock</div></div>
</div>

<!-- BÚSQUEDA -->
<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="Buscar producto..." oninput="filtrarLista(this.value)">
  </div>
</div>

<!-- FILTROS -->
<div class="filtros-wrap">
  <button class="filtro active" onclick="setFiltro('todos',this)">Todos</button>
  <button class="filtro" onclick="setFiltro('activo',this)">Activos</button>
  <button class="filtro" onclick="setFiltro('borrador',this)">Borradores</button>
  <button class="filtro" onclick="setFiltro('sin-stock',this)">Sin stock</button>
</div>

<!-- LISTA -->
<div class="prods-lista" id="prods-lista">
  <div class="empty"><div>📦</div><p>Cargando productos...</p></div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-editar" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-hdr">
      <span class="modal-title">Editar producto</span>
      <button class="close-btn" onclick="document.getElementById('modal-editar').classList.remove('show')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="msg-ok" id="edit-ok">✓ Producto actualizado</div>

      <!-- FOTOS -->
      <div class="field">
        <label>Fotos del producto</label>
        <div class="fotos-edit-row" id="fotos-edit-row"></div>
      </div>

      <div class="field"><label>Nombre *</label><input type="text" id="e-nombre" placeholder="Nombre del producto"></div>
      <div class="field"><label>Descripción corta</label><input type="text" id="e-desc-corta" placeholder="Resumen en una línea"></div>
      <div class="field"><label>Descripción completa</label><textarea id="e-desc" placeholder="Descripción completa..."></textarea></div>

      <!-- CATEGORÍA -->
      <div class="field">
        <label>Categoría</label>
        <div class="cat-select-wrap">
          <input class="cat-buscador-edit" type="text" placeholder="Buscar categoría..." oninput="filtrarCatsEdit(this.value)" id="cat-buscador-edit">
          <div class="cat-mini-grid" id="cat-mini-grid"></div>
          <div class="subcat-mini-row" id="subcat-mini-row"></div>
        </div>
        <div style="font-size:0.7rem;color:var(--verde);margin-top:6px;font-weight:700;" id="cat-edit-txt"></div>
      </div>

      <div class="field-row">
        <div class="field"><label>Precio ($) *</label><input type="number" id="e-precio" placeholder="0.00" step="0.01"></div>
        <div class="field"><label>Precio costo ($)</label><input type="number" id="e-costo" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Stock *</label><input type="number" id="e-stock" placeholder="0"></div>
        <div class="field"><label>Mínimo</label><input type="number" id="e-minimo" placeholder="1"></div>
      </div>
      <div class="field">
        <label>Unidad</label>
        <select id="e-unidad">
          <option value="unidad">Unidad</option>
          <option value="par">Par</option>
          <option value="docena">Docena</option>
          <option value="caja">Caja</option>
          <option value="paquete">Paquete</option>
          <option value="kg">Kilogramo</option>
          <option value="litro">Litro</option>
          <option value="metro">Metro</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field"><label>SKU</label><input type="text" id="e-sku" placeholder="SKU-001"></div>
        <div class="field"><label>Entrega</label><input type="text" id="e-entrega" placeholder="2-3 días"></div>
      </div>

      <button class="btn-save" onclick="guardarEdicion()">Guardar cambios</button>
      <button class="btn-borrador" onclick="toggleActivo()">Pausar / Reactivar producto</button>
    </div>
  </div>
</div>

</nav>

const colorCat=c=>{const m={'Ropa':'#FF8C00','Tecnolog':'#007AFF','Alimento':'#22C55E','Belleza':'#FF69B4','Deporte':'#A855F7','Hogar':'#F59E0B','Joya':'#EF4444'};for(const k in m){if((c||'').includes(k))return m[k];}return '#888';};
const emojiCat=c=>{const m={'Ropa':'👗','Tecnolog':'📱','Alimento':'🛒','Belleza':'💄','Deporte':'⚽','Hogar':'🏠','Joya':'💍'};for(const k in m){if((c||'').includes(k))return m[k];}return '📦';};

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  userId=session.user.id;
  const{data:u}=await sb.from('usuarios').select('*').eq('id',userId).single();
  if(u)userData=u;
  await cargarProductos();
  renderCatsEdit(CATEGORIAS);
})();

async function cargarProductos(){
  const{data}=await sb.from('productos').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  todosProds=data||[];
  actualizarStats();
  renderLista();
}

function actualizarStats(){
  document.getElementById('st-total').textContent=todosProds.length;
  document.getElementById('st-activos').textContent=todosProds.filter(p=>p.activo).length;
  document.getElementById('st-stock').textContent=todosProds.filter(p=>(p.stock||0)===0).length;
  document.getElementById('hdr-sub').textContent=`${todosProds.length} producto${todosProds.length!==1?'s':''}`;
}

function getListaFiltrada(){
  let lista=[...todosProds];
  if(filtroActual==='activo') lista=lista.filter(p=>p.activo&&p.estado!=='borrador');
  else if(filtroActual==='borrador') lista=lista.filter(p=>p.estado==='borrador'||!p.activo);
  else if(filtroActual==='sin-stock') lista=lista.filter(p=>(p.stock||0)===0);
  if(busqActual) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(busqActual)||(p.categoria||'').toLowerCase().includes(busqActual)||(p.sku||'').toLowerCase().includes(busqActual));
  return lista;
}

function renderLista(){
  const lista=getListaFiltrada();
  const cont=document.getElementById('prods-lista');
  if(!lista.length){
    cont.innerHTML=`<div class="empty"><div>📦</div><p>${todosProds.length?'Sin resultados para este filtro':'Aún no tienes productos publicados'}</p><button class="btn-empty" onclick="window.location.href='subir-producto.html'">+ Subir primer producto</button></div>`;
    return;
  }
  cont.innerHTML='';
  lista.forEach(p=>{
    const img=p.imagenes?.[0]||p.imagen||'';
    const color=colorCat(p.categoria||'');
    const stockBajo=(p.stock||0)<=5;
    const esBorrador=p.estado==='borrador'||!p.activo;
    const card=document.createElement('div');
    card.className='prod-card'+(esBorrador?' inactivo':'');
    card.innerHTML=`
      <div class="prod-img-wrap" style="background:${color}15;">
        ${img?`<img src="${img}" alt="" loading="lazy">`:`<span>${emojiCat(p.categoria||'')}</span>`}
      </div>
      <div class="prod-info">
        <div class="prod-nombre">${p.nombre||'Sin nombre'}</div>
        <div class="prod-meta">
          <span class="prod-badge ${p.activo&&p.estado!=='borrador'?'badge-activo':'badge-borrador'}">${p.activo&&p.estado!=='borrador'?'● Activo':'○ Pausado'}</span>
          ${p.categoria?`<span class="prod-badge badge-cat">${p.categoria.slice(0,12)}</span>`:''}
        </div>
        <div class="prod-precio">$${Number(p.precio||0).toFixed(2)} <span style="font-size:0.68rem;color:#444;font-weight:400;">/ ${p.unidad||'und'}</span></div>
        <div class="prod-stock ${stockBajo?'bajo':''}">Stock: ${p.stock||0} und. · Mín: ${p.minimo||1}</div>
        <div class="prod-actions">
          <button class="btn-action btn-editar" onclick="abrirEditar('${p.id}')">✏️ Editar</button>
          <button class="btn-action btn-toggle" onclick="toggleActivo('${p.id}')">${p.activo?'Pausar':'Activar'}</button>
          <button class="btn-action btn-eliminar" onclick="eliminarProd('${p.id}')">🗑️</button>
        </div>
      </div>`;
    cont.appendChild(card);
  });
}

window.setFiltro=function(f,el){
  filtroActual=f;
  document.querySelectorAll('.filtro').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderLista();
};

window.filtrarLista=function(q){
  busqActual=q.toLowerCase();
  renderLista();
};

// EDITAR
window.abrirEditar=function(id){
  prodEditando=todosProds.find(p=>p.id===id);
  if(!prodEditando)return;
  const p=prodEditando;
  document.getElementById('edit-ok').classList.remove('show');
  document.getElementById('e-nombre').value=p.nombre||'';
  document.getElementById('e-desc-corta').value=p.descripcion||'';
  document.getElementById('e-desc').value=p.descripcion_larga||'';
  document.getElementById('e-precio').value=p.precio||'';
  document.getElementById('e-costo').value=p.precio_costo||'';
  document.getElementById('e-stock').value=p.stock||'';
  document.getElementById('e-minimo').value=p.minimo||1;
  document.getElementById('e-sku').value=p.sku||'';
  document.getElementById('e-entrega').value=p.entrega||'';
  document.getElementById('e-unidad').value=p.unidad||'unidad';
  catEditando=p.categoria||'';
  subcatEditando=p.subcategoria||'';
  document.getElementById('cat-edit-txt').textContent=catEditando?(catEditando+(subcatEditando?` › ${subcatEditando}`:'')):'';
  renderCatsEdit(CATEGORIAS);
  renderFotosEdit(p.imagenes||[]);
  nuevasFotos=[null,null,null,null,null];
  document.getElementById('modal-editar').classList.add('show');
};

function renderFotosEdit(imgs){
  fotosEditadas=[...imgs];
  const row=document.getElementById('fotos-edit-row');
  row.innerHTML='';
  // Fotos existentes
  imgs.forEach((url,i)=>{
    const slot=document.createElement('div');
    slot.className='foto-edit-slot';
    slot.innerHTML=`<img src="${url}" alt=""><button class="foto-edit-del" onclick="delFotoEdit(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    row.appendChild(slot);
  });
  // Slot para agregar
  for(let i=0;i<Math.max(1,5-imgs.length);i++){
    const slot=document.createElement('div');
    slot.className='foto-edit-slot';
    slot.innerHTML=`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><input type="file" accept="image/*" onchange="agregarFotoEdit(this,${i})">`;
    row.appendChild(slot);
  }
}

window.delFotoEdit=function(i){
  fotosEditadas.splice(i,1);
  renderFotosEdit(fotosEditadas);
};

window.agregarFotoEdit=function(input,slotIdx){
  const f=input.files[0]; if(!f)return;
  nuevasFotos[slotIdx]=f;
  const r=new FileReader();
  r.onload=e=>{
    fotosEditadas.push(e.target.result);
    renderFotosEdit(fotosEditadas);
  };
  r.readAsDataURL(f);
};

// CATEGORÍAS EDICIÓN
let catsEditFiltradas=[...CATEGORIAS];
function renderCatsEdit(lista){
  const grid=document.getElementById('cat-mini-grid');
  grid.innerHTML='';
  lista.forEach(cat=>{
    const div=document.createElement('div');
    div.className='cat-mini'+(catEditando===cat.nombre?' sel':'');
    div.innerHTML=`<span class="cat-mini-emoji">${cat.emoji}</span><div class="cat-mini-lbl">${cat.nombre}</div>`;
    div.onclick=()=>selCatEdit(cat);
    grid.appendChild(div);
  });
}

window.filtrarCatsEdit=function(q){
  if(!q){catsEditFiltradas=[...CATEGORIAS];}
  else{const ql=q.toLowerCase();catsEditFiltradas=CATEGORIAS.filter(c=>c.nombre.toLowerCase().includes(ql)||(c.subs||[]).some(s=>s.toLowerCase().includes(ql)));}
  renderCatsEdit(catsEditFiltradas);
};

function selCatEdit(cat){
  catEditando=cat.nombre;
  subcatEditando='';
  renderCatsEdit(catsEditFiltradas);
  const row=document.getElementById('subcat-mini-row');
  row.innerHTML='';
  if(cat.subs&&cat.subs.length){
    cat.subs.forEach(s=>{
      const btn=document.createElement('button');
      btn.className='subcat-mini'+(subcatEditando===s?' sel':'');
      btn.textContent=s;
      btn.onclick=()=>{subcatEditando=s;document.querySelectorAll('.subcat-mini').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');document.getElementById('cat-edit-txt').textContent=`${catEditando} › ${s}`;};
      row.appendChild(btn);
    });
  }
  document.getElementById('cat-edit-txt').textContent=catEditando;
}

// GUARDAR EDICIÓN
window.guardarEdicion=async function(){
  if(!prodEditando)return;
  const nombre=document.getElementById('e-nombre').value.trim();
  const precio=parseFloat(document.getElementById('e-precio').value)||0;
  if(!nombre||precio<=0){showToast('Nombre y precio son obligatorios');return;}

  document.getElementById('upload-overlay').classList.add('show');
  document.getElementById('upload-txt').textContent='Guardando cambios...';

  try{
    // Subir fotos nuevas
    let urlsFotos=[...fotosEditadas.filter(u=>u&&u.startsWith('http'))];
    for(let i=0;i<nuevasFotos.length;i++){
      const f=nuevasFotos[i]; if(!f)continue;
      const path=`productos/${userId}/${Date.now()}_edit_${i}.jpg`;
      const{error}=await sb.storage.from('proveed-media').upload(path,f,{upsert:true});
      if(!error){const{data}=sb.storage.from('proveed-media').getPublicUrl(path);urlsFotos.push(data.publicUrl);}
    }

    await sb.from('productos').update({
      nombre,
      descripcion:document.getElementById('e-desc-corta').value.trim(),
      descripcion_larga:document.getElementById('e-desc').value.trim(),
      precio,
      precio_costo:parseFloat(document.getElementById('e-costo').value)||0,
      stock:parseInt(document.getElementById('e-stock').value)||0,
      minimo:parseInt(document.getElementById('e-minimo').value)||1,
      unidad:document.getElementById('e-unidad').value,
      sku:document.getElementById('e-sku').value.trim(),
      entrega:document.getElementById('e-entrega').value.trim(),
      categoria:catEditando,
      subcategoria:subcatEditando,
      imagenes:urlsFotos,
      imagen:urlsFotos[0]||prodEditando.imagen||''
    }).eq('id',prodEditando.id);

    // Actualizar en lista local
    const idx=todosProds.findIndex(p=>p.id===prodEditando.id);
    if(idx>=0) todosProds[idx]={...todosProds[idx],nombre,precio,stock:parseInt(document.getElementById('e-stock').value)||0,categoria:catEditando,imagenes:urlsFotos,imagen:urlsFotos[0]||''};

    document.getElementById('upload-overlay').classList.remove('show');
    document.getElementById('edit-ok').classList.add('show');
    actualizarStats();
    renderLista();
    showToast('✓ Producto actualizado');
    setTimeout(()=>document.getElementById('modal-editar').classList.remove('show'),1500);
  }catch(e){
    document.getElementById('upload-overlay').classList.remove('show');
    showToast('Error: '+e.message);
  }
};

// TOGGLE ACTIVO
window.toggleActivo=async function(id){
  const pid=id||prodEditando?.id; if(!pid)return;
  const p=todosProds.find(x=>x.id===pid); if(!p)return;
  const nuevoActivo=!p.activo;
  await sb.from('productos').update({activo:nuevoActivo}).eq('id',pid);
  const idx=todosProds.findIndex(x=>x.id===pid);
  if(idx>=0) todosProds[idx].activo=nuevoActivo;
  actualizarStats();
  renderLista();
  showToast(nuevoActivo?'✓ Producto activado':'Producto pausado');
};

// ELIMINAR
window.eliminarProd=async function(id){
  if(!confirm('¿Eliminar este producto permanentemente?'))return;
  await sb.from('productos').delete().eq('id',id);
  todosProds=todosProds.filter(p=>p.id!==id);
  actualizarStats();
  renderLista();
  showToast('Producto eliminado');
};

window.cerrarModal=e=>{if(e.target===document.getElementById('modal-editar'))document.getElementById('modal-editar').classList.remove('show');};
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
