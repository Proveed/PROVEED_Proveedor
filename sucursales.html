<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Sucursales</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --negro:#0A0A0A; --blanco:#F8F8F5; --gris:#111; --verde:#32CD32; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'DM Sans',sans-serif; min-height:100vh; color:white; overflow-x:hidden; }
  
  .layout{ display:flex; flex-direction:column; min-height:100vh; }
  @media(min-width:900px){ .layout{ flex-direction:row; } }

  /* SIDEBAR */
  .sidebar{ background:#000; border-bottom:1px solid #1a1a1a; padding:48px 20px 24px; z-index:10; }
  @media(min-width:900px){ 
    .sidebar{ width:300px; min-height:100vh; border-right:1px solid #1a1a1a; border-bottom:none; position:sticky; top:0; height:100vh; overflow-y:auto; } 
  }
  .brand{ font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:900; color:var(--naranja); letter-spacing:-0.5px; }
  .brand-sub{ font-size:0.65rem; color:#444; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:30px; margin-top:4px; }
  
  .back-link{ display:flex; align-items:center; gap:8px; color:#666; font-size:0.8rem; cursor:pointer; margin-bottom:25px; transition:0.2s; }
  .back-link:hover{ color:var(--naranja); }
  
  /* CARDS SUCURSAL */
  #sucursales-lista{ margin-bottom:20px; }
  .suc-card{ background:#080808; border:1px solid #1a1a1a; border-radius:16px; padding:16px; margin-bottom:12px; cursor:pointer; transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position:relative; overflow:hidden; }
  .suc-card:hover{ border-color:var(--naranja); transform:translateY(-2px); }
  .suc-card.active{ border-color:var(--naranja); background:rgba(255,140,0,0.06); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
  .suc-card.active::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--naranja); }
  
  .suc-nombre{ font-weight:700; font-size:0.95rem; color:var(--blanco); }
  .suc-info{ font-size:0.72rem; color:#555; margin-top:4px; }
  .suc-badge{ font-size:0.6rem; font-weight:800; padding:3px 8px; border-radius:6px; display:inline-block; margin-top:8px; text-transform:uppercase; }
  .badge-on{ background:rgba(50,205,50,0.1); color:var(--verde); }

  .btn-add{ width:100%; padding:14px; background:#111; border:1px dashed #333; border-radius:14px; color:#666; font-weight:600; cursor:pointer; margin-top:10px; transition:0.2s; }
  .btn-add:hover{ border-color:var(--naranja); color:var(--naranja); }
  .btn-panic{ width:100%; padding:14px; background:rgba(255,77,77,0.1); border:1px solid rgba(255,77,77,0.2); border-radius:14px; color:var(--rojo); font-weight:700; cursor:pointer; margin-top:15px; font-size:0.75rem; letter-spacing:0.5px; }

  /* MAIN CONTENT */
  .main{ flex:1; padding:24px 20px; background:#050505; }
  @media(min-width:900px){ .main{ padding:50px; } }
  .main-header{ margin-bottom:30px; }
  .main-title{ font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:-1px; }
  .main-sub{ font-size:0.9rem; color:#555; margin-top:5px; }

  /* KPI GRID */
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:30px; }
  @media(min-width:600px){ .kpi-grid{ grid-template-columns:repeat(4,1fr); } }
  .kpi{ background:#0a0a0a; border:1px solid #161616; border-radius:20px; padding:20px; text-align:center; }
  .kpi-val{ font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:900; color:var(--naranja); }
  .kpi-lbl{ font-size:0.65rem; color:#444; text-transform:uppercase; font-weight:700; margin-top:5px; letter-spacing:0.8px; }

  /* PANEL EQUIPO */
  .panel{ background:#0a0a0a; border:1px solid #161616; border-radius:24px; padding:24px; margin-bottom:24px; }
  .panel-title{ font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; margin-bottom:20px; color:var(--naranja); display:flex; align-items:center; gap:10px; }
  .panel-title::after{ content:''; flex:1; height:1px; background:#1a1a1a; }

  .emp-row{ display:flex; align-items:center; justify-content:space-between; padding:15px 0; border-bottom:1px solid #161616; }
  .emp-info b{ display:block; font-size:0.9rem; color:var(--blanco); }
  .emp-info span{ font-size:0.72rem; color:#444; }
  .permisos-flex{ display:flex; gap:8px; }
  .chip{ font-size:0.62rem; font-weight:700; padding:4px 10px; border-radius:8px; background:#161616; color:#444; cursor:pointer; }
  .chip.on{ background:rgba(50,205,50,0.12); color:var(--verde); }

  /* MODAL */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .modal-overlay.show{ display:flex; }
  .modal-card{ background:#111; border:1px solid #222; width:100%; max-width:450px; border-radius:30px; padding:30px; animation:scaleUp 0.3s ease; }
  .modal-title{ font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; margin-bottom:20px; }
  .input-group{ margin-bottom:15px; }
  .input-group label{ display:block; font-size:0.65rem; font-weight:700; color:#555; text-transform:uppercase; margin-bottom:6px; letter-spacing:1px; }
  .input-group input{ width:100%; background:#000; border:1px solid #222; padding:14px; border-radius:12px; color:white; font-family:inherit; outline:none; }
  .input-group input:focus{ border-color:var(--naranja); }
  .btn-submit{ width:100%; padding:16px; background:var(--naranja); border:none; border-radius:15px; font-weight:800; font-family:'Syne',sans-serif; cursor:pointer; margin-top:10px; }

  @keyframes scaleUp{ from{transform:scale(0.95); opacity:0;} to{transform:scale(1); opacity:1;} }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">PROVEED</div>
    <div class="brand-sub">Sucursales & HUB Logístico</div>
    
    <div class="back-link" onclick="location.href='dashboard.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al Dashboard
    </div>

    <div id="sucursales-lista">
      </div>

    <button class="btn-add" onclick="toggleModal(true)">+ Añadir Nueva Sede</button>
    <button class="btn-panic" onclick="emergencyLock()">⚠ BLOQUEO DE SEGURIDAD</button>
  </aside>

  <main class="main">
    <div id="empty-state" style="height:80vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
      <div style="font-size:3rem; margin-bottom:20px; opacity:0.2;">🏢</div>
      <div class="main-title" style="color:#222;">Selecciona una Sucursal</div>
      <p style="color:#333; max-width:250px;">Gestiona inventario, empleados y métricas por ubicación.</p>
    </div>

    <div id="sucursal-detalle" style="display:none;">
      <header class="main-header">
        <div class="main-title" id="det-nombre">Sede Guayaquil</div>
        <div class="main-sub" id="det-info">C.C. Policentro · Local 14</div>
      </header>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val" id="k-ventas">$0.00</div><div class="kpi-lbl">Ventas Hoy</div></div>
        <div class="kpi"><div class="kpi-val" id="k-pedidos">0</div><div class="kpi-lbl">Pedidos</div></div>
        <div class="kpi"><div class="kpi-val" id="k-stock">--</div><div class="kpi-lbl">SKUs Activos</div></div>
        <div class="kpi"><div class="kpi-val" id="k-personal">1</div><div class="kpi-lbl">Agentes</div></div>
      </div>

      <div class="panel">
        <div class="panel-title">Agentes de Venta & Permisos</div>
        <div id="empleados-lista">
          </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <input type="text" id="inp-empleado" placeholder="Nuevo Agente..." style="flex:1; background:#000; border:1px solid #1a1a1a; padding:12px; border-radius:12px; color:white; outline:none;">
          <button onclick="addAgente()" style="background:var(--naranja); border:none; padding:0 20px; border-radius:12px; font-weight:800; cursor:pointer;">+</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-suc">
  <div class="modal-card">
    <div class="modal-title">Configurar Sede</div>
    <div class="input-group">
      <label>Nombre Identificador</label>
      <input type="text" id="s-nombre" placeholder="Ej: Matriz Quito">
    </div>
    <div class="input-group">
      <label>Ubicación / Dirección</label>
      <input type="text" id="s-dir" placeholder="Av. Amazonas y Naciones Unidas">
    </div>
    <div class="input-group">
      <label>Gerente Responsable</label>
      <input type="text" id="s-ger" placeholder="Nombre del encargado">
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn-submit" style="background:#222; color:#555;" onclick="toggleModal(false)">Cancelar</button>
      <button class="btn-submit" onclick="saveSucursal()">Guardar Sede</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://pqoqirousggkjnkzxkhy.supabase.co'
const supabaseKey = 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I'
const supabase = createClient(supabaseUrl, supabaseKey)

let currentUid = null;
let activeSucursalId = null;

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }
  currentUid = session.user.id;
  loadSucursales();
}

async function loadSucursales() {
  const { data: sucursales } = await supabase
    .from('sucursales')
    .select('*')
    .eq('proveedor_id', currentUid);

  const lista = document.getElementById('sucursales-lista');
  if (!sucursales || sucursales.length === 0) {
    lista.innerHTML = '<p style="color:#333; font-size:0.7rem; text-align:center;">No hay sedes registradas.</p>';
    return;
  }

  lista.innerHTML = sucursales.map(s => `
    <div class="suc-card ${activeSucursalId === s.id ? 'active' : ''}" onclick="selectSucursal('${s.id}', '${s.nombre}', '${s.direccion}')">
      <div class="suc-nombre">${s.nombre}</div>
      <div class="suc-info">${s.direccion}</div>
      <div class="suc-badge badge-on">Operativa</div>
    </div>
  `).join('');
}

window.selectSucursal = (id, nombre, direccion) => {
  activeSucursalId = id;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('sucursal-detalle').style.display = 'block';
  document.getElementById('det-nombre').textContent = nombre;
  document.getElementById('det-info').textContent = direccion;
  loadSucursales(); // Refresh active state
  loadKPIs();
};

async function loadKPIs() {
  // Simulación de carga de KPIs específicos por sede
  document.getElementById('k-ventas').textContent = `$${(Math.random()*500).toFixed(2)}`;
  document.getElementById('k-pedidos').textContent = Math.floor(Math.random()*15);
}

window.saveSucursal = async () => {
  const nombre = document.getElementById('s-nombre').value;
  const direccion = document.getElementById('s-dir').value;
  const gerente = document.getElementById('s-ger').value;

  if(!nombre) return alert("Nombre obligatorio");

  const { error } = await supabase.from('sucursales').insert([{
    nombre, direccion, gerente, proveedor_id: currentUid
  }]);

  if(!error) {
    toggleModal(false);
    loadSucursales();
  }
};

window.toggleModal = (show) => {
  document.getElementById('modal-suc').classList.toggle('show', show);
};

window.emergencyLock = () => {
  if(confirm("⚠ ¿BLOQUEAR ACCESO TOTAL?\nEsto cerrará todas las sesiones de esta sede.")){
    document.body.style.filter = "grayscale(1) brightness(0.3)";
    alert("Protocolo de seguridad activado. Sedes encriptadas.");
  }
};

init();
</script>

</body>
</html>
