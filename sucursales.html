<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Sucursales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nueva{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .sucursales-lista{ padding:14px 16px; }
  .suc-card{ background:#111; border:1px solid #1e1e1e; border-radius:18px; padding:18px; margin-bottom:12px; transition:0.2s; }
  .suc-card:hover{ border-color:#333; }
  .suc-header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .suc-icon{ width:44px; height:44px; border-radius:14px; background:rgba(255,140,0,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .suc-icon svg{ width:22px; height:22px; stroke:var(--naranja); fill:none; stroke-width:2; }
  .suc-info{ flex:1; }
  .suc-nombre{ font-size:0.92rem; font-weight:700; color:white; }
  .suc-ciudad{ font-size:0.75rem; color:#555; margin-top:2px; }
  .suc-badge{ font-size:0.62rem; font-weight:700; padding:3px 8px; border-radius:6px; }
  .badge-principal{ background:rgba(168,230,61,0.12); color:var(--verde); }
  .badge-activa{ background:rgba(0,122,255,0.12); color:var(--azul); }
  .suc-datos{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .suc-dato{ background:#1a1a1a; border-radius:10px; padding:10px 12px; }
  .suc-dato-label{ font-size:0.62rem; color:#555; font-weight:600; text-transform:uppercase; margin-bottom:3px; }
  .suc-dato-val{ font-size:0.82rem; color:#aaa; font-weight:600; }
  .suc-actions{ display:flex; gap:8px; }
  .suc-btn{ flex:1; padding:9px; border-radius:10px; border:none; font-family:'Inter',sans-serif; font-size:0.76rem; font-weight:700; cursor:pointer; }
  .btn-edit{ background:#1e1e1e; color:#aaa; }
  .btn-del{ background:rgba(255,77,77,0.08); color:var(--rojo); }
  .empty{ text-align:center; padding:60px 20px; color:#444; }
  .empty svg{ width:52px; height:52px; stroke:#333; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty h3{ font-size:0.95rem; font-weight:700; color:#555; margin-bottom:6px; }
  .empty p{ font-size:0.82rem; }
  .btn-crear{ background:var(--naranja); color:#000; border:none; padding:12px 24px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; margin-top:16px; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; max-height:90vh; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; border:1px solid #1e1e1e; border-bottom:none; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:14px auto 0; flex-shrink:0; }
  .modal-header{ padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e1e; flex-shrink:0; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; }
  .close-btn{ width:30px; height:30px; background:#1e1e1e; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .close-btn svg{ width:14px; height:14px; stroke:#666; fill:none; stroke-width:2.5; }
  .modal-body{ overflow-y:auto; padding:16px 16px 32px; flex:1; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; -webkit-appearance:none; }
  .field input:focus{ border-color:var(--naranja); }
  .field input::placeholder{ color:#444; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .toggle-field{ display:flex; align-items:center; justify-content:space-between; background:#1a1a1a; border:1px solid #222; border-radius:12px; padding:12px 14px; }
  .toggle-label{ font-size:0.88rem; color:#aaa; }
  .toggle{ width:44px; height:24px; background:#222; border-radius:12px; position:relative; cursor:pointer; border:none; transition:0.3s; }
  .toggle.on{ background:var(--naranja); }
  .toggle::after{ content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:white; transition:0.3s; }
  .toggle.on::after{ left:22px; }
  .btn-guardar{ width:100%; padding:14px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Sucursales</div>
  </div>
  <button class="btn-nueva" onclick="abrirModal()">+ Nueva</button>
</div>

<div class="sucursales-lista" id="sucursales-lista">
  <div class="empty"><p>Cargando...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-titulo">Nueva Sucursal</span>
      <button class="close-btn" onclick="cerrarModalDirecto()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nombre de la sucursal *</label><input type="text" id="f-nombre" placeholder="Ej: Sucursal Norte"></div>
      <div class="field-row">
        <div class="field"><label>Ciudad *</label><input type="text" id="f-ciudad" placeholder="Quito"></div>
        <div class="field"><label>Teléfono</label><input type="tel" id="f-telefono" placeholder="022345678"></div>
      </div>
      <div class="field"><label>Dirección *</label><input type="text" id="f-direccion" placeholder="Av. Principal y Calle Secundaria"></div>
      <div class="field"><label>Horario de atención</label><input type="text" id="f-horario" placeholder="Lun-Vie 8:00-18:00"></div>
      <div class="field"><label>Responsable</label><input type="text" id="f-responsable" placeholder="Nombre del encargado"></div>
      <div class="field" style="margin-bottom:8px;">
        <div class="toggle-field">
          <span class="toggle-label">Sucursal principal</span>
          <button class="toggle" id="toggle-principal" onclick="this.classList.toggle('on')"></button>
        </div>
      </div>
      <div class="field">
        <div class="toggle-field">
          <span class="toggle-label">Sucursal activa</span>
          <button class="toggle on" id="toggle-activa" onclick="this.classList.toggle('on')"></button>
        </div>
      </div>
      <button class="btn-guardar" onclick="guardarSucursal()">GUARDAR SUCURSAL</button>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="sucursales.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Sucursales</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', sucursales=[], editandoId=null;

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  cargarSucursales();
})();

async function cargarSucursales(){
  const { data } = await sb.from('sucursales').select('*').eq('proveedor_id',userId).order('created_at',{ascending:true});
  sucursales=data||[];
  renderSucursales();
}

function renderSucursales(){
  const cont=document.getElementById('sucursales-lista');
  if(!sucursales.length){
    cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><h3>Sin sucursales</h3><p>Agrega tus puntos de venta o bodegas</p><button class="btn-crear" onclick="abrirModal()">+ Agregar sucursal</button></div>`;
    return;
  }
  cont.innerHTML='';
  sucursales.forEach(s=>{
    const div=document.createElement('div'); div.className='suc-card';
    div.innerHTML=`
      <div class="suc-header">
        <div class="suc-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="suc-info"><div class="suc-nombre">${s.nombre}</div><div class="suc-ciudad">${s.ciudad||'—'}</div></div>
        <span class="suc-badge ${s.principal?'badge-principal':'badge-activa'}">${s.principal?'Principal':'Activa'}</span>
      </div>
      <div class="suc-datos">
        <div class="suc-dato"><div class="suc-dato-label">Dirección</div><div class="suc-dato-val">${s.direccion||'—'}</div></div>
        <div class="suc-dato"><div class="suc-dato-label">Teléfono</div><div class="suc-dato-val">${s.telefono||'—'}</div></div>
        <div class="suc-dato"><div class="suc-dato-label">Horario</div><div class="suc-dato-val">${s.horario||'—'}</div></div>
        <div class="suc-dato"><div class="suc-dato-label">Responsable</div><div class="suc-dato-val">${s.responsable||'—'}</div></div>
      </div>
      <div class="suc-actions">
        <button class="suc-btn btn-edit" onclick="editarSucursal('${s.id}')">Editar</button>
        <button class="suc-btn btn-del" onclick="eliminarSucursal('${s.id}')">Eliminar</button>
      </div>`;
    cont.appendChild(div);
  });
}

window.abrirModal=function(){
  editandoId=null;
  document.getElementById('modal-titulo').textContent='Nueva Sucursal';
  ['nombre','ciudad','telefono','direccion','horario','responsable'].forEach(f=>{ document.getElementById('f-'+f).value=''; });
  document.getElementById('toggle-principal').classList.remove('on');
  document.getElementById('toggle-activa').classList.add('on');
  document.getElementById('modal-overlay').classList.add('show');
};

window.editarSucursal=function(id){
  const s=sucursales.find(s=>s.id===id); if(!s) return;
  editandoId=id;
  document.getElementById('modal-titulo').textContent='Editar Sucursal';
  document.getElementById('f-nombre').value=s.nombre||'';
  document.getElementById('f-ciudad').value=s.ciudad||'';
  document.getElementById('f-telefono').value=s.telefono||'';
  document.getElementById('f-direccion').value=s.direccion||'';
  document.getElementById('f-horario').value=s.horario||'';
  document.getElementById('f-responsable').value=s.responsable||'';
  s.principal?document.getElementById('toggle-principal').classList.add('on'):document.getElementById('toggle-principal').classList.remove('on');
  s.activa!==false?document.getElementById('toggle-activa').classList.add('on'):document.getElementById('toggle-activa').classList.remove('on');
  document.getElementById('modal-overlay').classList.add('show');
};

window.guardarSucursal=async function(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const ciudad=document.getElementById('f-ciudad').value.trim();
  const direccion=document.getElementById('f-direccion').value.trim();
  if(!nombre||!ciudad||!direccion){ alert('Nombre, ciudad y dirección son obligatorios'); return; }
  const datos={
    proveedor_id:userId, nombre, ciudad, direccion,
    telefono:document.getElementById('f-telefono').value.trim(),
    horario:document.getElementById('f-horario').value.trim(),
    responsable:document.getElementById('f-responsable').value.trim(),
    principal:document.getElementById('toggle-principal').classList.contains('on'),
    activa:document.getElementById('toggle-activa').classList.contains('on')
  };
  if(editandoId) await sb.from('sucursales').update(datos).eq('id',editandoId);
  else await sb.from('sucursales').insert(datos);
  document.getElementById('modal-overlay').classList.remove('show');
  cargarSucursales();
};

window.eliminarSucursal=async function(id){
  if(!confirm('¿Eliminar esta sucursal?')) return;
  await sb.from('sucursales').delete().eq('id',id);
  cargarSucursales();
};

window.cerrarModal=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
window.cerrarModalDirecto=()=>document.getElementById('modal-overlay').classList.remove('show');
</script>
</body>
</html>
