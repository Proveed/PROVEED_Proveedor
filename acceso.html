<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEED — Accesos de Sede</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --negro:#0A0A0A; --blanco:#F8F8F5; --gris:#F0F1EE; --verde:#32CD32; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'DM Sans',sans-serif; min-height:100vh; color:white; }
  .wrapper{ display:flex; flex-direction:column; min-height:100vh; }
  @media(min-width:900px){ .wrapper{ flex-direction:row; } }
  .config{ background:#000; padding:48px 22px 28px; border-bottom:1px solid #1a1a1a; }
  @media(min-width:900px){ .config{ width:340px; min-height:100vh; border-right:1px solid #1a1a1a; border-bottom:none; padding:40px 22px; position:sticky; top:0; height:100vh; overflow-y:auto; } }
  .back-row{ display:flex; align-items:center; gap:10px; margin-bottom:24px; cursor:pointer; color:#555; transition: 0.2s; }
  .back-row svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2.5; }
  .back-row:hover{ color:var(--naranja); }
  .panel-title{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; color:var(--naranja); border-left:4px solid var(--naranja); padding-left:10px; margin-bottom:6px; }
  .panel-sub{ font-size:0.75rem; color:#555; margin-bottom:24px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:0.65rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field select,.field input{ width:100%; background:#111; border:1px solid #2a2a2a; padding:12px 14px; border-radius:12px; color:white; font-family:'DM Sans',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; box-sizing:border-box; }
  .field select:focus,.field input:focus{ border-color:var(--naranja); }
  .btn-gen{ width:100%; padding:15px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; transition:0.2s; }
  .btn-gen:active{ transform:scale(0.98); }
  .qr-main{ flex:1; padding:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  @media(min-width:900px){ .qr-main{ padding:40px; } }
  .qr-container{ background:white; border-radius:24px; padding:32px; display:flex; flex-direction:column; align-items:center; box-shadow:0 20px 60px rgba(0,0,0,0.5); max-width:380px; width:100%; }
  .qr-placeholder{ width:260px; height:260px; background:#f5f5f5; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px dashed #ddd; color:#bbb; }
  .qr-placeholder svg{ width:60px; height:60px; margin-bottom:12px; }
  #qrcode{ display:none; }
  #qrcode img,#qrcode canvas{ border-radius:12px; max-width:260px; }
  .qr-badge{ margin-top:16px; padding:10px 18px; background:#f8f8f8; border-radius:12px; text-align:center; display:none; width:100%; }
  .qr-badge .rol{ font-family:'Syne',sans-serif; font-weight:800; color:var(--negro); font-size:1rem; }
  .qr-badge .exp{ font-size:0.72rem; color:#888; margin-top:3px; }
  .qr-badge .token{ font-family:monospace; font-size:0.65rem; color:#bbb; margin-top:6px; }
  .instrucciones{ background:rgba(0,122,255,0.08); border:1px solid rgba(0,122,255,0.2); border-radius:14px; padding:14px; margin-top:16px; display:none; width:100%; max-width:380px; }
  .instrucciones p{ font-size:0.78rem; color:#aaa; line-height:1.6; }
  .historial{ width:100%; max-width:380px; margin-top:20px; }
  .hist-title{ font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:800; color:#555; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .hist-item{ background:#111; border:1px solid #1a1a1a; border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .hist-rol{ font-size:0.82rem; font-weight:700; color: white; }
  .hist-info{ font-size:0.68rem; color:#555; margin-top:2px; }
  .hist-exp{ font-size:0.65rem; color:#555; }
</style>
</head>
<body>
<div class="wrapper">
  <aside class="config">
    <div class="back-row" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al panel
    </div>
    <div class="panel-title">Generador de Accesos</div>
    <div class="panel-sub">Crea un QR para vincular un dispositivo de empleado.</div>
    
    <div class="field">
      <label>Función del dispositivo</label>
      <select id="f-rol">
        <option value="bodega">📦 Bodega / Despacho</option>
        <option value="caja">💰 Punto de Venta</option>
        <option value="vendedor">📱 Vendedor de Piso</option>
        <option value="admin">🏢 Administración</option>
        <option value="soporte">💬 Servicio al Cliente</option>
      </select>
    </div>

    <div class="field">
      <label>Sucursal asignada</label>
      <select id="f-sucursal">
        <option value="central">Cargando sucursales...</option>
      </select>
    </div>

    <div class="field">
      <label>Vencimiento</label>
      <select id="f-vencimiento">
        <option value="8h">Turno laboral (8 horas)</option>
        <option value="24h">24 horas</option>
        <option value="7d">7 días</option>
        <option value="perm">Permanente</option>
      </select>
    </div>

    <div class="field">
      <label>Nombre del empleado (opcional)</label>
      <input type="text" id="f-empleado" placeholder="Ej: Juan Pérez">
    </div>

    <button class="btn-gen" id="btn-generar">GENERAR CÓDIGO QR</button>
  </aside>

  <main class="qr-main">
    <div class="qr-container">
      <div class="qr-placeholder" id="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/>
          <rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
        </svg>
        <p style="font-size:0.78rem; text-align:center; color:#bbb;">Configura el acceso<br>y pulsa "Generar"</p>
      </div>
      <div id="qrcode"></div>
      <div class="qr-badge" id="qr-badge">
        <div class="rol" id="b-rol">—</div>
        <div class="exp" id="b-exp">—</div>
        <div class="token" id="b-token">—</div>
      </div>
    </div>
    <div class="instrucciones" id="instrucciones">
      <p style="color:#aaa; font-size:0.78rem; line-height:1.6;"><strong>Instrucciones:</strong><br>Escanea este código desde la App de Punto de Venta para autorizar el dispositivo automáticamente.</p>
    </div>
    <div class="historial">
      <div class="hist-title">Accesos recientes</div>
      <div id="hist-lista"></div>
    </div>
  </main>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

let currentUser = null;
let qrcodeInstance = null;
const ROLES = {bodega:'📦 Bodega', caja:'💰 Caja', vendedor:'📱 Vendedor', admin:'🏢 Admin', soporte:'💬 Soporte'};
const VENC = {'8h':'8 horas', '24h':'24 horas', '7d':'7 días', 'perm':'Permanente'};

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Cargar Sucursales
  const { data: sucursales } = await supabase
    .from('sucursales')
    .select('*')
    .eq('proveedor_id', currentUser.id);

  const sel = document.getElementById('f-sucursal');
  sel.innerHTML = '<option value="central">Central / Matriz</option>';
  sucursales?.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.nombre;
    sel.appendChild(opt);
  });

  cargarHistorial();
}

async function cargarHistorial() {
  const { data: accesos } = await supabase
    .from('accesos')
    .select('*')
    .eq('proveedor_id', currentUser.id)
    .order('creado_at', { ascending: false })
    .limit(5);

  const lista = document.getElementById('hist-lista');
  lista.innerHTML = accesos?.length ? '' : '<div style="color:#333;font-size:0.8rem;text-align:center;padding:20px;">Sin registros recientes</div>';
  
  accesos?.forEach(h => {
    const hora = new Date(h.creado_at).toLocaleTimeString('es-EC', {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = `<div><div class="hist-rol">${ROLES[h.rol] || h.rol}</div><div class="hist-info">${h.empleado} · ${hora}</div></div><div class="hist-exp">${VENC[h.vencimiento] || h.vencimiento}</div>`;
    lista.appendChild(div);
  });
}

window.generarQR = async function() {
  const rol = document.getElementById('f-rol').value;
  const sucursal = document.getElementById('f-sucursal').value;
  const venc = document.getElementById('f-vencimiento').value;
  const empleado = document.getElementById('f-empleado').value.trim() || 'Sin asignar';
  const token = Math.random().toString(36).slice(2, 10).toUpperCase();

  const payload = JSON.stringify({
    p_id: currentUser.id,
    s_id: sucursal,
    r: rol,
    v: venc,
    emp: empleado,
    tk: token,
    iat: new Date().toISOString()
  });

  // UI Updates
  document.getElementById('qr-placeholder').style.display = 'none';
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  qrDiv.style.display = 'block';

  new QRCode(qrDiv, {
    text: payload,
    width: 260,
    height: 260,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('b-rol').textContent = ROLES[rol];
  document.getElementById('b-exp').textContent = `Vence: ${VENC[venc]} · ${empleado}`;
  document.getElementById('b-token').textContent = 'TOKEN: ' + token;
  document.getElementById('qr-badge').style.display = 'block';
  document.getElementById('instrucciones').style.display = 'block';

  // Guardar en Supabase
  await supabase.from('accesos').insert([{
    proveedor_id: currentUser.id,
    sucursal_id: sucursal,
    rol: rol,
    vencimiento: venc,
    empleado: empleado,
    token: token
  }]);

  cargarHistorial();
};

document.getElementById('btn-generar').onclick = generarQR;

init();
</script>
</body>
</html>
