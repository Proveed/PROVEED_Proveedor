<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Servicio al Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:14px 10px; text-align:center; }
  .stat-val{ font-size:1.3rem; font-weight:800; color:white; }
  .stat-val.verde{ color:var(--verde); }
  .stat-val.rojo{ color:var(--rojo); }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-lbl{ font-size:0.6rem; color:#555; font-weight:600; text-transform:uppercase; margin-top:3px; }
  .tabs-row{ display:flex; gap:8px; padding:14px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:7px 14px; border-radius:20px; border:1px solid #222; background:transparent; font-size:0.76rem; font-weight:600; color:#555; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .tickets-lista{ padding:0 16px; }
  .ticket-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; margin-bottom:10px; cursor:pointer; transition:0.2s; }
  .ticket-card:hover{ border-color:#333; }
  .tick-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .tick-num{ font-size:0.85rem; font-weight:800; color:white; }
  .tick-fecha{ font-size:0.7rem; color:#555; }
  .tick-estado{ font-size:0.65rem; font-weight:700; padding:3px 10px; border-radius:20px; }
  .est-abierto{ background:rgba(255,77,77,0.12); color:var(--rojo); }
  .est-en-proceso{ background:rgba(255,140,0,0.12); color:var(--naranja); }
  .est-resuelto{ background:rgba(168,230,61,0.12); color:var(--verde); }
  .tick-cliente{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .tick-avatar{ width:28px; height:28px; border-radius:8px; background:rgba(168,230,61,0.12); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:800; color:var(--verde); flex-shrink:0; }
  .tick-nombre{ font-size:0.8rem; color:#aaa; }
  .tick-asunto{ font-size:0.85rem; font-weight:600; color:white; margin-bottom:4px; }
  .tick-preview{ font-size:0.76rem; color:#555; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:10px; }
  .tick-prioridad{ font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:6px; }
  .prio-alta{ background:rgba(255,77,77,0.12); color:var(--rojo); }
  .prio-media{ background:rgba(255,140,0,0.12); color:var(--naranja); }
  .prio-baja{ background:rgba(168,230,61,0.12); color:var(--verde); }
  .tick-actions{ display:flex; gap:8px; margin-top:10px; }
  .tick-btn{ flex:1; padding:8px; border-radius:9px; border:none; font-family:'Inter',sans-serif; font-size:0.74rem; font-weight:700; cursor:pointer; }
  .btn-resolver{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .btn-responder{ background:#1e1e1e; color:#aaa; }
  .empty{ text-align:center; padding:60px 20px; color:#444; }
  .empty svg{ width:52px; height:52px; stroke:#333; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty h3{ font-size:0.95rem; font-weight:700; color:#555; margin-bottom:6px; }
  .empty p{ font-size:0.82rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <div class="page-title">Servicio al Cliente</div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val rojo" id="st-abiertos">—</div><div class="stat-lbl">Abiertos</div></div>
  <div class="stat-box"><div class="stat-val naranja" id="st-proceso">—</div><div class="stat-lbl">En proceso</div></div>
  <div class="stat-box"><div class="stat-val verde" id="st-resueltos">—</div><div class="stat-lbl">Resueltos</div></div>
</div>

<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todos</div>
  <div class="vtab" onclick="filtrar('abierto',this)">Abiertos</div>
  <div class="vtab" onclick="filtrar('en-proceso',this)">En proceso</div>
  <div class="vtab" onclick="filtrar('resuelto',this)">Resueltos</div>
</div>

<div class="tickets-lista" id="tickets-lista">
  <div class="empty"><p>Cargando tickets...</p></div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="servicio.html"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>Servicio</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', tickets=[], filtroActual='todos';

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  cargarTickets();
})();

async function cargarTickets(){
  const { data } = await sb.from('tickets').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  tickets=data||[];
  document.getElementById('st-abiertos').textContent=tickets.filter(t=>t.estado==='abierto').length;
  document.getElementById('st-proceso').textContent=tickets.filter(t=>t.estado==='en-proceso').length;
  document.getElementById('st-resueltos').textContent=tickets.filter(t=>t.estado==='resuelto').length;
  renderTickets();
}

function renderTickets(){
  let lista=[...tickets];
  if(filtroActual!=='todos') lista=lista.filter(t=>t.estado===filtroActual);
  const cont=document.getElementById('tickets-lista');
  if(!lista.length){
    cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><h3>Sin tickets</h3><p>Los tickets de soporte de tus clientes aparecerán aquí</p></div>`;
    return;
  }
  cont.innerHTML='';
  lista.forEach(t=>{
    const div=document.createElement('div'); div.className='ticket-card';
    const est=t.estado||'abierto';
    const fecha=new Date(t.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'short'});
    const prio=t.prioridad||'media';
    div.innerHTML=`
      <div class="tick-header"><div><div class="tick-num">#TKT-${t.id.slice(-6).toUpperCase()}</div><div class="tick-fecha">${fecha}</div></div><span class="tick-estado est-${est}">${est}</span></div>
      <div class="tick-cliente"><div class="tick-avatar">${(t.cliente||'C')[0].toUpperCase()}</div><div class="tick-nombre">${t.cliente||'Cliente'}</div><span class="tick-prioridad prio-${prio}" style="margin-left:auto">${prio}</span></div>
      <div class="tick-asunto">${t.asunto||'Sin asunto'}</div>
      <div class="tick-preview">${t.descripcion||''}</div>
      <div class="tick-actions">
        <button class="tick-btn btn-responder" onclick="window.location.href='chat.html'">💬 Responder</button>
        ${est!=='resuelto'?`<button class="tick-btn btn-resolver" onclick="resolverTicket('${t.id}')">✓ Resolver</button>`:''}
      </div>`;
    cont.appendChild(div);
  });
}

window.filtrar=(f,el)=>{ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderTickets(); };
window.resolverTicket=async function(id){ await sb.from('tickets').update({estado:'resuelto'}).eq('id',id); cargarTickets(); };
</script>
</body>
</html>
