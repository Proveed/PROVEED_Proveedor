<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED — Dashboard Original</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --naranja: #FF8C00; --negro: #0A0A0A; --gris: #161616; --borde: #222; }
        
        body { 
            background-color: var(--negro); 
            font-family: 'DM Sans', sans-serif; 
            color: #FFF;
            padding-bottom: 100px;
        }

        /* Header Original */
        .header {
            padding: 60px 25px 30px;
            background: linear-gradient(180deg, #111 0%, #0A0A0A 100%);
            border-bottom: 1px solid var(--borde);
        }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 26px; color: var(--naranja); }
        .header p { font-size: 14px; color: #666; margin-top: 4px; }

        /* Grid de Cards */
        .grid-menu {
            padding: 20px;
            display: grid;
            gap: 15px;
        }

        .card {
            background: var(--gris);
            border: 1px solid var(--borde);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .card:active { transform: scale(0.96); background: #1f1f1f; }

        .icon-box {
            width: 55px;
            height: 55px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--naranja);
            margin-right: 18px;
        }

        .card-content { flex: 1; }
        .card-content h3 { font-size: 17px; font-weight: 700; color: #FFF; }
        .card-content p { font-size: 12px; color: #777; margin-top: 2px; }

        .arrow { color: #333; font-size: 14px; }

        /* Stats Rápidas */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 20px;
        }
        .stat-card {
            background: #111;
            padding: 18px;
            border-radius: 20px;
            border: 1px solid var(--borde);
            text-align: center;
        }
        .stat-card span { font-size: 11px; color: #555; text-transform: uppercase; font-weight: 700; }
        .stat-card h2 { font-size: 20px; color: #FFF; margin-top: 5px; font-family: 'Syne', sans-serif; }

        /* Tab Bar Navegación */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid var(--borde);
            z-index: 1000;
        }
        .tab-item { color: #444; text-decoration: none; font-size: 22px; }
        .tab-item.active { color: var(--naranja); }
    </style>
</head>
<body>

    <div class="header">
        <h1>PROVEED</h1>
        <p>Panel de Administración Proveedor</p>
    </div>

    <div class="grid-menu">
        
        <a href="chat_proveedor.html" class="card">
            <div class="icon-box"><i class="fas fa-comment-alt"></i></div>
            <div class="card-content">
                <h3>Mensajes</h3>
                <p>Chat con emprendedores</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="tips_proveedor.html" class="card">
            <div class="icon-box"><i class="fas fa-lightbulb"></i></div>
            <div class="card-content">
                <h3>Tips de Venta</h3>
                <p>Estrategias de crecimiento</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="mis_productos.html" class="card">
            <div class="icon-box"><i class="fas fa-box-open"></i></div>
            <div class="card-content">
                <h3>Mis Productos</h3>
                <p>Gestión de stock e inventario</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="proveed_seg.html" class="card">
            <div class="icon-box"><i class="fas fa-user-shield"></i></div>
            <div class="card-content">
                <h3>Proveed Seg</h3>
                <p>Seguridad y tokens antifraude</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

    </div>

    <div class="stats-container">
        <div class="stat-card">
            <span>Balance</span>
            <h2>$0.00</h2>
        </div>
        <div class="stat-card">
            <span>Pedidos</span>
            <h2>0</h2>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard_proveedor.html" class="tab-item active"><i class="fas fa-th-large"></i></a>
        <a href="chat_proveedor.html" class="tab-item"><i class="fas fa-envelope"></i></a>
        <a href="pedidos_proveedor.html" class="tab-item"><i class="fas fa-shopping-bag"></i></a>
        <a href="perfil_proveedor.html" class="tab-item"><i class="fas fa-user-circle"></i></a>
    </nav>

</body>
</html>
