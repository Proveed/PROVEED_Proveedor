<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Facturador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nueva{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:14px 10px; text-align:center; }
  .stat-val{ font-size:1.2rem; font-weight:800; color:white; }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-val.verde{ color:var(--verde); }
  .stat-lbl{ font-size:0.6rem; color:#555; font-weight:600; text-transform:uppercase; margin-top:3px; }
  .tabs-row{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:7px 14px; border-radius:20px; border:1px solid #222; background:transparent; font-size:0.76rem; font-weight:600; color:#555; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .facturas-lista{ padding:0 16px; }
  .factura-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; margin-bottom:10px; cursor:pointer; transition:0.2s; }
  .factura-card:hover{ border-color:#333; }
  .fac-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .fac-num{ font-size:0.88rem; font-weight:800; color:white; }
  .fac-fecha{ font-size:0.7rem; color:#555; }
  .fac-estado{ font-size:0.65rem; font-weight:700; padding:3px 10px; border-radius:20px; }
  .est-pagada{ background:rgba(168,230,61,0.12); color:var(--verde); }
  .est-pendiente{ background:rgba(255,140,0,0.12); color:var(--naranja); }
  .est-vencida{ background:rgba(255,77,77,0.12); color:var(--rojo); }
  .fac-cliente{ font-size:0.8rem; color:#aaa; margin-bottom:8px; }
  .fac-items{ font-size:0.75rem; color:#555; margin-bottom:10px; }
  .fac-footer{ display:flex; align-items:center; justify-content:space-between; }
  .fac-total{ font-size:1rem; font-weight:800; color:var(--naranja); }
  .fac-actions{ display:flex; gap:6px; }
  .fac-btn{ padding:6px 12px; border-radius:8px; border:none; font-family:'Inter',sans-serif; font-size:0.72rem; font-weight:700; cursor:pointer; }
  .btn-ver{ background:#1e1e1e; color:#aaa; }
  .btn-cobrar{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .empty{ text-align:center; padding:48px 20px; color:#444; }
  .empty svg{ width:52px; height:52px; stroke:#333; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty p{ font-size:0.85rem; }

  /* MODAL NUEVA FACTURA */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; max-height:92vh; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; border:1px solid #1e1e1e; border-bottom:none; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:14px auto 0; flex-shrink:0; }
  .modal-header{ padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e1e; flex-shrink:0; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; }
  .close-btn{ width:30px; height:30px; background:#1e1e1e; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .close-btn svg{ width:14px; height:14px; stroke:#666; fill:none; stroke-width:2.5; }
  .modal-body{ overflow-y:auto; padding:16px 16px 32px; flex:1; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; -webkit-appearance:none; }
  .field input:focus,.field textarea:focus{ border-color:var(--naranja); }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .items-lista{ margin-bottom:14px; }
  .item-fac{ display:flex; gap:8px; align-items:center; background:#1a1a1a; border-radius:11px; padding:10px 12px; margin-bottom:8px; border:1px solid #222; }
  .item-fac-info{ flex:1; }
  .item-fac-nombre{ font-size:0.82rem; color:white; font-weight:600; }
  .item-fac-sub{ font-size:0.7rem; color:#555; margin-top:1px; }
  .item-fac-total{ font-size:0.85rem; font-weight:700; color:var(--naranja); white-space:nowrap; }
  .del-item{ width:26px; height:26px; background:rgba(255,77,77,0.1); border-radius:8px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .del-item svg{ width:12px; height:12px; stroke:var(--rojo); fill:none; stroke-width:2.5; }
  .btn-add-item{ width:100%; padding:11px; background:#1a1a1a; border:1px dashed #333; border-radius:12px; color:#555; font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; margin-bottom:14px; }
  .total-fac-wrap{ background:#1a1a1a; border-radius:12px; padding:14px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; border:1px solid #222; }
  .total-fac-label{ font-size:0.82rem; color:#555; }
  .total-fac-val{ font-size:1.3rem; font-weight:800; color:var(--naranja); }
  .btn-crear-fac{ width:100%; padding:14px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; }

  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Facturador</div>
  </div>
  <button class="btn-nueva" onclick="abrirModal()">+ Nueva</button>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val naranja" id="st-total">$0</div><div class="stat-lbl">Total facturado</div></div>
  <div class="stat-box"><div class="stat-val" id="st-pendiente">0</div><div class="stat-lbl">Pendientes</div></div>
  <div class="stat-box"><div class="stat-val verde" id="st-pagadas">0</div><div class="stat-lbl">Pagadas</div></div>
</div>

<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todas</div>
  <div class="vtab" onclick="filtrar('pendiente',this)">Pendientes</div>
  <div class="vtab" onclick="filtrar('pagada',this)">Pagadas</div>
  <div class="vtab" onclick="filtrar('vencida',this)">Vencidas</div>
</div>

<div class="facturas-lista" id="facturas-lista">
  <div class="empty"><p>Cargando facturas...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-header">
      <span class="modal-title">Nueva Factura</span>
      <button class="close-btn" onclick="cerrarModalDirecto()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Cliente / Empresa *</label><input type="text" id="f-cliente" placeholder="Nombre del cliente"></div>
      <div class="field"><label>RUC o Cédula</label><input type="text" id="f-ruc" placeholder="1234567890"></div>
      <div class="field-row">
        <div class="field"><label>Fecha emisión</label><input type="date" id="f-fecha"></div>
        <div class="field"><label>Fecha vencimiento</label><input type="date" id="f-vence"></div>
      </div>
      <div class="field"><label>Notas</label><input type="text" id="f-notas" placeholder="Observaciones opcionales"></div>
      <div class="field"><label>Ítems de la factura</label></div>
      <div class="items-lista" id="items-lista"></div>
      <button class="btn-add-item" onclick="agregarItem()">+ Agregar ítem</button>
      <div class="total-fac-wrap"><div class="total-fac-label">Total</div><div class="total-fac-val" id="total-fac">$0.00</div></div>
      <button class="btn-crear-fac" onclick="crearFactura()">CREAR FACTURA →</button>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="facturador.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Facturas</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', todasFacturas=[], filtroActual='todos', itemsActuales=[];

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
  const vence=new Date(); vence.setDate(vence.getDate()+30);
  document.getElementById('f-vence').value=vence.toISOString().split('T')[0];
  cargarFacturas();
})();

async function cargarFacturas(){
  const { data } = await sb.from('facturas').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  todasFacturas=data||[];
  const total=todasFacturas.reduce((s,f)=>s+(f.total||0),0);
  const pendientes=todasFacturas.filter(f=>f.estado==='pendiente').length;
  const pagadas=todasFacturas.filter(f=>f.estado==='pagada').length;
  document.getElementById('st-total').textContent='$'+total.toFixed(0);
  document.getElementById('st-pendiente').textContent=pendientes;
  document.getElementById('st-pagadas').textContent=pagadas;
  renderFacturas();
}

function renderFacturas(){
  let lista=[...todasFacturas];
  if(filtroActual!=='todos') lista=lista.filter(f=>f.estado===filtroActual);
  const cont=document.getElementById('facturas-lista');
  if(!lista.length){ cont.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Sin facturas aún</p></div>'; return; }
  cont.innerHTML='';
  lista.forEach(f=>{
    const div=document.createElement('div'); div.className='factura-card';
    const est=f.estado||'pendiente';
    const fecha=new Date(f.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});
    div.innerHTML=`
      <div class="fac-header"><div><div class="fac-num">#FAC-${f.id.slice(-6).toUpperCase()}</div><div class="fac-fecha">${fecha}</div></div><span class="fac-estado est-${est}">${est}</span></div>
      <div class="fac-cliente">${f.cliente||'Sin cliente'} ${f.ruc?'· '+f.ruc:''}</div>
      <div class="fac-items">${(f.items||[]).length} ítem${(f.items||[]).length!==1?'s':''}</div>
      <div class="fac-footer">
        <div class="fac-total">$${Number(f.total||0).toFixed(2)}</div>
        <div class="fac-actions">
          ${est==='pendiente'?`<button class="fac-btn btn-cobrar" onclick="marcarPagada('${f.id}')">✓ Marcar pagada</button>`:''}
          <button class="fac-btn btn-ver">Ver detalle</button>
        </div>
      </div>`;
    cont.appendChild(div);
  });
}

window.filtrar=(f,el)=>{ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderFacturas(); };

window.abrirModal=function(){ itemsActuales=[]; renderItems(); document.getElementById('modal-overlay').classList.add('show'); };
window.cerrarModal=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
window.cerrarModalDirecto=()=>document.getElementById('modal-overlay').classList.remove('show');

window.agregarItem=function(){
  const nombre=prompt('Nombre del ítem:');
  if(!nombre) return;
  const cantidad=parseFloat(prompt('Cantidad:')||1);
  const precio=parseFloat(prompt('Precio unitario:')||0);
  itemsActuales.push({nombre,cantidad,precio,total:cantidad*precio});
  renderItems();
};

function renderItems(){
  const lista=document.getElementById('items-lista');
  if(!itemsActuales.length){ lista.innerHTML=''; actualizarTotal(); return; }
  lista.innerHTML=itemsActuales.map((it,i)=>`
    <div class="item-fac">
      <div class="item-fac-info"><div class="item-fac-nombre">${it.nombre}</div><div class="item-fac-sub">${it.cantidad} × $${it.precio.toFixed(2)}</div></div>
      <div class="item-fac-total">$${it.total.toFixed(2)}</div>
      <button class="del-item" onclick="eliminarItem(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`).join('');
  actualizarTotal();
}

window.eliminarItem=function(i){ itemsActuales.splice(i,1); renderItems(); };

function actualizarTotal(){
  const total=itemsActuales.reduce((s,i)=>s+i.total,0);
  document.getElementById('total-fac').textContent='$'+total.toFixed(2);
}

window.crearFactura=async function(){
  const cliente=document.getElementById('f-cliente').value.trim();
  if(!cliente){ alert('El nombre del cliente es obligatorio'); return; }
  if(!itemsActuales.length){ alert('Agrega al menos un ítem'); return; }
  const total=itemsActuales.reduce((s,i)=>s+i.total,0);
  await sb.from('facturas').insert({
    proveedor_id:userId,
    cliente,
    ruc:document.getElementById('f-ruc').value.trim(),
    fecha_emision:document.getElementById('f-fecha').value,
    fecha_vencimiento:document.getElementById('f-vence').value,
    notas:document.getElementById('f-notas').value.trim(),
    items:itemsActuales,
    total,
    estado:'pendiente'
  });
  document.getElementById('modal-overlay').classList.remove('show');
  cargarFacturas();
};

window.marcarPagada=async function(id){
  await sb.from('facturas').update({estado:'pagada'}).eq('id',id);
  cargarFacturas();
};
</script>
</body>
</html>
