<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mis Tips</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-weight:700; font-size:0.82rem; cursor:pointer; }

  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:white; border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat-val{ font-size:1.3rem; font-weight:800; color:var(--negro); }
  .stat-lbl{ font-size:0.6rem; color:#bbb; font-weight:600; text-transform:uppercase; margin-top:3px; }

  .tips-lista{ padding:14px 16px; }
  .tip-card{ background:white; border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .tip-preview{ width:100%; height:200px; background:#111; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .tip-preview video{ width:100%; height:100%; object-fit:cover; }
  .tip-estado{ position:absolute; top:10px; left:10px; padding:4px 10px; border-radius:20px; font-size:0.65rem; font-weight:700; text-transform:uppercase; }
  .est-activo{ background:rgba(168,230,61,0.9); color:#000; }
  .est-inactivo{ background:rgba(255,77,77,0.8); color:white; }
  
  .tip-body{ padding:14px 16px; }
  .tip-desc{ font-size:0.88rem; color:#333; line-height:1.5; margin-bottom:10px; }
  .tip-actions{ display:flex; gap:8px; }
  .tip-btn{ flex:1; padding:10px; border-radius:10px; border:none; font-size:0.78rem; font-weight:600; cursor:pointer; }
  .tip-btn-edit{ background:var(--gris); color:var(--negro); }

  /* MODAL */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.65); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:white; width:100%; max-height:92vh; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); padding:20px; overflow-y:auto; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  
  .video-upload-area{ border:2px dashed #e0e0e0; border-radius:16px; padding:28px 20px; text-align:center; cursor:pointer; background:#fafafa; position:relative; margin-bottom:14px; }
  .video-file-input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .btn-pub{ width:100%; padding:15px; background:var(--negro); color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer; }

  .upload-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; }
  .upload-overlay.show{ display:flex; }

  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:12px 0 24px; border-top:1px solid #eee; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; color:#ccc; text-decoration:none; font-size:0.6rem; font-weight:700; }
  .tab.active{ color:var(--naranja); }
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Mis Tips</div>
  </div>
  <button class="btn-nuevo" onclick="abrirModal()">+ Nuevo tip</button>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val" style="color:var(--naranja)" id="st-tips">0</div><div class="stat-lbl">Tips</div></div>
  <div class="stat-box"><div class="stat-val" id="st-vistas">0</div><div class="stat-lbl">Vistas</div></div>
  <div class="stat-box"><div class="stat-val" id="st-likes">0</div><div class="stat-lbl">Likes</div></div>
</div>

<div class="tips-lista" id="tips-lista"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="video-upload-area" id="video-upload-area">
      <div id="video-status">Toca para subir video (MP4)</div>
      <input type="file" accept="video/*" class="video-file-input" onchange="seleccionarVideo(this)">
    </div>
    <textarea id="f-desc" placeholder="Descripción del tip..." style="width:100%; height:100px; padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:15px; font-family:inherit;"></textarea>
    <button class="btn-pub" id="btn-pub" onclick="publicarTip()">PUBLICAR TIP</button>
    <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:15px; font-weight:600;">Cancelar</button>
  </div>
</div>

<div class="upload-overlay" id="upload-overlay">
  <h3 id="up-titulo">Subiendo...</h3>
  <div id="upload-pct" style="font-size:2rem; font-weight:900; margin:10px 0;">0%</div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><span>PANEL</span></a>
  <a class="tab active" href="tips.html"><span>TIPS</span></a>
  <a class="tab" href="productos.html"><span>PRODUCTOS</span></a>
</nav>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://pqoqirousggkjnkzxkhy.supabase.co', 'Sb_publishable_L8cdOOPzHe4ff3rkPr8x5Q_WTCF694I')

let currentUser = null, videoFile = null, misTips = [];

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }
  currentUser = session.user;
  cargarTips();
}

async function cargarTips() {
  const { data } = await supabase.from('tips').select('*').eq('proveedor_id', currentUser.id).order('creado_en', { ascending: false });
  misTips = data || [];
  renderTips();
}

function renderTips() {
  const lista = document.getElementById('tips-lista');
  document.getElementById('st-tips').textContent = misTips.length;
  lista.innerHTML = misTips.map(t => `
    <div class="tip-card">
      <div class="tip-preview">
        <video src="${t.video_url}" muted playsinline></video>
        <div class="tip-estado ${t.activo ? 'est-activo' : 'est-inactivo'}">${t.activo ? 'Activo' : 'Pausado'}</div>
      </div>
      <div class="tip-body">
        <div class="tip-desc">${t.descripcion}</div>
        <div class="tip-actions">
          <button class="tip-btn tip-btn-edit" onclick="toggleActivo('${t.id}', ${t.activo})">${t.activo ? 'Pausar' : 'Activar'}</button>
          <button class="tip-btn" style="background:#fff0f0; color:red;" onclick="eliminarTip('${t.id}')">Eliminar</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.seleccionarVideo = (el) => {
  videoFile = el.files[0];
  if(videoFile) document.getElementById('video-status').textContent = "Video listo: " + videoFile.name;
};

window.publicarTip = async () => {
  const desc = document.getElementById('f-desc').value;
  if(!desc || !videoFile) return alert("Completa los datos");

  document.getElementById('upload-overlay').classList.add('show');
  
  const fileName = `${currentUser.id}/${Date.now()}.mp4`;
  const { data: upData, error: upErr } = await supabase.storage.from('tips_videos').upload(fileName, videoFile);

  if(upErr) return alert("Error al subir");

  const { data: { publicUrl } } = supabase.storage.from('tips_videos').getPublicUrl(fileName);

  await supabase.from('tips').insert([{
    proveedor_id: currentUser.id,
    descripcion: desc,
    video_url: publicUrl,
    activo: true
  }]);

  document.getElementById('upload-overlay').classList.remove('show');
  cerrarModal();
  cargarTips();
};

window.toggleActivo = async (id, actual) => {
  await supabase.from('tips').update({ activo: !actual }).eq('id', id);
  cargarTips();
};

window.eliminarTip = async (id) => {
  if(confirm("¿Eliminar?")) {
    await supabase.from('tips').delete().eq('id', id);
    cargarTips();
  }
};

window.abrirModal = () => document.getElementById('modal-overlay').classList.add('show');
window.cerrarModal = () => document.getElementById('modal-overlay').classList.remove('show');

init();
</script>
</body>
</html>
