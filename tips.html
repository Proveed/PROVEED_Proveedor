<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Mis Tips</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--gris); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:white; border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat-val{ font-size:1.3rem; font-weight:800; color:var(--negro); }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-lbl{ font-size:0.6rem; color:#bbb; font-weight:600; text-transform:uppercase; margin-top:3px; }
  .tips-lista{ padding:14px 16px; }
  .tip-card{ background:white; border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .tip-preview{ width:100%; height:200px; background:#111; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .tip-preview video{ width:100%; height:100%; object-fit:cover; }
  .tip-preview-placeholder{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .tip-preview-placeholder svg{ width:40px; height:40px; stroke:#333; fill:none; stroke-width:1.5; }
  .tip-preview-placeholder span{ font-size:0.78rem; color:#444; }
  .tip-estado{ position:absolute; top:10px; left:10px; padding:4px 10px; border-radius:20px; font-size:0.65rem; font-weight:700; text-transform:uppercase; }
  .est-activo{ background:rgba(168,230,61,0.9); color:#000; }
  .est-inactivo{ background:rgba(255,77,77,0.8); color:white; }
  .tip-vistas{ position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:white; font-size:0.68rem; font-weight:600; padding:4px 10px; border-radius:20px; display:flex; align-items:center; gap:4px; }
  .tip-vistas svg{ width:12px; height:12px; stroke:white; fill:none; stroke-width:2; }
  .tip-body{ padding:14px 16px; }
  .tip-desc{ font-size:0.88rem; color:#333; line-height:1.5; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tip-meta{ display:flex; gap:14px; margin-bottom:12px; }
  .meta-item{ display:flex; align-items:center; gap:5px; font-size:0.76rem; color:#aaa; }
  .meta-item svg{ width:14px; height:14px; stroke:#bbb; fill:none; stroke-width:2; }
  .tip-prod-tag{ display:inline-flex; align-items:center; gap:6px; background:var(--gris); border-radius:8px; padding:5px 10px; font-size:0.74rem; color:#555; margin-bottom:12px; }
  .tip-prod-tag svg{ width:12px; height:12px; stroke:#888; fill:none; stroke-width:2; }
  .tip-actions{ display:flex; gap:8px; }
  .tip-btn{ flex:1; padding:10px; border-radius:10px; border:none; font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; }
  .tip-btn-edit{ background:var(--gris); color:var(--negro); }
  .tip-btn-toggle{ background:rgba(255,77,77,0.08); color:var(--rojo); }
  .tip-btn-toggle.activo{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .tip-btn-del{ background:rgba(255,77,77,0.08); color:var(--rojo); flex:0; padding:10px 14px; }
  .empty{ text-align:center; padding:48px 20px; color:#bbb; }
  .empty svg{ width:52px; height:52px; stroke:#ddd; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty p{ font-size:0.85rem; margin-bottom:16px; }
  .btn-crear{ display:inline-block; padding:12px 24px; background:var(--negro); color:white; border-radius:14px; font-weight:700; font-size:0.85rem; cursor:pointer; border:none; font-family:'Inter',sans-serif; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.65); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:white; width:100%; max-height:92vh; border-radius:24px 24px 0 0; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag-handle{ width:36px; height:4px; background:#e0e0e0; border-radius:4px; margin:14px auto 0; flex-shrink:0; }
  .modal-header{ padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f5f5f5; flex-shrink:0; }
  .modal-title{ font-size:1rem; font-weight:700; color:var(--negro); }
  .close-btn{ width:30px; height:30px; background:#f5f5f5; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .close-btn svg{ width:14px; height:14px; stroke:#666; fill:none; stroke-width:2.5; }
  .modal-body{ overflow-y:auto; padding:16px 16px 32px; flex:1; }
  .video-upload-area{ border:2px dashed #e0e0e0; border-radius:16px; padding:28px 20px; text-align:center; cursor:pointer; background:#fafafa; position:relative; margin-bottom:14px; transition:0.2s; }
  .video-upload-area.filled{ border-color:var(--azul); background:#f0f7ff; }
  .video-upload-area svg{ width:36px; height:36px; stroke:#ccc; fill:none; stroke-width:1.5; display:block; margin:0 auto 10px; }
  .video-upload-area.filled svg{ stroke:var(--azul); }
  .video-upload-title{ font-size:0.88rem; font-weight:600; color:#aaa; }
  .video-upload-area.filled .video-upload-title{ color:var(--azul); }
  .video-upload-sub{ font-size:0.72rem; color:#bbb; margin-top:4px; }
  .video-name{ font-size:0.78rem; color:var(--azul); margin-top:6px; display:none; }
  .video-upload-area.filled .video-name{ display:block; }
  .video-file-input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .video-preview-wrap{ width:100%; height:180px; background:#000; border-radius:14px; overflow:hidden; margin-bottom:14px; display:none; position:relative; }
  .video-preview-wrap.show{ display:block; }
  .video-preview-wrap video{ width:100%; height:100%; object-fit:cover; }
  .del-preview{ position:absolute; top:8px; right:8px; width:28px; height:28px; background:rgba(255,77,77,0.9); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .del-preview svg{ width:12px; height:12px; stroke:white; fill:none; stroke-width:3; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:var(--gris); border:1.5px solid #eee; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--negro); transition:border-color 0.2s; -webkit-appearance:none; }
  .field input:focus,.field textarea:focus{ border-color:var(--naranja); background:white; }
  .field textarea{ resize:none; height:80px; line-height:1.5; }
  .prod-selector{ display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; }
  .prod-opt{ display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--gris); border-radius:12px; cursor:pointer; border:1.5px solid transparent; transition:0.2s; }
  .prod-opt.selected{ border-color:var(--naranja); background:rgba(255,140,0,0.06); }
  .prod-opt img{ width:36px; height:36px; border-radius:8px; object-fit:cover; }
  .prod-opt-info{ flex:1; }
  .prod-opt-nombre{ font-size:0.82rem; font-weight:600; color:var(--negro); }
  .prod-opt-precio{ font-size:0.72rem; color:var(--naranja); }
  .prod-opt-check{ width:20px; height:20px; border:2px solid #e0e0e0; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.2s; }
  .prod-opt.selected .prod-opt-check{ border-color:var(--naranja); background:var(--naranja); }
  .prod-opt.selected .prod-opt-check::after{ content:'✓'; font-size:0.65rem; color:white; font-weight:800; }
  .btn-pub{ width:100%; padding:15px; background:var(--negro); color:white; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:8px; }
  .btn-pub:disabled{ opacity:0.5; cursor:not-allowed; }
  .upload-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; }
  .upload-overlay.show{ display:flex; }
  .upload-box{ background:white; border-radius:20px; padding:28px 24px; width:82%; max-width:300px; text-align:center; }
  .upload-box h3{ font-size:1rem; font-weight:700; margin-bottom:6px; color:var(--negro); }
  .upload-box p{ font-size:0.82rem; color:#aaa; margin-bottom:18px; }
  .upload-bar-track{ height:6px; background:#f0f0f0; border-radius:6px; overflow:hidden; }
  .upload-bar{ height:100%; background:var(--naranja); border-radius:6px; width:0%; transition:width 0.3s; }
  .upload-pct{ font-size:1.3rem; font-weight:800; color:var(--naranja); margin-top:10px; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; align-items:center; padding:10px 0 18px; border-top:1px solid #eee; box-shadow:0 -4px 20px rgba(0,0,0,0.06); z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#ccc; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.58rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="page-title">Mis Tips</div>
  </div>
  <button class="btn-nuevo" onclick="abrirModal()">+ Nuevo tip</button>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val naranja" id="st-tips">0</div><div class="stat-lbl">Tips</div></div>
  <div class="stat-box"><div class="stat-val" id="st-vistas">0</div><div class="stat-lbl">Vistas</div></div>
  <div class="stat-box"><div class="stat-val" id="st-likes">0</div><div class="stat-lbl">Likes</div></div>
</div>

<div class="tips-lista" id="tips-lista">
  <div class="empty"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><p>Cargando tips...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-titulo">Nuevo Tip</span>
      <button class="close-btn" onclick="cerrarModalDirecto()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="video-preview-wrap" id="video-preview-wrap">
        <video id="video-preview" playsinline muted></video>
        <button class="del-preview" onclick="borrarVideo()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="video-upload-area" id="video-upload-area">
        <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg>
        <div class="video-upload-title">Toca para subir tu video</div>
        <div class="video-upload-sub">MP4 · MOV · máx. 100MB</div>
        <div class="video-name" id="video-name-lbl">Sin video</div>
        <input type="file" accept="video/mp4,video/mov,video/quicktime,video/*" class="video-file-input" id="video-file" onchange="seleccionarVideo(this)">
      </div>
      <div class="field">
        <label>Descripción del tip *</label>
        <textarea id="f-desc" placeholder="Ej: ¿Sabías que nuestro denim tiene certificación OEKO-TEX?..."></textarea>
      </div>
      <div class="field">
        <label>Producto relacionado (opcional)</label>
        <div class="prod-selector" id="prod-selector">
          <div style="text-align:center;padding:10px;color:#bbb;font-size:0.82rem;">Cargando productos...</div>
        </div>
      </div>
      <button class="btn-pub" id="btn-pub" onclick="publicarTip()">PUBLICAR TIP</button>
    </div>
  </div>
</div>

<div class="upload-overlay" id="upload-overlay">
  <div class="upload-box">
    <h3 id="up-titulo">Subiendo video</h3>
    <p id="up-desc">Por favor espera, no cierres la app</p>
    <div class="upload-bar-track"><div class="upload-bar" id="upload-bar"></div></div>
    <div class="upload-pct" id="upload-pct">0%</div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Panel</span>
  </a>
  <a class="tab" href="productos.html">
    <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <span>Productos</span>
  </a>
  <a class="tab active" href="tips.html">
    <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg>
    <span>Tips</span>
  </a>
  <a class="tab" href="pedidos.html">
    <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    <span>Pedidos</span>
  </a>
  <a class="tab" href="chat.html">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chat</span>
  </a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, getDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null, userData = {};
let videoFile = null, productoSeleccionado = null;
let misTips = [], misProductos = [];
let editandoId = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  const snap = await getDoc(doc(db, 'usuarios', user.uid));
  if (snap.exists()) userData = snap.data();
  cargarTips();
  cargarProductos();
});

async function cargarTips() {
  try {
    const snap = await getDocs(query(collection(db, 'tips'), where('proveedorId', '==', currentUser.uid)));
    misTips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    misTips.sort((a, b) => (b.creadoEn?.toMillis?.() || 0) - (a.creadoEn?.toMillis?.() || 0));
    document.getElementById('st-tips').textContent = misTips.length;
    document.getElementById('st-vistas').textContent = misTips.reduce((s, t) => s + (t.vistas || 0), 0);
    document.getElementById('st-likes').textContent = misTips.reduce((s, t) => s + (t.likes || 0), 0);
    renderTips();
  } catch(e) { console.warn(e); }
}

function renderTips() {
  const lista = document.getElementById('tips-lista');
  if (!misTips.length) {
    lista.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><p>Aún no tienes tips</p><button class="btn-crear" onclick="abrirModal()">+ Crear primer tip</button></div>`;
    return;
  }
  lista.innerHTML = '';
  misTips.forEach(tip => {
    const div = document.createElement('div');
    div.className = 'tip-card';
    const activo = tip.activo !== false;
    div.innerHTML = `
      <div class="tip-preview">
        ${tip.videoURL ? `<video src="${tip.videoURL}" muted playsinline preload="metadata"></video>` : `<div class="tip-preview-placeholder"><svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.894L15 14"/><rect x="1" y="6" width="15" height="12" rx="2" ry="2"/></svg><span>Sin video</span></div>`}
        <div class="tip-estado ${activo ? 'est-activo' : 'est-inactivo'}">${activo ? 'Activo' : 'Inactivo'}</div>
        <div class="tip-vistas"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${tip.vistas || 0}</div>
      </div>
      <div class="tip-body">
        <div class="tip-desc">${tip.descripcion || 'Sin descripción'}</div>
        <div class="tip-meta">
          <div class="meta-item"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${tip.likes || 0} likes</div>
          <div class="meta-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${tip.comentarios || 0} comentarios</div>
        </div>
        ${tip.productoNombre ? `<div class="tip-prod-tag"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>${tip.productoNombre}</div>` : ''}
        <div class="tip-actions">
          <button class="tip-btn tip-btn-edit" onclick="editarTip('${tip.id}')">Editar</button>
          <button class="tip-btn tip-btn-toggle ${activo ? 'activo' : ''}" onclick="toggleActivo('${tip.id}',${activo})">${activo ? 'Pausar' : 'Activar'}</button>
          <button class="tip-btn tip-btn-del" onclick="eliminarTip('${tip.id}')">🗑</button>
        </div>
      </div>`;
    lista.appendChild(div);
  });
}

async function cargarProductos() {
  try {
    const snap = await getDocs(query(collection(db, 'productos'), where('proveedorId', '==', currentUser.uid), where('activo', '==', true)));
    misProductos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProductoSelector();
  } catch(e) {}
}

function renderProductoSelector() {
  const sel = document.getElementById('prod-selector');
  sel.innerHTML = '';
  const none = document.createElement('div');
  none.className = 'prod-opt' + (!productoSeleccionado ? ' selected' : '');
  none.innerHTML = `<div class="prod-opt-info"><div class="prod-opt-nombre">Sin producto vinculado</div></div><div class="prod-opt-check"></div>`;
  none.onclick = () => selProd('', none);
  sel.appendChild(none);
  misProductos.forEach(p => {
    const img = p.imagenes?.[0] || p.imagen || '';
    const div = document.createElement('div');
    div.className = 'prod-opt' + (productoSeleccionado === p.id ? ' selected' : '');
    div.innerHTML = `${img ? `<img src="${img}" alt="">` : ''}<div class="prod-opt-info"><div class="prod-opt-nombre">${p.nombre || 'Producto'}</div><div class="prod-opt-precio">$${Number(p.precio || 0).toFixed(2)}</div></div><div class="prod-opt-check"></div>`;
    div.onclick = () => selProd(p.id, div);
    sel.appendChild(div);
  });
}

function selProd(id, el) {
  productoSeleccionado = id || null;
  document.querySelectorAll('.prod-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

window.seleccionarVideo = function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 100 * 1024 * 1024) { alert('El video no puede pesar más de 100MB'); input.value = ''; return; }
  videoFile = file;
  const preview = document.getElementById('video-preview');
  preview.src = URL.createObjectURL(file);
  document.getElementById('video-preview-wrap').classList.add('show');
  document.getElementById('video-upload-area').classList.add('filled');
  document.getElementById('video-name-lbl').textContent = file.name;
};

window.borrarVideo = function() {
  videoFile = null;
  document.getElementById('video-preview').src = '';
  document.getElementById('video-preview-wrap').classList.remove('show');
  document.getElementById('video-upload-area').classList.remove('filled');
  document.getElementById('video-name-lbl').textContent = 'Sin video';
  document.getElementById('video-file').value = '';
};

window.abrirModal = function() {
  editandoId = null; videoFile = null; productoSeleccionado = null;
  document.getElementById('modal-titulo').textContent = 'Nuevo Tip';
  document.getElementById('f-desc').value = '';
  document.getElementById('btn-pub').textContent = 'PUBLICAR TIP';
  borrarVideo(); renderProductoSelector();
  document.getElementById('modal-overlay').classList.add('show');
};

window.editarTip = function(id) {
  const tip = misTips.find(t => t.id === id);
  if (!tip) return;
  editandoId = id;
  document.getElementById('modal-titulo').textContent = 'Editar Tip';
  document.getElementById('f-desc').value = tip.descripcion || '';
  document.getElementById('btn-pub').textContent = 'GUARDAR CAMBIOS';
  productoSeleccionado = tip.productoId || null;
  borrarVideo(); renderProductoSelector();
  document.getElementById('modal-overlay').classList.add('show');
};

window.cerrarModal = e => { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
window.cerrarModalDirecto = () => document.getElementById('modal-overlay').classList.remove('show');

function setProgress(pct, titulo, desc) {
  document.getElementById('upload-bar').style.width = pct + '%';
  document.getElementById('upload-pct').textContent = pct + '%';
  if (titulo) document.getElementById('up-titulo').textContent = titulo;
  if (desc) document.getElementById('up-desc').textContent = desc;
}

window.publicarTip = async function() {
  const desc = document.getElementById('f-desc').value.trim();
  if (!desc) { alert('Escribe una descripción'); return; }
  const btn = document.getElementById('btn-pub');
  btn.disabled = true;
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('upload-overlay').classList.add('show');
  try {
    let videoURL = '';
    if (videoFile) {
      setProgress(0, 'Subiendo video...', 'Por favor espera');
      const storageRef = ref(storage, `tips/${currentUser.uid}/tip_${Date.now()}`);
      const task = uploadBytesResumable(storageRef, videoFile);
      videoURL = await new Promise((resolve, reject) => {
        task.on('state_changed',
          s => setProgress(Math.round(s.bytesTransferred / s.totalBytes * 90)),
          err => reject(err),
          async () => resolve(await getDownloadURL(task.snapshot.ref))
        );
      });
    }
    setProgress(95, 'Guardando tip...', 'Casi listo');
    let prodData = {};
    if (productoSeleccionado) {
      const prod = misProductos.find(p => p.id === productoSeleccionado);
      if (prod) prodData = { productoId: prod.id, productoNombre: prod.nombre, productoImagen: prod.imagenes?.[0] || prod.imagen || '', productoPrecio: prod.precio };
    }
    const empresa = userData.empresa || userData.nombre || 'Proveedor';
    const datos = { proveedorId: currentUser.uid, proveedorNombre: empresa, ciudad: userData.ciudad || 'Ecuador', descripcion: desc, videoURL: videoURL || (editandoId ? (misTips.find(t => t.id === editandoId)?.videoURL || '') : ''), likes: 0, comentarios: 0, vistas: 0, activo: true, ...prodData };
    if (editandoId) {
      await updateDoc(doc(db, 'tips', editandoId), { descripcion: desc, ...prodData, ...(videoURL ? { videoURL } : {}) });
    } else {
      datos.creadoEn = serverTimestamp();
      await addDoc(collection(db, 'tips'), datos);
    }
    setProgress(100, '¡Listo!', 'Tip guardado');
    setTimeout(() => { document.getElementById('upload-overlay').classList.remove('show'); btn.disabled = false; cargarTips(); }, 800);
  } catch(e) {
    document.getElementById('upload-overlay').classList.remove('show');
    alert('Error: ' + e.message);
    btn.disabled = false;
    document.getElementById('modal-overlay').classList.add('show');
  }
};

window.toggleActivo = async (id, actual) => { await updateDoc(doc(db, 'tips', id), { activo: !actual }); cargarTips(); };
window.eliminarTip = async id => { if (!confirm('¿Eliminar este tip?')) return; await deleteDoc(doc(db, 'tips', id)); cargarTips(); };
</script>
