<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROVEED | Chat de Negocios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --v: #32CD32; --n: #050505; --g: #111; --rj: #ff4444; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--n); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER CON NOMBRE DEL CLIENTE */
        .chat-header { 
            padding: 15px 20px; background: #111; border-bottom: 1px solid #222; 
            display: flex; align-items: center; gap: 12px; z-index: 100;
        }
        .client-avatar { width: 40px; height: 40px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--v); }
        .client-name { font-weight: 900; font-size: 1rem; letter-spacing: -0.5px; }
        .client-status { font-size: 0.65rem; color: var(--v); display: block; font-weight: 400; }

        /* AREA DE CHAT */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        
        /* BURBUJAS DE MENSAJE */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.9rem; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--v); color: black; border-bottom-right-radius: 4px; font-weight: 600; }
        .msg.received { align-self: flex-start; background: #222; color: white; border-bottom-left-radius: 4px; }

        /* FICHA DE PRODUCTO */
        .product-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; overflow: hidden; max-width: 250px; align-self: flex-end; margin-top: 5px; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .product-card-body { padding: 12px; }

        /* PANEL DE STOCK */
        #stockPanel { 
            position: absolute; bottom: 85px; left: 0; right: 0; background: #111; 
            border-top: 2px solid var(--v); display: none; z-index: 200; 
            height: 380px; border-radius: 25px 25px 0 0;
        }

        /* BARRA DE ENTRADA Y BOTÓN DE ENVÍO */
        .chat-input-area { padding: 15px; background: #111; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .btn-stock { background: #000; color: var(--v); border: 1px solid var(--v); padding: 12px; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }
        
        .input-box-wrapper { flex: 1; background: #000; border: 1px solid #333; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; }
        input#msgInput { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 0.9rem; }
        
        .btn-send { background: var(--v); color: black; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .btn-send:active { transform: scale(0.9); }

        .search-bar { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

    <header class="chat-header">
        <div class="client-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#32CD32" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div>
            <span class="client-name">LUIS CHÁVEZ</span>
            <span class="client-status">● En línea</span>
        </div>
    </header>

    <div id="chatBox">
        <div class="msg received">Hola, estoy interesado en el stock de mochilas. ¿Tienes el catálogo actualizado?</div>
    </div>

    <div id="stockPanel">
        <div style="padding: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color:var(--v)">SELECCIONAR PRODUCTO</b>
                <span onclick="toggleStock()" style="color:var(--rj); cursor:pointer; font-weight:900; font-size:0.8rem;">CERRAR</span>
            </div>
            <input type="text" class="search-bar" id="stockSearch" placeholder="Buscar por Nombre o ID..." onkeyup="filterStock()">
            
            <div id="stockList" style="height:230px; overflow-y:auto;">
                <div class="stock-item" onclick="sendProduct('Mochila Pro-X', '$55.00', 'https://m.media-amazon.com/images/I/71R%2BlfXAn3L._AC_SL1500_.jpg')" style="display:flex; gap:10px; background:#000; padding:10px; border-radius:12px; margin-bottom:10px; cursor:pointer; border:1px solid #222;">
                    <img src="https://m.media-amazon.com/images/I/71R%2BlfXAn3L._AC_SL1500_.jpg" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                    <div><b style="font-size:0.8rem;">Mochila Pro-X</b><br><span style="font-size:0.6rem; color:#666;">ID: SKU-990</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <button class="btn-stock" onclick="toggleStock()">STOCK</button>
        <div class="input-box-wrapper">
            <input type="text" id="msgInput" placeholder="Escribe un mensaje seguro..." autocomplete="off">
            <button class="btn-send" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('msgInput');
        const chatBox = document.getElementById('chatBox');

        function toggleStock() {
            const panel = document.getElementById('stockPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function sendMessage() {
            const text = input.value.trim();
            if(text === "") return;

            // Filtro Anti-Fuga de Datos
            if(/\d{7,}/.test(text) || /whatsapp|09|telegram/i.test(text)) {
                alert("POR SEGURIDAD: No se permite enviar datos de contacto.");
                input.value = "";
                return;
            }

            const div = document.createElement('div');
            div.className = 'msg sent';
            div.innerText = text;
            chatBox.appendChild(div);
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendProduct(name, price, img) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${img}">
                <div class="product-card-body">
                    <b style="color:var(--v); font-size:0.85rem;">${name}</b>
                    <div style="font-weight:900; margin-top:5px;">${price}</div>
                    <button style="width:100%; background:var(--v); border:none; padding:8px; border-radius:8px; margin-top:10px; font-weight:900; font-size:0.7rem;">COMPRAR</button>
                </div>
            `;
            chatBox.appendChild(card);
            toggleStock();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
