<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Chat Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
(function(){
  const m=localStorage.getItem('proveed_modo')||'dark';
  document.addEventListener('DOMContentLoaded',function(){
    document.body.className=m;
  });
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--O:#FF8C00;--G:#A8E63D;--G2:#7BC234;--R:#FF4D4D;}

body.dark{background:#0A0A0A;color:white;}
body.light{background:#F5F6F2;color:#111;}
body{font-family:'Inter',sans-serif;height:100%;overflow:hidden;}
html,body{height:100%;overflow:hidden;}

#pLista{height:100%;display:flex;flex-direction:column;}
#pChat{height:100%;display:none;flex-direction:column;}

/* HEADER LISTA */
.hLista{padding:44px 16px 12px;border-bottom:2.5px solid var(--O);flex-shrink:0;}
body.dark .hLista{background:#111;}
body.light .hLista{background:#fff;}
.hTop{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hTit{font-size:1rem;font-weight:900;}
body.dark .hTit{color:#fff;}
body.light .hTit{color:#111;}
.hTit b{color:var(--O);}
.sBus{display:flex;align-items:center;gap:8px;border-radius:24px;padding:10px 14px;border:1.5px solid;}
body.dark .sBus{background:#1a1a1a;border-color:#222;}
body.light .sBus{background:#F5F6F2;border-color:#eee;}
.sBus svg{width:14px;height:14px;fill:none;stroke-width:2.5;flex-shrink:0;}
body.dark .sBus svg{stroke:#444;}
body.light .sBus svg{stroke:#bbb;}
.sBus input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:.86rem;}
body.dark .sBus input{color:#fff;}
body.light .sBus input{color:#111;}
.sBus input::placeholder{color:#555;}

/* LISTA */
.listaScroll{flex:1;overflow-y:auto;padding-bottom:80px;}
.chatItem{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid;cursor:pointer;}
body.dark .chatItem{background:#111;border-color:#1a1a1a;}
body.light .chatItem{background:#fff;border-color:#f0f0f0;}
body.dark .chatItem.new{border-left:3px solid var(--O);}
body.light .chatItem.new{border-left:3px solid var(--O);background:#fffaf5;}
.chatItem:active{opacity:.8;}
.ciAv{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.ciDot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--G);border-radius:50%;}
body.dark .ciDot{border:2px solid #111;}
body.light .ciDot{border:2px solid #fff;}
.ciInf{flex:1;min-width:0;}
.ciNom{font-size:.88rem;font-weight:700;margin-bottom:2px;}
body.dark .ciNom{color:#fff;}
body.light .ciNom{color:#111;}
.ciMsg{font-size:.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.dark .ciMsg{color:#444;}
body.light .ciMsg{color:#aaa;}
.ciR{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ciHora{font-size:.6rem;}
body.dark .ciHora{color:#333;}
body.light .ciHora{color:#bbb;}
.ciUnread{width:18px;height:18px;background:var(--O);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff;}
.vacio{text-align:center;padding:60px 20px;font-size:.82rem;line-height:1.7;}
body.dark .vacio{color:#333;}
body.light .vacio{color:#bbb;}

/* CHAT HEADER */
.cHead{padding:44px 12px 12px;border-bottom:2.5px solid var(--O);display:flex;align-items:center;gap:10px;flex-shrink:0;}
body.dark .cHead{background:#111;}
body.light .cHead{background:#fff;}
.cBack{width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
body.dark .cBack{background:rgba(255,140,0,.12);}
body.light .cBack{background:rgba(255,140,0,.1);}
.cBack svg{width:18px;height:18px;stroke:var(--O);fill:none;stroke-width:2.5;}
.cAv{width:40px;height:40px;border-radius:12px;font-size:.9rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cInf{flex:1;min-width:0;}
.cNom{font-size:.9rem;font-weight:800;}
body.dark .cNom{color:#fff;}
body.light .cNom{color:#111;}
.cSub{font-size:.68rem;color:var(--O);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cBts{display:flex;gap:6px;}
.cBt{width:32px;height:32px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
body.dark .cBt{background:rgba(255,140,0,.1);}
body.light .cBt{background:rgba(255,140,0,.1);}
.cBt svg{width:15px;height:15px;stroke:var(--O);fill:none;stroke-width:2;}

/* BANNER PRODUCTO */
.banProd{border-bottom:2px solid rgba(255,140,0,0.4);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
body.dark .banProd{background:#111;}
body.light .banProd{background:#fff8f0;}
.bpImg{width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
body.dark .bpImg{background:#1a1a1a;}
body.light .bpImg{background:#f0f0f0;}
.bpImg img{width:100%;height:100%;object-fit:cover;}
.bpInf{flex:1;min-width:0;}
.bpNom{font-size:.84rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.dark .bpNom{color:#fff;}
body.light .bpNom{color:#111;}
.bpPre{font-size:.74rem;color:var(--O);font-weight:800;margin-top:1px;}
.bpTag{font-size:.62rem;color:rgba(255,140,0,.6);margin-top:2px;}
.bpOfBtn{padding:7px 12px;background:var(--G);border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:800;color:#111;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* TARJETA REGLAMENTO — aparece solo la primera vez */
.reglamento-card{margin:10px 14px;border-radius:16px;padding:14px;flex-shrink:0;}
body.dark .reglamento-card{background:#1a1a1a;border:1.5px solid #333;}
body.light .reglamento-card{background:#fff8f0;border:1.5px solid rgba(255,140,0,.3);}
.reg-tit{font-size:.78rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
body.dark .reg-tit{color:#fff;}
body.light .reg-tit{color:#111;}
.reg-sub{font-size:.68rem;line-height:1.6;margin-bottom:10px;}
body.dark .reg-sub{color:#666;}
body.light .reg-sub{color:#888;}
.reg-item{font-size:.68rem;display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
body.dark .reg-item{color:#888;}
body.light .reg-item{color:#666;}
.reg-item span{color:var(--R);font-weight:800;flex-shrink:0;}
.reg-btn{width:100%;padding:9px;background:var(--O);color:#111;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;margin-top:8px;}

/* MENSAJES */
.msgsArea{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px;display:flex;flex-direction:column;gap:5px;}
body.dark .msgsArea{background:#0A0A0A;}
body.light .msgsArea{background:#F5F6F2;}

.msg{display:flex;flex-direction:column;}
.msg.yo{align-items:flex-end;}
.msg.el{align-items:flex-start;}
.bub{padding:10px 14px;border-radius:18px;font-size:.88rem;line-height:1.5;max-width:80%;word-break:break-word;cursor:pointer;}
.msg.yo .bub{background:var(--O);color:#fff;border-bottom-right-radius:4px;font-weight:500;}
body.dark .msg.el .bub{background:#1a1a1a;color:#fff;border-bottom-left-radius:4px;}
body.light .msg.el .bub{background:#fff;color:#111;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.mHora{font-size:.6rem;margin-top:3px;padding:0 4px;}
body.dark .mHora{color:#333;}
body.light .mHora{color:#bbb;}

/* IMAGEN EN CHAT */
.msg-img-wrap{max-width:220px;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;}
.msg-img-wrap img{width:100%;display:block;border-radius:14px;}
.msg-img-del{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(255,77,77,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.msg-img-del svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;}

/* MENU BORRAR */
.mOv{position:fixed;inset:0;z-index:699;display:none;}
.mOv.on{display:block;}
.mMenu{position:fixed;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:4px;z-index:700;border:1px solid;display:none;}
body.dark .mMenu{background:#1a1a1a;border-color:#333;}
body.light .mMenu{background:#fff;border-color:#eee;}
.mMenu.on{display:block;}
.mMenu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;background:transparent;border:none;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:600;color:var(--R);cursor:pointer;border-radius:8px;white-space:nowrap;}
.mMenu button svg{width:14px;height:14px;stroke:var(--R);fill:none;stroke-width:2.2;}

/* OFERTA */
.esp{display:flex;justify-content:center;width:100%;padding:4px 0;}
.ofertaC{border-radius:20px;padding:16px;width:94%;max-width:340px;box-shadow:0 4px 16px rgba(168,230,61,.08);}
body.dark .ofertaC{background:#111;border:2px solid var(--G);}
body.light .ofertaC{background:#fff;border:2px solid var(--G);}
.ofertaH{font-size:.62rem;font-weight:800;color:var(--G);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.ofertaItem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid;}
body.dark .ofertaItem{border-color:#1e1e1e;}
body.light .ofertaItem{border-color:#eee;}
.ofertaItem:last-of-type{border:none;}
.ofertaImg{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
body.dark .ofertaImg{background:#1a1a1a;}
body.light .ofertaImg{background:#f5f5f5;}
.ofertaImg img{width:100%;height:100%;object-fit:cover;}
.ofertaNom{font-size:.78rem;font-weight:600;}
body.dark .ofertaNom{color:#fff;}
body.light .ofertaNom{color:#111;}
.ofertaCant{font-size:.64rem;color:#444;}
.ofertaOrig{font-size:.68rem;color:#333;text-decoration:line-through;}
.ofertaNuevo{font-size:.92rem;font-weight:900;color:var(--G);}
.ofertaTot{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px;border-radius:12px;}
body.dark .ofertaTot{background:rgba(168,230,61,.05);}
body.light .ofertaTot{background:rgba(168,230,61,.08);}
.ofertaTotL{font-size:.8rem;font-weight:700;}
body.dark .ofertaTotL{color:#fff;}
body.light .ofertaTotL{color:#111;}
.ofertaTotV{font-size:1.1rem;font-weight:900;color:var(--G);}
.ofertaNota{font-size:.76rem;color:#555;font-style:italic;padding:8px 10px;border-radius:10px;margin-bottom:12px;line-height:1.5;}
body.dark .ofertaNota{background:#1a1a1a;}
body.light .ofertaNota{background:#f5f5f5;}
.ofertaSt{text-align:center;font-size:.74rem;font-weight:700;padding:8px;border-radius:12px;margin-top:4px;}
.ofertaSt.aceptado{background:rgba(168,230,61,.1);color:var(--G);}
.ofertaSt.rechazado{background:rgba(255,77,77,.06);color:var(--R);}
.ofertaHr{font-size:.58rem;color:#333;text-align:right;margin-top:8px;}

/* PROD INTERES */
.prodIntC{border-radius:18px;padding:14px;width:92%;max-width:340px;}
body.dark .prodIntC{background:#111;border:2px solid rgba(255,140,0,0.4);}
body.light .prodIntC{background:#fff;border:2px solid rgba(255,140,0,0.3);}

/* INPUT */
.inputArea{border-top:1px solid;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));flex-shrink:0;}
body.dark .inputArea{background:#111;border-color:#1e1e1e;}
body.light .inputArea{background:#fff;border-color:#eee;}
.extras{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;}
.extras::-webkit-scrollbar{display:none;}
.xBtn{padding:6px 12px;border-radius:20px;border:1.5px solid;font-family:'Inter',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
body.dark .xBtn{background:#1a1a1a;border-color:#222;color:#666;}
body.light .xBtn{background:#F5F6F2;border-color:#eee;color:#999;}
.xBtn.g{border-color:var(--G);color:var(--G);background:rgba(168,230,61,.06);}
.xBtn.o{border-color:var(--O);color:var(--O);background:rgba(255,140,0,.06);}
.iRow{display:flex;align-items:flex-end;gap:8px;}
.iBox{flex:1;border-radius:22px;padding:10px 14px;border:1.5px solid;display:flex;align-items:flex-end;}
body.dark .iBox{background:#1a1a1a;border-color:#222;}
body.light .iBox{background:#F5F6F2;border-color:#eee;}
textarea#ta{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:.9rem;resize:none;line-height:1.4;min-height:22px;max-height:120px;width:100%;caret-color:var(--O);}
body.dark textarea#ta{color:#fff!important;-webkit-text-fill-color:#fff!important;}
body.light textarea#ta{color:#111!important;-webkit-text-fill-color:#111!important;}
textarea#ta::placeholder{color:#555;}
.sBtn{width:42px;height:42px;background:var(--O);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sBtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;}
/* BOTÓN IMAGEN */
.img-btn{width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
body.dark .img-btn{background:#1a1a1a;}
body.light .img-btn{background:#F5F6F2;}
.img-btn svg{width:18px;height:18px;fill:none;stroke-width:2;}
body.dark .img-btn svg{stroke:#888;}
body.light .img-btn svg{stroke:#555;}

/* MODAL */
.modOv{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;z-index:500;}
.modOv.on{display:flex;}
.modSh{width:100%;border-radius:24px 24px 0 0;transform:translateY(100%);transition:.4s cubic-bezier(.16,1,.3,1);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid;}
body.dark .modSh{background:#111;border-color:#1e1e1e;}
body.light .modSh{background:#fff;border-color:#eee;}
.modOv.on .modSh{transform:translateY(0);}
.drag{width:36px;height:4px;background:#222;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modH{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid;flex-shrink:0;}
body.dark .modH{border-color:#1e1e1e;}
body.light .modH{border-color:#eee;}
.modT{font-size:.95rem;font-weight:800;}
body.dark .modT{color:#fff;}
body.light .modT{color:#111;}
.modX{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
body.dark .modX{background:#1a1a1a;}
body.light .modX{background:#F5F6F2;}
.modX svg{width:13px;height:13px;fill:none;stroke-width:2.5;}
body.dark .modX svg{stroke:#666;}
body.light .modX svg{stroke:#555;}
.modB{overflow-y:auto;padding:14px;flex:1;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:.65rem;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
body.dark .fld label{color:#444;}
body.light .fld label{color:#aaa;}
.fld input,.fld textarea{width:100%;padding:11px;border-radius:12px;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;resize:none;border:1.5px solid;}
body.dark .fld input,.fld textarea{background:#1a1a1a;border-color:#222;color:#fff;}
body.light .fld input,.fld textarea{background:#F5F6F2;border-color:#eee;color:#111;}
.negItem{border-radius:14px;padding:12px;margin-bottom:10px;}
body.dark .negItem{background:#1a1a1a;}
body.light .negItem{background:#F5F6F2;}
.niTop{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.niImg{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
body.dark .niImg{background:#222;}
body.light .niImg{background:#e0e0e0;}
.niImg img{width:100%;height:100%;object-fit:cover;}
.niNom{font-size:.82rem;font-weight:700;}
body.dark .niNom{color:#fff;}
body.light .niNom{color:#111;}
.niPre{font-size:.68rem;color:#555;}
.niRow{display:flex;align-items:center;gap:8px;}
.niInp{flex:1;padding:9px 12px;border:2px solid var(--G);border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:800;text-align:center;outline:none;}
body.dark .niInp{background:#222;color:#fff;}
body.light .niInp{background:#fff;color:#111;}
.niCant{width:70px;padding:9px 8px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.88rem;text-align:center;outline:none;border:1.5px solid;}
body.dark .niCant{background:#222;border-color:#333;color:#fff;}
body.light .niCant{background:#fff;border-color:#eee;color:#111;}
.niU{font-size:.68rem;color:#444;white-space:nowrap;}
.resNeg{border:1px solid rgba(168,230,61,.15);border-radius:14px;padding:14px;margin-bottom:14px;}
body.dark .resNeg{background:rgba(168,230,61,.05);}
body.light .resNeg{background:rgba(168,230,61,.06);}
.rRow{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:5px;}
body.dark .rRow{color:#444;}
body.light .rRow{color:#aaa;}
.rVal{font-weight:700;}
body.dark .rVal{color:#fff;}
body.light .rVal{color:#111;}
.rFin{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(168,230,61,.15);}
.rFinL{font-size:.88rem;font-weight:800;}
body.dark .rFinL{color:#fff;}
body.light .rFinL{color:#111;}
.rFinV{font-size:1rem;font-weight:900;color:var(--G);}
.btn1{width:100%;padding:14px;background:var(--G);color:#111;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;margin-bottom:8px;}
.btn2{width:100%;padding:12px;border-radius:14px;font-family:'Inter',sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;margin-bottom:8px;border:none;}
body.dark .btn2{background:#222;color:#fff;}
body.light .btn2{background:#eee;color:#111;}
.catBus{display:flex;align-items:center;gap:8px;border-radius:20px;padding:10px 14px;border:1.5px solid;margin-bottom:12px;}
body.dark .catBus{background:#1a1a1a;border-color:#222;}
body.light .catBus{background:#F5F6F2;border-color:#eee;}
.catBus svg{width:14px;height:14px;fill:none;stroke-width:2.5;flex-shrink:0;}
body.dark .catBus svg{stroke:#444;}
body.light .catBus svg{stroke:#bbb;}
.catBus input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:.86rem;}
body.dark .catBus input{color:#fff;}
body.light .catBus input{color:#111;}
.catGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.catCard{border-radius:14px;overflow:hidden;border:1px solid;cursor:pointer;}
body.dark .catCard{background:#1a1a1a;border-color:#222;}
body.light .catCard{background:#fff;border-color:#eee;}
.catCardImg{width:100%;height:90px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:2rem;}
body.dark .catCardImg{background:#222;}
body.light .catCardImg{background:#f0f0f0;}
.catCardImg img{width:100%;height:100%;object-fit:cover;}
.catCardBod{padding:8px;}
.catCardNom{font-size:.76rem;font-weight:700;margin-bottom:3px;}
body.dark .catCardNom{color:#fff;}
body.light .catCardNom{color:#111;}
.catCardPre{font-size:.86rem;font-weight:900;color:var(--O);}
.catCardBtn{width:100%;padding:6px;background:var(--G);color:#111;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:5px;}

/* TAB BAR */
.tabBar{border-top:1px solid;display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0;}
body.dark .tabBar{background:#111;border-color:#1a1a1a;}
body.light .tabBar{background:#fff;border-color:#eee;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;padding:4px 0;}
.tab svg{width:22px;height:22px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
body.dark .tab svg{stroke:#333;}
body.light .tab svg{stroke:#ccc;}

<script>
const {createClient}=supabase;
const db=createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
const Q=id=>document.getElementById(id);
let uid='',me={},chatAct=null,todos=[],msgsArr=[],canal=null,menuId=null;
let prodInteres=null,ofItems={},catAll=[],catModoOferta=false;
const QS=new URLSearchParams(location.search);

// REGLAMENTO — mostrar solo la primera vez
const REGLAMENTO_KEY='proveed_reglamento_prov_visto';

// PATRONES PROHIBIDOS
const PROHIBIDO=[
  /\b\d{7,}\b/g, // números de teléfono
  /https?:\/\/[^\s]+/gi, // links
  /wa\.me|whatsapp/gi,
  /instagram\.com|instagram/gi,
  /facebook\.com|facebook|fb\.com/gi,
  /t\.me|telegram/gi,
  /paypal|payphone|transfer|transferencia/gi,
];

function textoProhibido(txt){
  return PROHIBIDO.some(r=>r.test(txt));
}

(async()=>{
  const {data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html';return;}
  uid=session.user.id;
  const {data:u}=await db.from('usuarios').select('*').eq('id',uid).single();
  if(u)me=u;
  await cargarChats();
  const cId=QS.get('chat_id');
  if(cId){const c=todos.find(x=>x.id===cId);if(c)abrirChat(c);}
})();

async function cargarChats(){
  const {data,error}=await db.from('chats').select('*').eq('proveedor_id',uid);
  if(error){Q('lista').innerHTML=`<div class="vacio">Error: ${error.message}</div>`;return;}
  todos=(data||[]).sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  pintarLista(todos);
}

function pintarLista(arr){
  const c=Q('lista');
  if(!arr.length){c.innerHTML='<div class="vacio">Sin conversaciones aún.</div>';return;}
  c.innerHTML='';
  arr.forEach(ch=>{
    const nom=ch.emprendedor_nombre||'Emprendedor';
    const hora=ch.created_at?new Date(ch.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}):'';
    const d=document.createElement('div');
    d.className='chatItem'+((ch.no_leido_prov||0)>0?' new':'');
    d.innerHTML=`<div class="ciAv" style="background:${pal(nom)};">${nom[0].toUpperCase()}<div class="ciDot"></div></div>
      <div class="ciInf"><div class="ciNom">${nom}</div>${ch.producto_nombre?`<div style="font-size:.64rem;color:var(--O);font-weight:600;margin-bottom:2px;">📦 ${ch.producto_nombre}</div>`:''}<div class="ciMsg">${ch.ultimo_mensaje||'Nueva conversación'}</div></div>
      <div class="ciR"><div class="ciHora">${hora}</div>${(ch.no_leido_prov||0)>0?`<div class="ciUnread">${ch.no_leido_prov}</div>`:''}</div>`;
    d.onclick=()=>abrirChat(ch);c.appendChild(d);
  });
}

window.filtrar=q=>{const ql=q.toLowerCase();pintarLista(todos.filter(c=>(c.emprendedor_nombre||'').toLowerCase().includes(ql)||(c.ultimo_mensaje||'').toLowerCase().includes(ql)));};

async function abrirChat(chat){
  chatAct=chat;msgsArr=[];prodInteres=null;ofItems={};
  Q('banProd').style.display='none';
  Q('pLista').style.display='none';Q('pChat').style.display='flex';
  Q('msgs').innerHTML='<div style="text-align:center;padding:40px;color:#555;font-size:.82rem;">Cargando...</div>';
  const nom=chat.emprendedor_nombre||'Emprendedor';
  Q('cAv').textContent=nom[0].toUpperCase();Q('cAv').style.background=pal(nom);
  Q('cNom').textContent=nom;
  Q('cSub').textContent=chat.producto_nombre?`Interés en: ${chat.producto_nombre}`:nom;
  await db.from('chats').update({no_leido_prov:0}).eq('id',chat.id);
  await cargarMsgs();
  mostrarReglamentoSiPrimera();
  suscribir();
}

function mostrarReglamentoSiPrimera(){
  if(localStorage.getItem(REGLAMENTO_KEY))return;
  const card=document.createElement('div');
  card.className='reglamento-card';
  card.id='reg-card';
  card.innerHTML=`
    <div class="reg-tit">🔒 Política de seguridad PROVEED</div>
    <div class="reg-sub">Por la seguridad de todos los usuarios y para prevenir extorsiones, fraudes y pérdidas comerciales fuera de la plataforma, en PROVEED está prohibido compartir:</div>
    <div class="reg-item"><span>✕</span>Números de teléfono o celular</div>
    <div class="reg-item"><span>✕</span>Links de WhatsApp, Instagram o Facebook</div>
    <div class="reg-item"><span>✕</span>Links de pago externos (PayPal, Payphone, etc.)</div>
    <div class="reg-item"><span>✕</span>Cualquier enlace externo que saque la negociación fuera de PROVEED</div>
    <div class="reg-sub" style="margin-top:8px;">Los mensajes que contengan esta información serán bloqueados automáticamente.</div>
    <button class="reg-btn" onclick="cerrarReglamento()">✓ Entendido, continuar</button>`;
  Q('msgs').prepend(card);
}

window.cerrarReglamento=function(){
  localStorage.setItem(REGLAMENTO_KEY,'1');
  const c=Q('reg-card');if(c)c.remove();
};

async function cargarMsgs(){
  const {data,error}=await db.from('mensajes').select('*').eq('chat_id',chatAct.id).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  msgsArr=data||[];
  if(!prodInteres){
    for(let i=msgsArr.length-1;i>=0;i--){
      const m=msgsArr[i];
      if(m.data?.producto_id&&m.data?.producto_nombre){
        prodInteres={id:m.data.producto_id,nombre:m.data.producto_nombre,precio:m.data.producto_precio,imagen:m.data.producto_imagen||''};
        mostrarBannerProd();break;
      }
    }
    if(!prodInteres&&chatAct.producto_id){
      const {data:p}=await db.from('productos').select('*').eq('id',chatAct.producto_id).single();
      if(p){prodInteres={id:p.id,nombre:p.nombre,precio:p.precio,imagen:p.imagenes?.[0]||p.imagen||''};mostrarBannerProd();}
    }
  }
  pintarMsgs();
}

function mostrarBannerProd(){
  if(!prodInteres)return;
  Q('banProd').style.display='flex';
  Q('bpImg').innerHTML=prodInteres.imagen?`<img src="${prodInteres.imagen}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:'📦';
  Q('bpNom').textContent=prodInteres.nombre||'Producto';
  Q('bpPre').textContent=`Precio actual: $${Number(prodInteres.precio||0).toFixed(2)}`;
}

function pintarMsgs(){
  const w=Q('msgs');
  const regCard=Q('reg-card');
  if(!msgsArr.length){w.innerHTML='<div style="text-align:center;padding:50px 20px;color:#555;font-size:.84rem;">El emprendedor iniciará la conversación 💬</div>';if(regCard&&!Q('reg-card'))w.prepend(regCard);return;}
  w.innerHTML='';
  if(regCard)w.appendChild(regCard);
  msgsArr.forEach(m=>w.appendChild(mkBurbuja(m)));
  setTimeout(()=>w.scrollTop=w.scrollHeight,60);
}

function mkBurbuja(m){
  const yo=m.autor_id===uid;
  const hr=new Date(m.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  if(m.tipo==='negociacion')return mkOfertaBub(m,yo,hr);
  if(m.tipo==='carrito')return mkCarritoBub(m,yo,hr);
  if(m.tipo==='producto_interes')return mkProdInteresBub(m,yo,hr);

  // IMAGEN
  if(m.tipo==='imagen'){
    const d=document.createElement('div');d.className=`msg ${yo?'yo':'el'}`;
    const wrap=document.createElement('div');wrap.className='msg-img-wrap';
    wrap.innerHTML=`<img src="${m.url||''}" loading="lazy" onclick="verImg('${m.url||''}')">`;
    if(yo){
      const btn=document.createElement('button');btn.className='msg-img-del';
      btn.innerHTML=`<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      btn.onclick=()=>borrarMsgId(m.id);
      wrap.appendChild(btn);
    }
    const h=document.createElement('div');h.className='mHora';h.textContent=hr+(yo?' ✓✓':'');
    d.appendChild(wrap);d.appendChild(h);return d;
  }

  const d=document.createElement('div');d.className=`msg ${yo?'yo':'el'}`;
  const b=document.createElement('div');b.className='bub';b.textContent=m.texto||'';
  if(yo){
    let pt;
    b.addEventListener('touchstart',e=>{pt=setTimeout(()=>showMenu(m.id,e.touches[0].clientX,e.touches[0].clientY),600);},{passive:true});
    b.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('contextmenu',e=>{e.preventDefault();showMenu(m.id,e.clientX,e.clientY);});
  }
  const h=document.createElement('div');h.className='mHora';h.textContent=hr+(yo?' ✓✓':'');
  d.appendChild(b);d.appendChild(h);return d;
}

function mkProdInteresBub(m,yo,hr){
  const dat=m.data||{};
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='prodIntC';
  c.innerHTML=`<div style="font-size:.62rem;font-weight:800;color:var(--O);text-transform:uppercase;margin-bottom:10px;">📌 Producto solicitado</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div style="width:52px;height:52px;border-radius:12px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">
        ${dat.producto_imagen?`<img src="${dat.producto_imagen}" style="width:100%;height:100%;object-fit:cover;">`:'📦'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.86rem;font-weight:700;">${dat.producto_nombre||'Producto'}</div>
        <div style="font-size:.76rem;color:var(--O);font-weight:800;margin-top:2px;">$${Number(dat.producto_precio||0).toFixed(2)}</div>
        <div style="font-size:.64rem;color:#444;margin-top:2px;">El emprendedor quiere una oferta</div>
      </div>
    </div>
    <button onclick="abrirOfertaDesde('${dat.producto_id}','${(dat.producto_nombre||'').replace(/'/g,'')}',${dat.producto_precio||0},'${dat.producto_imagen||''}')" style="width:100%;padding:10px;background:var(--G);color:#111;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;">💰 Hacer oferta</button>
    <div style="font-size:.58rem;color:#333;text-align:right;margin-top:6px;">${hr}</div>`;
  w.appendChild(c);return w;
}

function mkOfertaBub(m,yo,hr){
  const dat=m.data||{},est=dat.estado||'pendiente';
  let items='';
  (dat.items||[]).forEach(it=>{
    items+=`<div class="ofertaItem">
      <div class="ofertaImg">${it.imagen?`<img src="${it.imagen}">`:'📦'}</div>
      <div style="flex:1;min-width:0;"><div class="ofertaNom">${it.nombre}</div><div class="ofertaCant">×${it.cantidad||1}</div></div>
      <div style="text-align:right;"><div class="ofertaOrig">$${Number(it.precioOriginal||0).toFixed(2)}</div><div class="ofertaNuevo">$${Number(it.precioOfertado||0).toFixed(2)}</div></div>
    </div>`;
  });
const tN=Number(dat.totalOfertado||0);
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='ofertaC';
  c.innerHTML=`<div class="ofertaH">💰 ${yo?'Tu oferta enviada':'Oferta del proveedor'}</div>
    ${items?`<div style="margin-bottom:4px;">${items}</div>`:''}
    <div class="ofertaTot"><span class="ofertaTotL">Total oferta</span><span class="ofertaTotV">$${tN.toFixed(2)}</span></div>
    ${dat.mensaje?`<div class="ofertaNota">"${esc(dat.mensaje)}"</div>`:''}
    <div class="ofertaSt ${est}">${est==='aceptado'?'✅ Emprendedor aceptó — pedido generado':est==='rechazado'?'❌ Emprendedor rechazó':'⏳ Esperando respuesta del emprendedor...'}</div>
    <div class="ofertaHr">${hr}</div>`;
  w.appendChild(c);return w;
}

function mkCarritoBub(m,yo,hr){
  const dat=m.data||{};let rows='';
  (dat.items||[]).forEach(it=>{rows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1e1e1e;"><div style="width:28px;height:28px;border-radius:7px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;">${it.imagen?`<img src="${it.imagen}" style="width:100%;height:100%;object-fit:cover;">`:'📦'}</div><div style="flex:1;min-width:0;"><div style="font-size:.76rem;font-weight:600;">${it.nombre}</div><div style="font-size:.62rem;color:#444;">×${it.cantidad||1}</div></div><div style="font-size:.78rem;font-weight:800;color:var(--O);">$${Number(it.precio||0).toFixed(2)}</div></div>`;});
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.style.cssText='border-radius:18px;padding:12px 14px;width:92%;max-width:340px;';
  if(document.body.classList.contains('dark')){c.style.background='#111';c.style.border='1.5px solid #1e1e1e';}
  else{c.style.background='#fff';c.style.border='1.5px solid #eee';}
  c.innerHTML=`<div style="font-size:.63rem;font-weight:800;color:#444;text-transform:uppercase;margin-bottom:8px;">📦 ${yo?'Tu carrito compartido':'Carrito del emprendedor'}</div>${rows}<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid #1e1e1e;"><span style="font-size:.72rem;color:#444;">Total</span><span style="font-size:.9rem;font-weight:900;color:var(--G);">$${Number(dat.total||0).toFixed(2)}</span></div><div style="font-size:.58rem;color:#333;text-align:right;margin-top:4px;">${hr}</div>`;
  w.appendChild(c);return w;
}

window.abrirOferta=function(){
  if(!prodInteres){toast('No hay producto de interés en este chat');return;}
  abrirOfertaDesde(prodInteres.id,prodInteres.nombre,prodInteres.precio,prodInteres.imagen);
};
window.abrirOfertaDesde=function(prodId,prodNom,prodPre,prodImg){
  if(!ofItems[prodId]){ofItems[prodId]={nombre:prodNom,precio:Number(prodPre||0),oferta:Number(prodPre||0),cantidad:1,imagen:prodImg||''};}
  pintarOfItems();calcRes();Q('ofNota').value='';
  Q('modOferta').classList.add('on');
};

function pintarOfItems(){
  const w=Q('ofItemsWrap');
  const keys=Object.keys(ofItems);
  if(!keys.length){w.innerHTML='<div style="text-align:center;padding:20px;color:#444;font-size:.8rem;border:2px dashed #222;border-radius:14px;margin-bottom:12px;">Sin productos. Agrega desde tu catálogo.</div>';Q('resNeg').style.display='none';return;}
  w.innerHTML='';
  keys.forEach(id=>{
    const it=ofItems[id];
    const d=document.createElement('div');d.className='negItem';
    d.innerHTML=`<div class="niTop">
      <div class="niImg">${it.imagen?`<img src="${it.imagen}">`:'📦'}</div>
      <div style="flex:1;"><div class="niNom">${it.nombre}</div><div class="niPre">Base: $${Number(it.precio).toFixed(2)}</div></div>
      <button onclick="quitarItem('${id}')" style="width:26px;height:26px;background:rgba(255,77,77,.15);border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 24 24" width="13" height="13" stroke="#FF4D4D" fill="none" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="niRow">
      <input class="niInp" type="number" value="${it.oferta}" min="0" step="0.01" oninput="updOf('${id}',this.value)">
      <input class="niCant" type="number" value="${it.cantidad}" min="1" oninput="updCant('${id}',this.value)">
      <span class="niU">und</span>
    </div>`;
    w.appendChild(d);
  });
  Q('resNeg').style.display='block';calcRes();
}

window.quitarItem=id=>{delete ofItems[id];pintarOfItems();toast('Producto quitado');};
window.updOf=(id,v)=>{if(ofItems[id])ofItems[id].oferta=parseFloat(v)||0;calcRes();};
window.updCant=(id,v)=>{if(ofItems[id])ofItems[id].cantidad=parseInt(v)||1;calcRes();};
function calcRes(){const keys=Object.keys(ofItems);if(!keys.length){Q('resNeg').style.display='none';return;}let o=0,f=0;keys.forEach(id=>{const p=ofItems[id];o+=p.precio*p.cantidad;f+=p.oferta*p.cantidad;});Q('rOrig').textContent='$'+o.toFixed(2);Q('rOfer').textContent='$'+f.toFixed(2);const a=o-f;Q('rAho').textContent='$'+Math.abs(a).toFixed(2);Q('rAho').style.color=a>0?'var(--G)':'#444';Q('resNeg').style.display='block';}

window.abrirCatEnOferta=async()=>{catModoOferta=true;Q('modCatTit').textContent='📦 Agregar a la oferta';await cargarCatalogo();Q('modCat').classList.add('on');};
window.abrirMiCatalogo=async()=>{catModoOferta=false;Q('modCatTit').textContent='📦 Mi catálogo';await cargarCatalogo();Q('modCat').classList.add('on');};
async function cargarCatalogo(){Q('catGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#333;font-size:.8rem;">Cargando...</div>';const {data}=await db.from('productos').select('*').eq('proveedor_id',uid).eq('activo',true).order('created_at',{ascending:false});catAll=data||[];pintarCat(catAll);}
function pintarCat(arr){const w=Q('catGrid');if(!arr.length){w.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#333;font-size:.8rem;">Sin productos</div>';return;}w.innerHTML='';arr.forEach(p=>{const img=p.imagenes?.[0]||p.imagen||'';const enOf=!!ofItems[p.id];const d=document.createElement('div');d.className='catCard';d.innerHTML=`<div class="catCardImg">${img?`<img src="${img}" loading="lazy">`:'📦'}</div><div class="catCardBod"><div class="catCardNom">${p.nombre||'Producto'}</div><div class="catCardPre">$${Number(p.precio||0).toFixed(2)}</div><button class="catCardBtn" style="${enOf?'background:#333;color:#888;':''}" onclick="addAOferta('${p.id}','${(p.nombre||'').replace(/'/g,'')}',${p.precio||0},'${img}')">${enOf?'✓ Ya agregado':'+ A la oferta'}</button></div>`;w.appendChild(d);});}
window.filtCat=q=>{const ql=q.toLowerCase();pintarCat(catAll.filter(p=>(p.nombre||'').toLowerCase().includes(ql)));};
window.addAOferta=(id,nombre,precio,imagen)=>{if(ofItems[id]){ofItems[id].cantidad++;toast(`+1 ${nombre.slice(0,20)}`);}else{ofItems[id]={nombre,precio:Number(precio),oferta:Number(precio),cantidad:1,imagen};}pintarCat(catAll);};
window.cerrarCat=()=>{Q('modCat').classList.remove('on');if(catModoOferta){pintarOfItems();calcRes();Q('modOferta').classList.add('on');catModoOferta=false;}};

window.enviarOferta=async()=>{
  const keys=Object.keys(ofItems);if(!keys.length){toast('Agrega al menos un producto');return;}
  const items=keys.map(id=>{const p=ofItems[id];return{id,nombre:p.nombre,cantidad:p.cantidad,imagen:p.imagen,precioOriginal:p.precio,precioOfertado:p.oferta};});
  const tO=items.reduce((s,i)=>s+i.precioOriginal*i.cantidad,0);
  const tN=items.reduce((s,i)=>s+i.precioOfertado*i.cantidad,0);
  const nota=Q('ofNota').value.trim();
  await db.from('mensajes').insert({chat_id:chatAct.id,autor_id:uid,autor_nombre:me.empresa||me.nombre||'Proveedor',texto:`💰 Oferta: $${tN.toFixed(2)} (${items.length} producto${items.length>1?'s':''})`,tipo:'negociacion',data:{items,totalOriginal:tO,totalOfertado:tN,mensaje:nota,estado:'pendiente',producto_id:prodInteres?.id,producto_nombre:prodInteres?.nombre,producto_precio:prodInteres?.precio,producto_imagen:prodInteres?.imagen},created_at:new Date().toISOString()});
  await db.from('chats').update({ultimo_mensaje:`💰 Oferta $${tN.toFixed(2)}`,no_leido_emp:(chatAct.no_leido_emp||0)+1}).eq('id',chatAct.id);
  ofItems={};Q('modOferta').classList.remove('on');await cargarMsgs();toast('✓ Oferta enviada');
};

// ENVIAR IMAGEN
window.enviarImagen=async function(input){
  const file=input.files[0];if(!file)return;input.value='';
  toast('Subiendo imagen...');
  const reader=new FileReader();
  reader.onload=async e=>{
    await db.from('mensajes').insert({chat_id:chatAct.id,autor_id:uid,autor_nombre:me.empresa||me.nombre||'Proveedor',texto:'',tipo:'imagen',url:e.target.result,created_at:new Date().toISOString()});
    await db.from('chats').update({ultimo_mensaje:'📷 Imagen',no_leido_emp:(chatAct.no_leido_emp||0)+1}).eq('id',chatAct.id);
    await cargarMsgs();toast('✓ Imagen enviada');
  };
  reader.readAsDataURL(file);
};

window.verImg=function(url){Q('lb-img').src=url;Q('lightbox').classList.add('on');};
window.cerrarLightbox=function(){Q('lightbox').classList.remove('on');};

window.enviar=async function(){
  const ta=Q('ta');const txt=ta.value.trim();
  if(!txt||!chatAct)return;
  // VERIFICAR CONTENIDO PROHIBIDO
  if(textoProhibido(txt)){
    toast('🚫 Mensaje bloqueado: no se permite compartir datos de contacto, links o pagos externos');
    return;
  }
  ta.value='';crecer(ta);ta.focus();
  await db.from('mensajes').insert({chat_id:chatAct.id,autor_id:uid,autor_nombre:me.empresa||me.nombre||'Proveedor',texto:txt,tipo:'texto',created_at:new Date().toISOString()});
  await db.from('chats').update({ultimo_mensaje:txt.slice(0,60),no_leido_emp:(chatAct.no_leido_emp||0)+1}).eq('id',chatAct.id);
  await cargarMsgs();
};
window.tecla=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}};
window.crecer=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

// BORRAR MENSAJE (excepto negociaciones)
function showMenu(id,x,y){
  const m=msgsArr.find(m=>m.id===id);
  if(m?.tipo==='negociacion'){toast('Las negociaciones no se pueden eliminar');return;}
  menuId=id;const mn=Q('mMenu');mn.style.left=Math.min(x,window.innerWidth-170)+'px';mn.style.top=Math.min(y,window.innerHeight-80)+'px';mn.classList.add('on');Q('mOv').classList.add('on');
}
window.cerrarMenu=()=>{Q('mMenu').classList.remove('on');Q('mOv').classList.remove('on');menuId=null;};
window.borrar=async()=>{if(!menuId)return;cerrarMenu();await borrarMsgId(menuId);};
async function borrarMsgId(id){
  const m=msgsArr.find(m=>m.id===id);
  if(m?.tipo==='negociacion'){toast('Las negociaciones no se pueden eliminar');return;}
  await db.from('mensajes').delete().eq('id',id);await cargarMsgs();toast('Mensaje eliminado');
}

function suscribir(){
  if(canal)db.removeChannel(canal);
  canal=db.channel('chat-prov-'+chatAct.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .subscribe();
}

function volver(){
  if(canal)db.removeChannel(canal);
  chatAct=null;prodInteres=null;ofItems={};msgsArr=[];
  Q('pChat').style.display='none';Q('pLista').style.display='flex';
  cargarChats();
}

const pal=n=>{const c=['#FF8C00','#007AFF','#A8E63D','#A855F7','#FF4D4D','#F59E0B'];return c[Math.abs((n||'').charCodeAt(0)||0)%c.length];};
window.cmod=(id,e)=>{if(e.target===Q(id))Q(id).classList.remove('on');};
const esc=t=>(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function toast(m){const t=Q('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
</script>
</body>
</html>
