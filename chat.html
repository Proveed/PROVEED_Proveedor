<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Chat Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--O:#FF8C00;--G:#A8E63D;--G2:#7BC234;--BG:#0A0A0A;--R:#FF4D4D;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--BG);}

#pLista{height:100%;display:flex;flex-direction:column;}
#pChat{height:100%;display:none;flex-direction:column;}

.hLista{background:#111;padding:44px 16px 12px;border-bottom:2.5px solid var(--O);flex-shrink:0;}
.hTop{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hTit{font-size:1rem;font-weight:900;color:#fff;}
.hTit b{color:var(--O);}
.sBus{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:24px;padding:10px 14px;border:1.5px solid #222;}
.sBus svg{width:14px;height:14px;stroke:#444;fill:none;stroke-width:2.5;flex-shrink:0;}
.sBus input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.86rem;color:#fff;}
.sBus input::placeholder{color:#333;}
.listaScroll{flex:1;overflow-y:auto;padding-bottom:80px;}

.chatItem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#111;border-bottom:1px solid #1a1a1a;cursor:pointer;}
.chatItem:active{background:#1a1a1a;}
.chatItem.new{border-left:3px solid var(--O);}
.ciAv{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0;position:relative;overflow:hidden;}
.ciAv img{width:100%;height:100%;object-fit:cover;}
.ciDot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--G);border-radius:50%;border:2px solid #111;}
.ciInf{flex:1;min-width:0;}
.ciNom{font-size:0.88rem;font-weight:700;color:#fff;margin-bottom:2px;}
.ciMsg{font-size:0.74rem;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ciR{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ciHora{font-size:0.6rem;color:#333;}
.ciUnread{width:18px;height:18px;background:var(--O);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:800;color:#fff;}
.vacio{text-align:center;padding:60px 20px;color:#333;font-size:0.82rem;line-height:1.7;}

.cHead{background:#111;padding:44px 12px 12px;border-bottom:2.5px solid var(--O);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cBack{width:36px;height:36px;background:rgba(255,140,0,.12);border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cBack svg{width:18px;height:18px;stroke:var(--O);fill:none;stroke-width:2.5;}
.cAv{width:40px;height:40px;border-radius:12px;font-size:0.9rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.cAv img{width:100%;height:100%;object-fit:cover;}
.cInf{flex:1;min-width:0;}
.cNom{font-size:0.9rem;font-weight:800;color:#fff;}
.cSub{font-size:0.68rem;color:var(--O);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cBts{display:flex;gap:6px;}
.cBt{width:32px;height:32px;border-radius:10px;background:rgba(255,140,0,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cBt svg{width:15px;height:15px;stroke:var(--O);fill:none;stroke-width:2;}

.banProd{background:#111;border-bottom:2px solid rgba(255,140,0,0.3);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bpImg{width:44px;height:44px;border-radius:10px;background:#1a1a1a;flex-shrink:0;overflow:hidden;}
.bpImg img{width:100%;height:100%;object-fit:cover;}
.bpInf{flex:1;min-width:0;}
.bpNom{font-size:0.82rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bpPre{font-size:0.74rem;color:var(--O);font-weight:800;margin-top:1px;}

.msgsArea{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px;background:var(--BG);display:flex;flex-direction:column;gap:5px;}

.inputArea{background:#111;border-top:1px solid #1e1e1e;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));flex-shrink:0;}
.extras{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;}
.extras::-webkit-scrollbar{display:none;}
.xBtn{padding:6px 12px;border-radius:20px;border:1.5px solid #222;background:#1a1a1a;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;color:#555;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.xBtn.g{border-color:var(--G);color:var(--G);background:rgba(168,230,61,.06);}
.xBtn.o{border-color:var(--O);color:var(--O);background:rgba(255,140,0,.06);}
.iRow{display:flex;align-items:flex-end;gap:8px;}
.iBox{flex:1;background:#1a1a1a;border-radius:22px;padding:10px 14px;border:1.5px solid #222;display:flex;align-items:flex-end;}
textarea#ta{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.9rem;color:#fff !important;-webkit-text-fill-color:#fff !important;resize:none;line-height:1.4;min-height:22px;max-height:120px;width:100%;display:block;caret-color:#fff;}
textarea#ta::placeholder{color:#444;}
.sBtn{width:42px;height:42px;background:var(--O);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sBtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;}

.msg{display:flex;flex-direction:column;}
.msg.yo{align-items:flex-end;}
.msg.el{align-items:flex-start;}
.bub{padding:10px 14px;border-radius:18px;font-size:0.88rem;line-height:1.5;max-width:80%;word-break:break-word;cursor:pointer;-webkit-user-select:none;user-select:none;}
.msg.yo .bub{background:var(--O);color:#fff;border-bottom-right-radius:4px;font-weight:500;}
.msg.el .bub{background:#1a1a1a;color:#fff;border-bottom-left-radius:4px;}
.mHora{font-size:0.6rem;color:#333;margin-top:3px;padding:0 4px;}

.mMenu{position:fixed;background:#1a1a1a;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:4px;z-index:700;border:1px solid #333;display:none;}
.mMenu.on{display:block;}
.mMenu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;background:transparent;border:none;font-family:'Inter',sans-serif;font-size:0.84rem;font-weight:600;color:var(--R);cursor:pointer;border-radius:8px;white-space:nowrap;}
.mMenu button svg{width:14px;height:14px;stroke:var(--R);fill:none;stroke-width:2.2;}
.mOv{position:fixed;inset:0;z-index:699;display:none;}
.mOv.on{display:block;}

.esp{display:flex;justify-content:center;width:100%;padding:4px 0;}
.negC{background:#111;border:2px solid var(--G);border-radius:18px;padding:14px;width:94%;max-width:340px;box-shadow:0 2px 10px rgba(168,230,61,.08);}
.negH{font-size:0.64rem;font-weight:800;color:var(--G);text-transform:uppercase;margin-bottom:8px;}
.negIt{display:flex;justify-content:space-between;font-size:0.75rem;padding:4px 0;border-bottom:1px solid #222;}
.negIt:last-child{border:none;}
.negTot{display:flex;align-items:center;gap:8px;margin:8px 0;}
.negOrig{font-size:0.8rem;color:#333;text-decoration:line-through;}
.negNew{font-size:1rem;font-weight:900;color:var(--G);}
.negNota{font-size:0.74rem;color:#555;font-style:italic;padding:8px;background:#1a1a1a;border-radius:8px;margin-bottom:10px;line-height:1.4;}
.negBts{display:flex;gap:6px;}
.nBt{flex:1;padding:9px 4px;border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:800;cursor:pointer;}
.nBt.ok{background:var(--G);color:#111;}
.nBt.no{background:rgba(255,77,77,.1);color:var(--R);}
.nBt.cnt{background:#1a1a1a;color:#666;}
.negSt{text-align:center;font-size:0.72rem;font-weight:700;padding:7px;border-radius:10px;margin-top:4px;}
.negSt.aceptado{background:rgba(168,230,61,.1);color:var(--G);}
.negSt.rechazado{background:rgba(255,77,77,.06);color:var(--R);}
.negSt.pendiente{background:rgba(255,140,0,.08);color:var(--O);}
.negHr{font-size:0.58rem;color:#333;text-align:right;margin-top:4px;}

.modOv{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;z-index:500;}
.modOv.on{display:flex;}
.modSh{background:#111;width:100%;border-radius:24px 24px 0 0;transform:translateY(100%);transition:.4s cubic-bezier(.16,1,.3,1);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid #1e1e1e;border-bottom:none;}
.modOv.on .modSh{transform:translateY(0);}
.drag{width:36px;height:4px;background:#222;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modH{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.modT{font-size:0.95rem;font-weight:800;color:#fff;}
.modX{width:28px;height:28px;background:#1a1a1a;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modX svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:2.5;}
.modB{overflow-y:auto;padding:16px 16px 40px;flex:1;}
.negMod-intro{font-size:0.8rem;color:#444;line-height:1.6;margin-bottom:14px;}
.negMod-item{background:#1a1a1a;border-radius:14px;padding:12px;margin-bottom:10px;}
.nmi-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.nmi-img{width:38px;height:38px;border-radius:9px;background:#222;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nmi-img img{width:100%;height:100%;object-fit:cover;}
.nmi-inf{flex:1;}
.nmi-nom{font-size:0.82rem;font-weight:700;color:#fff;}
.nmi-cant{font-size:0.68rem;color:#555;}
.nmi-row{display:flex;align-items:center;gap:10px;}
.nmi-orig{font-size:0.76rem;color:#333;text-decoration:line-through;white-space:nowrap;}
.nmi-inp{flex:1;padding:9px 12px;background:#222;border:2px solid var(--G);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:800;color:#fff;text-align:center;outline:none;}
.nmi-u{font-size:0.68rem;color:#444;white-space:nowrap;}
.resNeg{background:rgba(168,230,61,.05);border:1px solid rgba(168,230,61,.15);border-radius:14px;padding:14px;margin-bottom:14px;}
.rRow{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:5px;}
.rLbl{color:#444;}
.rVal{font-weight:700;color:#fff;}
.rFin{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(168,230,61,.15);}
.rFinL{font-size:0.88rem;font-weight:800;color:#fff;}
.rFinV{font-size:1rem;font-weight:900;color:var(--G);}
.btn1{width:100%;padding:14px;background:var(--G);color:#111;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:800;cursor:pointer;margin-bottom:8px;}
.btn2{width:100%;padding:12px;background:#222;color:#fff;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;}

.tabBar{background:#111;border-top:1px solid #1e1e1e;display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;padding:4px 0;}
.tab svg{width:22px;height:22px;stroke:#333;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:.55rem;font-weight:700;color:#333;text-transform:uppercase;}
.tab.on svg{stroke:var(--O);}
.tab.on span{color:var(--O);}
.tabRel{position:relative;}
.tabBadge{position:absolute;top:-2px;right:6px;background:var(--R);color:#fff;font-size:.5rem;font-weight:800;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #111;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;color:#fff;padding:10px 20px;border-radius:24px;font-size:.8rem;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:2000;white-space:nowrap;border:1px solid #333;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

const QS=new URLSearchParams(location.search);

(async()=>{
  const {data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html';return;}
  uid=session.user.id;
  const {data:u}=await db.from('usuarios').select('*').eq('id',uid).single();
  if(u) me=u;
  await cargarChats();
  const cId=QS.get('chat_id');
  if(cId){const c=todos.find(x=>x.id===cId);if(c) abrirChat(c);}
})();

async function cargarChats(){
  const {data}=await db.from('chats').select('*').eq('proveedor_id',uid).order('updated_at',{ascending:false});
  todos=data||[];pintarLista(todos);
}

function pintarLista(arr){
  const c=Q('lista');
  if(!arr.length){c.innerHTML='<div class="vacio">Sin conversaciones aún.<br>Los emprendedores te escribirán desde los productos.</div>';return;}
  c.innerHTML='';
  arr.forEach(ch=>{
    const nom=ch.emprendedor_nombre||'Emprendedor';
    const hora=ch.updated_at?new Date(ch.updated_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}):'';
    const d=document.createElement('div');
    d.className='chatItem'+(ch.no_leido_prov>0?' new':'');
    d.innerHTML=`
      <div class="ciAv" style="background:${pal(nom)};">${nom[0].toUpperCase()}<div class="ciDot"></div></div>
      <div class="ciInf"><div class="ciNom">${nom}</div><div class="ciMsg">${ch.ultimo_mensaje||'Nueva conversación'}</div></div>
      <div class="ciR"><div class="ciHora">${hora}</div>${ch.no_leido_prov>0?`<div class="ciUnread">${ch.no_leido_prov}</div>`:''}</div>`;
    d.onclick=()=>abrirChat(ch);
    c.appendChild(d);
  });
}

window.filtrar=q=>{
  const ql=q.toLowerCase();
  pintarLista(todos.filter(c=>(c.emprendedor_nombre||'').toLowerCase().includes(ql)||(c.ultimo_mensaje||'').toLowerCase().includes(ql)));
};

async function abrirChat(chat){
  chatAct=chat; msgsArr=[];
  // Limpiar producto anterior
  prodActual=null;
  Q('banProd').style.display='none';
  ultimaNegPendiente=null;

  Q('pLista').style.display='none';
  Q('pChat').style.display='flex';
  Q('msgs').innerHTML='<div style="text-align:center;padding:40px;color:#333;font-size:.82rem;">Cargando...</div>';

  const nom=chat.emprendedor_nombre||'Emprendedor';
  Q('cAv').textContent=nom[0].toUpperCase();
  Q('cAv').style.background=pal(nom);
  Q('cNom').textContent=nom;
  Q('cSub').textContent=nom;

  await db.from('chats').update({no_leido_prov:0}).eq('id',chat.id);
  await cargarMsgs();
  suscribir();
}

async function cargarMsgs(){
  const {data,error}=await db.from('mensajes').select('*').eq('chat_id',chatAct.id).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  msgsArr=data||[];

  // Detectar producto activo del último mensaje con producto
  // y la última negociación pendiente para poder contraofertar
  ultimaNegPendiente=null;
  for(let i=msgsArr.length-1;i>=0;i--){
    const m=msgsArr[i];
    if(m.tipo==='negociacion'&&m.data?.estado==='pendiente'&&m.autor_id!==uid){
      ultimaNegPendiente=m;
      break;
    }
  }
  // Detectar producto activo desde el último mensaje con prod_id
  for(let i=msgsArr.length-1;i>=0;i--){
    const m=msgsArr[i];
    if(m.data?.producto_nombre&&m.data?.producto_precio){
      if(!prodActual){
        prodActual={
          id:m.data.producto_id,
          nombre:m.data.producto_nombre,
          precio:m.data.producto_precio,
          imagen:m.data.producto_imagen||''
        };
        Q('banProd').style.display='flex';
        Q('bpImg').innerHTML=prodActual.imagen?`<img src="${prodActual.imagen}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:'';
        Q('bpNom').textContent=prodActual.nombre;
        Q('bpPre').textContent=`$${Number(prodActual.precio).toFixed(2)}`;
        Q('cSub').textContent=`Negociando: ${prodActual.nombre}`;
      }
      break;
    }
  }

  pintarMsgs();
}

function pintarMsgs(){
  const w=Q('msgs');
  if(!msgsArr.length){w.innerHTML='<div style="text-align:center;padding:50px 20px;color:#333;font-size:.84rem;">¡Responde al emprendedor! 👋</div>';return;}
  w.innerHTML='';
  msgsArr.forEach(m=>w.appendChild(mkBurbuja(m)));
  setTimeout(()=>w.scrollTop=w.scrollHeight,60);
}

function mkBurbuja(m){
  const yo=m.autor_id===uid;
  const hr=new Date(m.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  if(m.tipo==='negociacion') return mkNegBub(m,yo,hr);
  if(m.tipo==='carrito') return mkCartBub(m,yo,hr);

  const d=document.createElement('div');d.className=`msg ${yo?'yo':'el'}`;
  const b=document.createElement('div');b.className='bub';b.textContent=m.texto||'';
  if(yo){
    let pt;
    b.addEventListener('touchstart',e=>{pt=setTimeout(()=>showMenu(m.id,e.touches[0].clientX,e.touches[0].clientY),600);},{passive:true});
    b.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('contextmenu',e=>{e.preventDefault();showMenu(m.id,e.clientX,e.clientY);});
  }
  const h=document.createElement('div');h.className='mHora';h.textContent=hr+(yo?' ✓✓':'');
  d.appendChild(b);d.appendChild(h);return d;
}

function mkNegBub(m,yo,hr){
  const dat=m.data||{},est=dat.estado||'pendiente';
  // Proveedor puede responder propuestas del EMPRENDEDOR (no yo)
  // Emprendedor puede responder propuestas del PROVEEDOR (yo en este archivo)
  const puedeResp=!yo&&est==='pendiente';
  let items='';
  (dat.items||[]).forEach(it=>{
    items+=`<div class="negIt">
      <span style="flex:1;color:#555;">${it.nombre} ×${it.cantidad||1}</span>
      <span style="color:#333;text-decoration:line-through;margin-right:6px;">$${Number(it.precioOriginal||0).toFixed(2)}</span>
      <span style="font-weight:800;color:var(--G);">$${Number(it.precioOfertado||0).toFixed(2)}</span>
    </div>`;
  });
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='negC';
  c.innerHTML=`
    <div class="negH">${yo?'💰 Tu oferta enviada':'🤝 Propuesta del emprendedor'}</div>
    ${items?`<div style="margin-bottom:8px;">${items}</div>`:''}
    <div class="negTot">
      <span class="negOrig">$${Number(dat.totalOriginal||0).toFixed(2)}</span>
      <span style="color:#333;margin:0 6px;">→</span>
      <span class="negNew">$${Number(dat.totalOfertado||0).toFixed(2)}</span>
    </div>
    ${dat.mensaje?`<div class="negNota">"${esc(dat.mensaje)}"</div>`:''}
    ${puedeResp
      ?`<div class="negBts">
          <button class="nBt ok" onclick="respNeg('${m.id}','aceptado')">✓ Aceptar</button>
          <button class="nBt cnt" onclick="prepContra('${m.id}')">🔄 Contraofertar</button>
          <button class="nBt no" onclick="respNeg('${m.id}','rechazado')">✕ Rechazar</button>
        </div>`
      :`<div class="negSt ${est}">${est==='aceptado'?'✅ Aceptado — pedido en camino':est==='rechazado'?'❌ Rechazada':'⏳ Esperando respuesta...'}</div>`
    }
    <div class="negHr">${hr}</div>`;
  w.appendChild(c);return w;
}

function mkCartBub(m,yo,hr){
  const dat=m.data||{};let rows='';
  (dat.items||[]).forEach(it=>{
    rows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1a1a1a;">
      <div style="width:28px;height:28px;border-radius:7px;background:#1a1a1a;overflow:hidden;flex-shrink:0;">
        ${it.imagen?`<img src="${it.imagen}" style="width:100%;height:100%;object-fit:cover;">`:''}
      </div>
      <div style="flex:1;"><div style="font-size:.76rem;font-weight:600;color:#fff;">${it.nombre}</div><div style="font-size:.62rem;color:#444;">×${it.cantidad||1}</div></div>
      <div style="font-size:.78rem;font-weight:800;color:var(--O);">$${Number(it.precio||0).toFixed(2)}</div>
    </div>`;
  });
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');
  c.style.cssText='background:#111;border:1.5px solid #1e1e1e;border-radius:18px;padding:12px 14px;width:92%;max-width:340px;';
  c.innerHTML=`
    <div style="font-size:.63rem;font-weight:800;color:#444;text-transform:uppercase;margin-bottom:8px;">📦 ${yo?'Carrito enviado':'Carrito del emprendedor'}</div>
    ${rows}
    <div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid #1e1e1e;">
      <span style="font-size:.72rem;color:#444;">Total</span>
      <span style="font-size:.9rem;font-weight:900;color:var(--G);">$${Number(dat.total||0).toFixed(2)}</span>
    </div>
    <div style="font-size:.58rem;color:#333;text-align:right;margin-top:4px;">${hr}</div>`;
  w.appendChild(c);return w;
}

// ENVIAR MENSAJE
window.enviar=async function(){
  const ta=Q('ta');const txt=ta.value.trim();
  if(!txt||!chatAct)return;
  ta.value='';crecer(ta);ta.focus();
  await db.from('mensajes').insert({
    chat_id:chatAct.id,autor_id:uid,
    autor_nombre:me.empresa||me.nombre||'Proveedor',
    texto:txt,tipo:'texto',
    created_at:new Date().toISOString()
  });
  await db.from('chats').update({
    ultimo_mensaje:txt.slice(0,60),
    no_leido_emp:(chatAct.no_leido_emp||0)+1,
    updated_at:new Date().toISOString()
  }).eq('id',chatAct.id);
  await cargarMsgs();
};
window.tecla=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}};
window.crecer=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

function showMenu(id,x,y){
  menuId=id;const m=Q('mMenu');
  m.style.left=Math.min(x,window.innerWidth-170)+'px';
  m.style.top=Math.min(y,window.innerHeight-80)+'px';
  m.classList.add('on');Q('mOv').classList.add('on');
}
window.cerrarMenu=()=>{Q('mMenu').classList.remove('on');Q('mOv').classList.remove('on');menuId=null;};
window.borrar=async()=>{
  if(!menuId)return;cerrarMenu();
  await db.from('mensajes').delete().eq('id',menuId);
  await cargarMsgs();toast('Mensaje eliminado');
};

// ABRIR NEGOCIAR — proveedor propone precio
window.abrirNeg=function(){
  if(!prodActual){toast('No hay producto activo en este chat');return;}
  Q('modNegTit').textContent='💰 Proponer precio especial';
  Q('modNegIntro').textContent='Ofrece un precio especial al emprendedor.';
  negIt={};
  negIt[prodActual.id]={
    nombre:prodActual.nombre,
    precio:Number(prodActual.precio||0),
    oferta:Number(prodActual.precio||0),
    cantidad:1,
    imagen:prodActual.imagen||''
  };
  pintarNegItems();calcRes();Q('negNota').value='';
  Q('modNeg').classList.add('on');
};

// PREPARAR CONTRAOFERTA — sobre la propuesta del emprendedor
window.abrirNegContra=function(){
  if(!ultimaNegPendiente){toast('No hay propuesta pendiente del emprendedor');return;}
  Q('modNegTit').textContent='🔄 Contraofertar';
  Q('modNegIntro').textContent='Haz una contraoferta a la propuesta del emprendedor.';
  const dat=ultimaNegPendiente.data||{};
  negIt={};
  (dat.items||[]).forEach(it=>{
    negIt[it.id]={
      nombre:it.nombre,
      precio:it.precioOriginal,
      oferta:it.precioOfertado, // parte de su oferta
      cantidad:it.cantidad||1,
      imagen:it.imagen||''
    };
  });
  pintarNegItems();calcRes();Q('negNota').value='';
  Q('modNeg').classList.add('on');
};

// DESDE BURBUJA — botón contraofertar
window.prepContra=function(msgId){
  const m=msgsArr.find(x=>x.id===msgId);
  if(!m)return;
  ultimaNegPendiente=m;
  abrirNegContra();
};

function pintarNegItems(){
  const w=Q('negItems');w.innerHTML='';
  Object.entries(negIt).forEach(([id,it])=>{
    const d=document.createElement('div');d.className='negMod-item';
    d.innerHTML=`
      <div class="nmi-top">
        <div class="nmi-img">${it.imagen?`<img src="${it.imagen}">`:''}</div>
        <div class="nmi-inf"><div class="nmi-nom">${it.nombre}</div><div class="nmi-cant">Precio base: $${Number(it.precio).toFixed(2)}</div></div>
      </div>
      <div class="nmi-row">
        <span class="nmi-orig">$${Number(it.precio).toFixed(2)}</span>
        <input class="nmi-inp" type="number" value="${it.oferta}" min="0" step="0.01" oninput="updNeg('${id}',this.value)">
        <span class="nmi-u">tu precio</span>
      </div>`;
    w.appendChild(d);
  });
}
window.updNeg=(id,v)=>{if(negIt[id])negIt[id].oferta=parseFloat(v)||0;calcRes();};
function calcRes(){
  let o=0,f=0;Object.values(negIt).forEach(p=>{o+=p.precio*p.cantidad;f+=p.oferta*p.cantidad;});
  Q('rOrig').textContent='$'+o.toFixed(2);
  Q('rOfer').textContent='$'+f.toFixed(2);
  const a=o-f;Q('rAho').textContent='$'+Math.abs(a).toFixed(2);
  Q('rAho').style.color=a>0?'var(--G)':'#444';
}

// ENVIAR NEGOCIACIÓN
window.envNeg=async()=>{
  if(!chatAct)return;
  const items=Object.entries(negIt).map(([id,p])=>({
    id,nombre:p.nombre,cantidad:p.cantidad,imagen:p.imagen,
    precioOriginal:p.precio,precioOfertado:p.oferta
  }));
  const tO=items.reduce((s,i)=>s+i.precioOriginal*i.cantidad,0);
  const tN=items.reduce((s,i)=>s+i.precioOfertado*i.cantidad,0);
  const nota=Q('negNota').value.trim();

  // Si es contraoferta, marcar la propuesta anterior como contrarrestada
  if(ultimaNegPendiente){
    await db.from('mensajes').update({data:{...ultimaNegPendiente.data,estado:'contrarrestada'}}).eq('id',ultimaNegPendiente.id);
    ultimaNegPendiente=null;
  }

  await db.from('mensajes').insert({
    chat_id:chatAct.id,autor_id:uid,
    autor_nombre:me.empresa||me.nombre||'Proveedor',
    texto:`💰 Oferta especial: $${tN.toFixed(2)}`,tipo:'negociacion',
    data:{
      items,totalOriginal:tO,totalOfertado:tN,
      mensaje:nota,estado:'pendiente',
      producto_id:prodActual?.id,
      producto_nombre:prodActual?.nombre,
      producto_precio:prodActual?.precio,
      producto_imagen:prodActual?.imagen
    },
    created_at:new Date().toISOString()
  });
  await db.from('chats').update({
    ultimo_mensaje:`💰 Oferta $${tN.toFixed(2)}`,
    no_leido_emp:(chatAct.no_leido_emp||0)+1,
    updated_at:new Date().toISOString()
  }).eq('id',chatAct.id);
  Q('modNeg').classList.remove('on');
  await cargarMsgs();toast('✓ Oferta enviada');
};

// RESPONDER PROPUESTA DEL EMPRENDEDOR
window.respNeg=async(msgId,estado)=>{
  const m=msgsArr.find(x=>x.id===msgId);if(!m)return;
  const dat={...m.data,estado};
  await db.from('mensajes').update({data:dat}).eq('id',msgId);

  if(estado==='aceptado'&&m.data?.items){
    // Crear pedido automáticamente al aceptar
    const items=m.data.items.map(it=>({
      id:it.id,nombre:it.nombre,
      precio:it.precioOfertado,
      cantidad:it.cantidad,imagen:it.imagen||''
    }));
    const total=items.reduce((s,i)=>s+i.precio*i.cantidad,0);
    await db.from('pedidos').insert({
      emprendedor_id:chatAct.emprendedor_id,
      emprendedor_nombre:chatAct.emprendedor_nombre||'',
      proveedor_id:uid,
      nombre_proveedor:me.empresa||me.nombre||'Proveedor',
      items,total,
      estado:'confirmado',
      origen:'chat_negociacion',
      metodo_pago:'a_coordinar'
    });
    await db.from('mensajes').insert({
      chat_id:chatAct.id,autor_id:uid,
      autor_nombre:me.empresa||me.nombre||'Proveedor',
      texto:`✅ ¡Acepté la propuesta! Precio acordado: $${Number(m.data.totalOfertado||0).toFixed(2)}. Pedido creado — se coordinará el pago.`,
      tipo:'texto',created_at:new Date().toISOString()
    });
    toast('✅ Propuesta aceptada — pedido creado');
  } else {
    await db.from('mensajes').insert({
      chat_id:chatAct.id,autor_id:uid,
      autor_nombre:me.empresa||me.nombre||'Proveedor',
      texto:'❌ No puedo aceptar esa propuesta. Podemos seguir negociando.',
      tipo:'texto',created_at:new Date().toISOString()
    });
    toast('Propuesta rechazada');
  }
  await db.from('chats').update({
    ultimo_mensaje:estado==='aceptado'?'✅ Precio acordado':'❌ Propuesta rechazada',
    no_leido_emp:(chatAct.no_leido_emp||0)+1,
    updated_at:new Date().toISOString()
  }).eq('id',chatAct.id);
  await cargarMsgs();
};

// VER CARRITO DEL EMPRENDEDOR (buscar el último carrito compartido)
window.enviarCarrito=async()=>{
  const cartMsg=msgsArr.filter(m=>m.tipo==='carrito').pop();
  if(cartMsg){
    toast(`Carrito: $${Number(cartMsg.data?.total||0).toFixed(2)} — ${cartMsg.data?.items?.length||0} productos`);
  } else {
    toast('No hay carrito compartido en este chat');
  }
};

// REALTIME
function suscribir(){
  if(canal) db.removeChannel(canal);
  canal=db.channel('chat-prov-'+chatAct.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .subscribe();
}

function volver(){
  if(canal) db.removeChannel(canal);
  chatAct=null;prodActual=null;msgsArr=[];ultimaNegPendiente=null;
  Q('pChat').style.display='none';
  Q('pLista').style.display='flex';
  cargarChats();
}

const pal=n=>{const c=['#FF8C00','#007AFF','#A8E63D','#A855F7','#FF4D4D','#F59E0B'];return c[Math.abs((n||'').charCodeAt(0)||0)%c.length];};
window.cmod=(id,e)=>{if(e.target===Q(id))Q(id).classList.remove('on');};
const esc=t=>(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function toast(m){const t=Q('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}
</script>
