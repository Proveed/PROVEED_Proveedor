<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --naranja:#FF8C00; --negro:#0A0A0A; --gris:#F0F1EE; }
  body{ background:var(--gris); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  #lista-view{ display:flex; flex-direction:column; height:100%; }
  .chat-header{ background:var(--negro); color:white; padding:48px 20px 18px; }
  .chat-title{ font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }
  #lista-chats{ flex:1; overflow-y:auto; padding:12px; }
  .chat-item{ display:flex; align-items:center; gap:14px; background:white; border-radius:20px; padding:16px; margin-bottom:10px; cursor:pointer; }
  .chat-avatar{ width:50px; height:50px; border-radius:16px; background:var(--naranja); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:#000; }
  .chat-info{ flex:1; min-width:0; }
  .chat-nombre{ font-weight:700; font-size:0.92rem; }
  #vista-chat{ display:none; flex:1; flex-direction:column; overflow:hidden; }
  .conv-header{ background:var(--negro); color:white; padding:48px 20px 16px; display:flex; align-items:center; gap:14px; }
  #mensajes{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .burbuja{ max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.88rem; line-height:1.5; }
  .burbuja.enviado{ background:var(--naranja); color:#000; align-self:flex-end; border-bottom-right-radius:4px; font-weight:500; }
  .burbuja.recibido{ background:white; color:var(--negro); align-self:flex-start; border-bottom-left-radius:4px; }
  .input-area{ background:white; padding:12px 16px 30px; display:flex; gap:10px; border-top:1px solid #eee; }
  #msg-input{ flex:1; border:none; background:var(--gris); border-radius:20px; padding:12px 16px; outline:none; resize:none; font-size:0.9rem; }
  .send-btn{ width:44px; height:44px; border-radius:14px; background:var(--naranja); border:none; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div id="lista-view">
  <div class="chat-header"><div class="chat-title">Panel de Proveedor</div></div>
  <div id="lista-chats"><div id="lista-content"></div></div>
</div>

<div id="vista-chat">
  <div class="conv-header">
    <div onclick="volverLista()" style="cursor:pointer;"> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> </div>
    <div id="conv-nombre">Emprendedor</div>
  </div>
  <div id="mensajes"></div>
  <div class="input-area">
    <textarea id="msg-input" placeholder="Responder..." rows="1"></textarea>
    <button class="send-btn" onclick="enviarMensaje()"> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app=initializeApp({ apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", authDomain:"proveed-8cb7c.firebaseapp.com", projectId:"proveed-8cb7c", storageBucket:"proveed-8cb7c.firebasestorage.app", messagingSenderId:"235073250367", appId:"1:235073250367:web:89ec59fea5f0b8a347448a" });
const auth=getAuth(app), db=getFirestore(app);
let currentUser=null, chatActivoId=null, unsubMensajes=null;

onAuthStateChanged(auth, user => { if(user) { currentUser=user; cargarChats(); } });

function cargarChats() {
  const q = query(collection(db, 'chats'), where('proveedorId', '==', currentUser.uid), orderBy('ultimoMensajeEn', 'desc'));
  onSnapshot(q, snap => {
    const cont = document.getElementById('lista-content');
    cont.innerHTML = '';
    snap.forEach(d => {
      const c = d.data();
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `<div class="chat-avatar">${(c.emprendedorNombre||'E')[0]}</div>
        <div class="chat-info"><div class="chat-nombre">${c.emprendedorNombre}</div><div class="chat-preview">${c.ultimoMensaje||'Nuevo mensaje'}</div></div>`;
      div.onclick = () => abrirChat(d.id, c.emprendedorNombre);
      cont.appendChild(div);
    });
  });
}

function abrirChat(chatId, nombre) {
  chatActivoId = chatId;
  document.getElementById('lista-view').style.display='none';
  document.getElementById('vista-chat').style.display='flex';
  document.getElementById('conv-nombre').textContent = nombre;

  if(unsubMensajes) unsubMensajes();
  const q = query(collection(db, 'chats', chatId, 'mensajes'), orderBy('enviadoEn', 'asc'));
  unsubMensajes = onSnapshot(q, snap => {
    const mDiv = document.getElementById('mensajes');
    mDiv.innerHTML = '';
    snap.forEach(doc => {
      const m = doc.data();
      const b = document.createElement('div');
      b.className = `burbuja ${m.remitenteId === currentUser.uid ? 'enviado' : 'recibido'}`;
      b.textContent = m.texto;
      mDiv.appendChild(b);
    });
    mDiv.scrollTop = mDiv.scrollHeight;
  });

  // TECLADO AUTOMÁTICO
  setTimeout(() => {
    const input = document.getElementById('msg-input');
    input.focus();
    input.click();
  }, 400);
}

window.volverLista = () => {
  document.getElementById('lista-view').style.display='flex';
  document.getElementById('vista-chat').style.display='none';
};

window.enviarMensaje = async () => {
  const input = document.getElementById('msg-input');
  const texto = input.value.trim();
  if(!texto || !chatActivoId) return;
  input.value = '';
  await addDoc(collection(db, 'chats', chatActivoId, 'mensajes'), { texto, remitenteId: currentUser.uid, enviadoEn: serverTimestamp() });
  await updateDoc(doc(db, 'chats', chatActivoId), { ultimoMensaje: texto, ultimoMensajeEn: serverTimestamp() });
};
</script>
</body>
</html>
