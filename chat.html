<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Chat Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--acc:#FF8C00;--verde:#A8E63D;--verde2:#7BC234;--negro:#0A0A0A;--gris2:#111;--rojo:#FF4D4D;}

html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--negro);-webkit-font-smoothing:antialiased;}

#vista-lista{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#vista-chat{height:100vh;display:none;flex-direction:column;overflow:hidden;}

.header-lista{background:#111;padding:44px 16px 12px;border-bottom:2.5px solid var(--acc);flex-shrink:0;}
.hl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hl-title{font-size:1rem;font-weight:900;color:white;}
.hl-title span{color:var(--acc);}
.hl-badge{background:var(--acc);color:white;font-size:0.62rem;font-weight:800;padding:3px 9px;border-radius:20px;display:none;}
.search-wrap{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:24px;padding:10px 14px;border:1.5px solid #222;}
.search-wrap svg{width:15px;height:15px;stroke:#444;fill:none;stroke-width:2.5;flex-shrink:0;}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.86rem;color:white;}
.search-wrap input::placeholder{color:#333;}

.chats-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--negro);padding-bottom:80px;}
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid #1a1a1a;background:#111;transition:0.15s;}
.chat-item:active{background:#1a1a1a;}
.chat-item.noleido{background:#0f0f0f;border-left:3px solid var(--acc);}
.ci-av{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:white;flex-shrink:0;overflow:hidden;position:relative;}
.ci-av img{width:100%;height:100%;object-fit:cover;}
.ci-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--verde);border-radius:50%;border:2px solid #111;}
.ci-info{flex:1;min-width:0;}
.ci-nombre{font-size:0.88rem;font-weight:700;color:white;margin-bottom:2px;}
.ci-prod{font-size:0.68rem;color:var(--acc);font-weight:600;margin-bottom:2px;}
.ci-msg{font-size:0.75rem;color:#444;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ci-hora{font-size:0.6rem;color:#333;}
.ci-unread{width:18px;height:18px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:800;color:white;}
.ci-neg{font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:20px;background:rgba(168,230,61,0.1);color:var(--verde);}
.empty-chats{text-align:center;padding:60px 20px;color:#333;background:#111;margin:12px;border-radius:18px;border:1px solid #1e1e1e;}
.empty-chats div{font-size:3rem;margin-bottom:10px;}
.empty-chats p{font-size:0.82rem;line-height:1.6;color:#444;}

.chat-header{background:#111;padding:44px 12px 12px;border-bottom:2.5px solid var(--acc);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ch-back{width:36px;height:36px;background:rgba(255,140,0,0.12);border-radius:11px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0;}
.ch-back svg{width:18px;height:18px;stroke:var(--acc);fill:none;stroke-width:2.5;}
.ch-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;color:white;flex-shrink:0;overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-nombre{font-size:0.9rem;font-weight:800;color:white;}
.ch-sub{font-size:0.68rem;color:var(--acc);font-weight:600;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ch-btns{display:flex;gap:6px;}
.ch-btn{width:32px;height:32px;border-radius:10px;background:rgba(255,140,0,0.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ch-btn svg{width:15px;height:15px;stroke:var(--acc);fill:none;stroke-width:2;}

.prod-banner{background:#111;border-bottom:1px solid #1e1e1e;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pb-img{width:42px;height:42px;border-radius:10px;background:#1a1a1a;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.pb-img img{width:100%;height:100%;object-fit:cover;}
.pb-info{flex:1;min-width:0;}
.pb-nombre{font-size:0.82rem;font-weight:700;color:white;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.pb-precio{font-size:0.75rem;color:var(--acc);font-weight:800;margin-top:1px;}
.btn-neg-banner{padding:7px 14px;background:var(--verde);color:#111;border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:800;cursor:pointer;white-space:nowrap;}

.msgs-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 8px;display:flex;flex-direction:column;gap:6px;background:var(--negro);}
.msg{display:flex;flex-direction:column;}
.msg.mio{align-items:flex-end;}
.msg.suyo{align-items:flex-start;}
.msg-b{padding:10px 13px;border-radius:18px;font-size:0.86rem;line-height:1.5;max-width:78%;word-break:break-word;}
.msg.mio .msg-b{background:var(--acc);color:white;border-bottom-right-radius:4px;}
.msg.suyo .msg-b{background:#1a1a1a;color:white;border-bottom-left-radius:4px;}
.msg-hora{font-size:0.58rem;color:#333;margin-top:3px;padding:0 4px;}

.msg-especial{display:flex;justify-content:center;width:100%;padding:4px 0;}
.msg-neg-card{background:#111;border:2px solid var(--verde);border-radius:18px;padding:14px;width:92%;max-width:340px;box-shadow:0 3px 14px rgba(168,230,61,0.1);}
.mn-head{font-size:0.66rem;font-weight:800;color:var(--verde);text-transform:uppercase;margin-bottom:8px;}
.mn-item-row{display:flex;justify-content:space-between;font-size:0.76rem;padding:4px 0;border-bottom:1px solid #222;}
.mn-item-row:last-child{border:none;}
.mn-nom{color:#555;flex:1;}
.mn-orig{color:#333;text-decoration:line-through;margin-right:6px;}
.mn-new{font-weight:800;color:var(--verde);}
.mn-totales{display:flex;align-items:center;gap:8px;margin:8px 0;}
.mn-tot-orig{font-size:0.8rem;color:#333;text-decoration:line-through;}
.mn-tot-new{font-size:1rem;font-weight:900;color:var(--verde);}
.mn-nota-txt{font-size:0.74rem;color:#555;font-style:italic;margin-bottom:10px;padding:8px;background:#1a1a1a;border-radius:8px;line-height:1.4;}
.mn-bts{display:flex;gap:6px;}
.mn-bt{flex:1;padding:9px 4px;border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:800;cursor:pointer;}
.mn-bt.ok{background:var(--verde);color:#111;}
.mn-bt.no{background:rgba(255,77,77,0.1);color:var(--rojo);}
.mn-bt.cnt{background:#1a1a1a;color:#555;}
.mn-status{text-align:center;font-size:0.72rem;font-weight:700;padding:7px;border-radius:10px;margin-top:4px;}
.mn-status.aceptado{background:rgba(168,230,61,0.1);color:var(--verde);}
.mn-status.rechazado{background:rgba(255,77,77,0.06);color:var(--rojo);}
.mn-status.pendiente{background:rgba(255,140,0,0.08);color:var(--acc);}
.mn-hora-small{font-size:0.58rem;color:#333;text-align:right;margin-top:4px;}

.msg-carrito-card{background:#111;border:1.5px solid #1e1e1e;border-radius:18px;padding:12px 14px;width:92%;max-width:340px;}
.mc-head{font-size:0.63rem;font-weight:800;color:#444;text-transform:uppercase;margin-bottom:8px;}
.mc-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1a1a1a;}
.mc-row:last-of-type{border:none;}
.mc-img{width:30px;height:30px;border-radius:7px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-det{flex:1;}
.mc-nombre{font-size:0.76rem;font-weight:600;color:white;}
.mc-cant{font-size:0.64rem;color:#444;}
.mc-precio{font-size:0.78rem;font-weight:800;color:var(--acc);}
.mc-total-row{display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid #1e1e1e;}
.mc-total-lbl{font-size:0.72rem;color:#444;}
.mc-total-val{font-size:0.9rem;font-weight:900;color:var(--verde);}

/* INPUT — CRÍTICO flex-shrink:0 */
.input-area{background:#111;border-top:1px solid #1e1e1e;flex-shrink:0;padding:8px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.input-extras{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.input-extras::-webkit-scrollbar{display:none;}
.btn-extra{padding:6px 12px;border-radius:20px;border:1.5px solid #222;background:#1a1a1a;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;color:#555;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-extra.verde{border-color:var(--verde);color:var(--verde);background:rgba(168,230,61,0.06);}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.input-box{flex:1;background:#1a1a1a;border-radius:22px;padding:10px 14px;display:flex;align-items:flex-end;gap:6px;border:1.5px solid #222;}
.msg-ta{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.88rem;color:white;resize:none;line-height:1.4;min-height:22px;max-height:100px;display:block;width:100%;}
.msg-ta::placeholder{color:#333;}
.btn-send{width:40px;height:40px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0;}
.btn-send svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5;}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;z-index:500;}
.modal-ov.show{display:flex;}
.modal-sh{background:#111;width:100%;border-radius:24px 24px 0 0;transform:translateY(100%);transition:0.4s cubic-bezier(0.16,1,0.3,1);max-height:93vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid #1e1e1e;border-bottom:none;}
.modal-ov.show .modal-sh{transform:translateY(0);}
.drag{width:36px;height:4px;background:#222;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modal-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.modal-title{font-size:0.95rem;font-weight:800;color:white;}
.close-btn{width:28px;height:28px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.close-btn svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:2.5;}
.modal-body{overflow-y:auto;padding:16px 16px 36px;flex:1;}
.neg-intro{font-size:0.8rem;color:#444;line-height:1.6;margin-bottom:14px;}
.neg-item-card{background:#1a1a1a;border-radius:14px;padding:12px;margin-bottom:10px;}
.nic-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.nic-img{width:38px;height:38px;border-radius:9px;background:#222;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nic-img img{width:100%;height:100%;object-fit:cover;}
.nic-info{flex:1;}
.nic-nombre{font-size:0.82rem;font-weight:700;color:white;}
.nic-cant{font-size:0.68rem;color:#555;}
.nic-precios{display:flex;align-items:center;gap:10px;}
.nic-orig{font-size:0.76rem;color:#333;text-decoration:line-through;white-space:nowrap;}
.nic-input{flex:1;padding:9px 12px;background:#222;border:2px solid var(--verde);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:800;color:white;text-align:center;outline:none;}
.nic-unit{font-size:0.68rem;color:#444;white-space:nowrap;}
.neg-resumen{background:rgba(168,230,61,0.05);border:1px solid rgba(168,230,61,0.15);border-radius:14px;padding:14px;margin-bottom:14px;}
.nr-row{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:5px;}
.nr-lbl{color:#444;}
.nr-val{font-weight:700;color:white;}
.nr-final{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(168,230,61,0.15);}
.nr-final-lbl{font-size:0.88rem;font-weight:800;color:white;}
.nr-final-val{font-size:1rem;font-weight:900;color:var(--verde);}
.neg-nota-field{margin-bottom:14px;}
.neg-nota-field label{display:block;font-size:0.65rem;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:5px;}
.neg-nota-field textarea{width:100%;padding:12px;background:#1a1a1a;border:1.5px solid #222;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.86rem;color:white;resize:none;height:70px;outline:none;}
.neg-nota-field textarea:focus{border-color:var(--verde);}
.btn-env-neg{width:100%;padding:14px;background:var(--verde);color:#111;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:800;cursor:pointer;}

.tab-bar{position:fixed;bottom:0;width:100%;background:#111;border-top:1px solid #1e1e1e;display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:200;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;text-decoration:none;font-family:'Inter',sans-serif;padding:4px 0;}
.tab svg{width:22px;height:22px;stroke:#333;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:0.55rem;font-weight:700;color:#333;text-transform:uppercase;}
.tab.active svg{stroke:var(--acc);}
.tab.active span{color:var(--acc);}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;color:white;padding:10px 20px;border-radius:24px;font-size:0.8rem;font-weight:600;opacity:0;transition:0.3s;pointer-events:none;z-index:2000;white-space:nowrap;border:1px solid #333;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="vista-lista">
  <div class="header-lista">
    <div class="hl-top">
      <span class="hl-title">PRO<span>VEED</span> · Chats</span>
      <span class="hl-badge" id="badge-nl">0</span>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Buscar conversación..." oninput="filtrarChats(this.value)">
    </div>
  </div>
  <div class="chats-scroll" id="chats-scroll">
    <div style="text-align:center;padding:30px;color:#333;font-size:0.82rem;">Cargando...</div>
  </div>
</div>

<div id="vista-chat">
  <div class="chat-header">
    <button class="ch-back" onclick="volverLista()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="ch-av" id="ch-av">E</div>
    <div class="ch-info">
      <div class="ch-nombre" id="ch-nombre">—</div>
      <div class="ch-sub" id="ch-sub">—</div>
    </div>
    <div class="ch-btns">
      <button class="ch-btn" onclick="abrirNeg()" title="Proponer precio">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
      </button>
      <button class="ch-btn" onclick="window.location.href='dashboard.html'" title="Inicio">
        <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
    </div>
  </div>

  <div class="prod-banner" id="prod-banner" style="display:none;">
    <div class="pb-img" id="pb-img">📦</div>
    <div class="pb-info">
      <div class="pb-nombre" id="pb-nombre">—</div>
      <div class="pb-precio" id="pb-precio">$0.00</div>
    </div>
    <button class="btn-neg-banner" onclick="abrirNeg()">💰 Proponer precio</button>
  </div>

  <div class="msgs-wrap" id="msgs-wrap"></div>

  <div class="input-area">
    <div class="input-extras">
      <button class="btn-extra verde" onclick="abrirNeg()">🤝 Proponer precio especial</button>
    </div>
    <div class="input-row">
      <div class="input-box">
        <textarea
          class="msg-ta"
          id="msg-ta"
          placeholder="Escribe un mensaje..."
          rows="1"
          onkeydown="keyMsg(event)"
          oninput="resizeTA(this)"
        ></textarea>
      </div>
      <button class="btn-send" onclick="enviarMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
<!-- MODAL NEGOCIAR PROVEEDOR -->
<div class="modal-ov" id="modal-neg" onclick="cerrarMod('modal-neg',event)">
  <div class="modal-sh">
    <div class="drag"></div>
    <div class="modal-hdr">
      <span class="modal-title">💰 Proponer precio especial</span>
      <button class="close-btn" onclick="document.getElementById('modal-neg').classList.remove('show')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="neg-intro">Ofrece un precio especial al emprendedor. Útil para compras por volumen o clientes frecuentes.</p>
      <div id="neg-items-wrap"></div>
      <div class="neg-resumen">
        <div class="nr-row"><span class="nr-lbl">Precio original</span><span class="nr-val" id="nr-orig">$0.00</span></div>
        <div class="nr-row"><span class="nr-lbl">Tu oferta</span><span class="nr-val" id="nr-oferta">$0.00</span></div>
        <div class="nr-final"><span class="nr-final-lbl">Descuento total</span><span class="nr-final-val" id="nr-ahorro">$0.00</span></div>
      </div>
      <div class="neg-nota-field">
        <label>Mensaje al emprendedor</label>
        <textarea id="neg-nota" placeholder="Ej: Por compra de 10+ cajas te ofrezco este precio especial"></textarea>
      </div>
      <button class="btn-env-neg" onclick="enviarNeg()">🚀 Enviar oferta especial</button>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Panel</span>
  </a>
  <a class="tab" href="productos.html">
    <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <span>Productos</span>
  </a>
  <a class="tab active">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chats</span>
  </a>
  <a class="tab" href="pedidos.html">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    <span>Pedidos</span>
  </a>
  <a class="tab" href="perfil.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');

let userId='',userData={},chatActivo=null,todosChats=[],msgs=[],prodActivo=null,rtSub=null;
let itemsNeg={};
const QS=new URLSearchParams(location.search);

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  userId=session.user.id;
  const{data:u}=await sb.from('usuarios').select('*').eq('id',userId).single();
  if(u)userData=u;
  await cargarChats();
  const cId=QS.get('chat_id');
  if(cId){const c=todosChats.find(x=>x.id===cId);if(c)abrirChat(c);}
})();

async function cargarChats(){
  const{data}=await sb.from('chats').select('*').eq('proveedor_id',userId).order('updated_at',{ascending:false});
  todosChats=data||[];
  renderChats(todosChats);
  const nl=todosChats.filter(c=>c.no_leido>0).length;
  const b=document.getElementById('badge-nl');
  if(nl>0){b.textContent=nl;b.style.display='inline-flex';}else b.style.display='none';
}

function renderChats(lista){
  const cont=document.getElementById('chats-scroll');
  if(!lista.length){cont.innerHTML='<div class="empty-chats"><div>💬</div><p>Sin conversaciones aún.</p></div>';return;}
  cont.innerHTML='';
  lista.forEach(c=>{
    const nombre=c.emprendedor_nombre||'Emprendedor';
    const hora=c.updated_at?new Date(c.updated_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}):'';
    const div=document.createElement('div');
    div.className='chat-item'+(c.no_leido>0?' noleido':'');
    div.innerHTML=`
      <div class="ci-av" style="background:${bgCol(nombre)};">${nombre[0].toUpperCase()}<div class="ci-dot"></div></div>
      <div class="ci-info">
        <div class="ci-nombre">${nombre}</div>
        ${c.producto_nombre?`<div class="ci-prod">📦 ${c.producto_nombre}</div>`:''}
        <div class="ci-msg">${c.ultimo_mensaje||'Nueva conversación'}</div>
      </div>
      <div class="ci-right">
        <div class="ci-hora">${hora}</div>
        ${c.no_leido>0?`<div class="ci-unread">${c.no_leido}</div>`:''}
        ${c.negociacion_activa?`<div class="ci-neg">🤝 Negociando</div>`:''}
      </div>`;
    div.onclick=()=>abrirChat(c);
    cont.appendChild(div);
  });
}

window.filtrarChats=q=>{
  const ql=q.toLowerCase();
  renderChats(todosChats.filter(c=>(c.emprendedor_nombre||'').toLowerCase().includes(ql)||(c.producto_nombre||'').toLowerCase().includes(ql)||(c.ultimo_mensaje||'').toLowerCase().includes(ql)));
};

async function abrirChat(chat){
  chatActivo=chat;
  document.getElementById('vista-lista').style.display='none';
  document.getElementById('vista-chat').style.display='flex';
  const nombre=chat.emprendedor_nombre||'Emprendedor';
  document.getElementById('ch-av').textContent=nombre[0].toUpperCase();
  document.getElementById('ch-av').style.background=bgCol(nombre);
  document.getElementById('ch-nombre').textContent=nombre;
  document.getElementById('ch-sub').textContent=chat.producto_nombre||'Conversación general';
  if(chat.producto_id){
    const{data:p}=await sb.from('productos').select('*').eq('id',chat.producto_id).single();
    if(p){
      prodActivo=p;
      document.getElementById('prod-banner').style.display='flex';
      const img=p.imagenes?.[0]||p.imagen||'';
      if(img)document.getElementById('pb-img').innerHTML=`<img src="${img}" alt="">`;
      document.getElementById('pb-nombre').textContent=p.nombre||'Producto';
      document.getElementById('pb-precio').textContent=`$${Number(p.precio||0).toFixed(2)} / ${p.unidad||'und'}`;
    }
  } else {prodActivo=null;document.getElementById('prod-banner').style.display='none';}
  await sb.from('chats').update({no_leido:0}).eq('id',chat.id);
  await cargarMsgs();
  suscribir();
}

async function cargarMsgs(){
  const{data}=await sb.from('mensajes').select('*').eq('chat_id',chatActivo.id).order('created_at',{ascending:true});
  msgs=data||[];renderMsgs();
}

function renderMsgs(){
  const wrap=document.getElementById('msgs-wrap');
  wrap.innerHTML='';
  if(!msgs.length){
    const d=document.createElement('div');
    d.style.cssText='text-align:center;padding:40px 20px;color:#333;font-size:0.82rem;';
    d.textContent='Sin mensajes aún. ¡Responde al emprendedor! 👋';
    wrap.appendChild(d);return;
  }
  msgs.forEach(m=>wrap.appendChild(crearElMsg(m)));
  scrollDown();
}

function crearElMsg(m){
  const mio=m.autor_id===userId;
  const hora=new Date(m.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  if(m.tipo==='negociacion')return crearElNeg(m,mio,hora);
  if(m.tipo==='carrito')return crearElCarrito(m,mio,hora);
  const d=document.createElement('div');
  d.className=`msg ${mio?'mio':'suyo'}`;
  d.innerHTML=`<div class="msg-b">${escH(m.texto||'')}</div><div class="msg-hora">${hora}${mio?' ✓✓':''}</div>`;
  return d;
}

function crearElNeg(m,mio,hora){
  const dat=m.data||{};const est=dat.estado||'pendiente';
  // Proveedor responde propuestas del emprendedor (!mio)
  const puedeResp=!mio&&est==='pendiente';
  let iHtml='';
  (dat.items||[]).forEach(it=>{iHtml+=`<div class="mn-item-row"><span class="mn-nom">${it.nombre} ×${it.cantidad||1}</span><span class="mn-orig">$${Number(it.precioOriginal||0).toFixed(2)}</span><span class="mn-new">$${Number(it.precioOfertado||0).toFixed(2)}</span></div>`;});
  const wrap=document.createElement('div');wrap.className='msg-especial';
  const card=document.createElement('div');card.className='msg-neg-card';
  card.innerHTML=`
    <div class="mn-head">🤝 ${mio?'Oferta enviada':'Propuesta del emprendedor'}</div>
    ${iHtml?`<div style="margin-bottom:8px;">${iHtml}</div>`:''}
    <div class="mn-totales"><span class="mn-tot-orig">$${Number(dat.totalOriginal||0).toFixed(2)}</span><span style="color:#333;margin:0 4px;">→</span><span class="mn-tot-new">$${Number(dat.totalOfertado||0).toFixed(2)}</span></div>
    ${dat.mensaje?`<div class="mn-nota-txt">"${escH(dat.mensaje)}"</div>`:''}
    ${puedeResp?`<div class="mn-bts">
      <button class="mn-bt ok" onclick="respNeg('${m.id}','aceptado')">✓ Aceptar</button>
      <button class="mn-bt cnt" onclick="abrirNeg()">↔ Contraoferta</button>
      <button class="mn-bt no" onclick="respNeg('${m.id}','rechazado')">✕ Rechazar</button>
    </div>`:`<div class="mn-status ${est}">${est==='aceptado'?'✅ Aceptado':est==='rechazado'?'❌ Rechazado':'⏳ Pendiente...'}</div>`}
    <div class="mn-hora-small">${hora}</div>`;
  wrap.appendChild(card);return wrap;
}

function crearElCarrito(m,mio,hora){
  const dat=m.data||{};let iHtml='';
  (dat.items||[]).forEach(it=>{iHtml+=`<div class="mc-row"><div class="mc-img">${it.imagen?`<img src="${it.imagen}" alt="">`:it.emoji||'📦'}</div><div class="mc-det"><div class="mc-nombre">${it.nombre}</div><div class="mc-cant">×${it.cantidad||1}</div></div><div class="mc-precio">$${Number(it.precio||0).toFixed(2)}</div></div>`;});
  const wrap=document.createElement('div');wrap.className='msg-especial';
  const card=document.createElement('div');card.className='msg-carrito-card';
  card.innerHTML=`<div class="mc-head">📦 Carrito del emprendedor</div>${iHtml}<div class="mc-total-row"><span class="mc-total-lbl">Total</span><span class="mc-total-val">$${Number(dat.total||0).toFixed(2)}</span></div><div style="font-size:0.58rem;color:#333;text-align:right;margin-top:4px;">${hora}</div>`;
  wrap.appendChild(card);return wrap;
}

window.enviarMsg=async function(){
  const ta=document.getElementById('msg-ta');const txt=ta.value.trim();
  if(!txt||!chatActivo)return;ta.value='';resizeTA(ta);
  const{data:nm}=await sb.from('mensajes').insert({chat_id:chatActivo.id,autor_id:userId,autor_nombre:userData.empresa||userData.nombre||'Proveedor',texto:txt,tipo:'texto',created_at:new Date().toISOString()}).select().single();
  if(nm){msgs.push(nm);renderMsgs();}
  await sb.from('chats').update({ultimo_mensaje:txt.slice(0,60),updated_at:new Date().toISOString()}).eq('id',chatActivo.id);
};
window.keyMsg=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviarMsg();}};
window.resizeTA=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

// NEGOCIAR PROVEEDOR
window.abrirNeg=function(){
  if(!prodActivo){showToast('No hay producto en esta conversación');return;}
  itemsNeg={};
  itemsNeg[prodActivo.id]={nombre:prodActivo.nombre,precio:Number(prodActivo.precio||0),oferta:Number(prodActivo.precio||0),cantidad:1,imagen:prodActivo.imagenes?.[0]||''};
  renderNegItems();calcResumen();
  document.getElementById('neg-nota').value='';
  document.getElementById('modal-neg').classList.add('show');
};

function renderNegItems(){
  const wrap=document.getElementById('neg-items-wrap');wrap.innerHTML='';
  Object.entries(itemsNeg).forEach(([id,it])=>{
    const d=document.createElement('div');d.className='neg-item-card';
    d.innerHTML=`<div class="nic-top"><div class="nic-img">${it.imagen?`<img src="${it.imagen}" alt="">`:it.emoji||'📦'}</div><div class="nic-info"><div class="nic-nombre">${it.nombre}</div><div class="nic-cant">Precio actual: $${it.precio.toFixed(2)}</div></div></div><div class="nic-precios"><span class="nic-orig">$${it.precio.toFixed(2)}</span><input class="nic-input" type="number" value="${it.oferta}" min="0" step="0.01" oninput="updOf('${id}',this.value)"><span class="nic-unit">precio especial</span></div>`;
    wrap.appendChild(d);
  });
}

window.updOf=function(id,v){if(itemsNeg[id])itemsNeg[id].oferta=parseFloat(v)||0;calcResumen();};

function calcResumen(){
  let orig=0,of=0;
  Object.values(itemsNeg).forEach(p=>{orig+=p.precio*p.cantidad;of+=p.oferta*p.cantidad;});
  document.getElementById('nr-orig').textContent='$'+orig.toFixed(2);
  document.getElementById('nr-oferta').textContent='$'+of.toFixed(2);
  const ah=orig-of;const el=document.getElementById('nr-ahorro');
  el.textContent='$'+Math.abs(ah).toFixed(2);el.style.color=ah>0?'var(--verde)':'#444';
}

window.enviarNeg=async function(){
  if(!chatActivo)return;
  const items=Object.entries(itemsNeg).map(([id,p])=>({id,nombre:p.nombre,cantidad:p.cantidad,imagen:p.imagen,precioOriginal:p.precio,precioOfertado:p.oferta}));
  const tO=items.reduce((s,i)=>s+i.precioOriginal*i.cantidad,0);
  const tN=items.reduce((s,i)=>s+i.precioOfertado*i.cantidad,0);
  const nota=document.getElementById('neg-nota').value.trim();
  const{data:nm}=await sb.from('mensajes').insert({chat_id:chatActivo.id,autor_id:userId,autor_nombre:userData.empresa||userData.nombre||'Proveedor',texto:`💰 Oferta especial: $${tN.toFixed(2)}`,tipo:'negociacion',data:{items,totalOriginal:tO,totalOfertado:tN,mensaje:nota,estado:'pendiente'},created_at:new Date().toISOString()}).select().single();
  if(nm){msgs.push(nm);renderMsgs();}
  await sb.from('chats').update({ultimo_mensaje:`💰 Oferta $${tN.toFixed(2)}`,negociacion_activa:true,updated_at:new Date().toISOString()}).eq('id',chatActivo.id);
  document.getElementById('modal-neg').classList.remove('show');showToast('✓ Oferta enviada');
};

window.respNeg=async function(msgId,estado){
  const m=msgs.find(x=>x.id===msgId);if(!m)return;
  const dat={...m.data,estado};
  await sb.from('mensajes').update({data:dat}).eq('id',msgId);
  const txt=estado==='aceptado'?`✅ Acepté la propuesta de $${Number(m.data.totalOfertado||0).toFixed(2)}.`:'❌ No puedo aceptar esa propuesta. Podemos seguir negociando.';
  await sb.from('mensajes').insert({chat_id:chatActivo.id,autor_id:userId,autor_nombre:userData.empresa||userData.nombre||'Proveedor',texto:txt,tipo:'texto',created_at:new Date().toISOString()});
  await sb.from('chats').update({negociacion_activa:false,ultimo_mensaje:txt.slice(0,60),updated_at:new Date().toISOString()}).eq('id',chatActivo.id);
  const idx=msgs.findIndex(x=>x.id===msgId);if(idx>=0)msgs[idx].data=dat;
  await cargarMsgs();showToast(estado==='aceptado'?'✅ Aceptada':'Rechazada');
};

function suscribir(){
  if(rtSub)sb.removeChannel(rtSub);
  rtSub=sb.channel(`cprov-${chatActivo.id}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatActivo.id}`},pld=>{if(pld.new.autor_id!==userId){msgs.push(pld.new);renderMsgs();}}).subscribe();
}

function volverLista(){
  if(rtSub)sb.removeChannel(rtSub);
  chatActivo=null;prodActivo=null;
  document.getElementById('vista-chat').style.display='none';
  document.getElementById('vista-lista').style.display='flex';
  cargarChats();
}

function scrollDown(){const w=document.getElementById('msgs-wrap');setTimeout(()=>w.scrollTop=w.scrollHeight,80);}
function bgCol(n){const c=['#FF8C00','#007AFF','#A8E63D','#A855F7','#FF4D4D','#F59E0B'];return c[Math.abs((n||'').charCodeAt(0)||0)%c.length];}
window.cerrarMod=(id,e)=>{if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('show');};
function escH(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
