<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Chat Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--O:#FF8C00;--G:#A8E63D;--G2:#7BC234;--BG:#0A0A0A;--R:#FF4D4D;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--BG);}
#pLista{height:100%;display:flex;flex-direction:column;}
#pChat{height:100%;display:none;flex-direction:column;}
.hLista{background:#111;padding:44px 16px 12px;border-bottom:2.5px solid var(--O);flex-shrink:0;}
.hTop{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hTit{font-size:1rem;font-weight:900;color:#fff;}
.hTit b{color:var(--O);}
.sBus{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:24px;padding:10px 14px;border:1.5px solid #222;}
.sBus svg{width:14px;height:14px;stroke:#444;fill:none;stroke-width:2.5;flex-shrink:0;}
.sBus input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.86rem;color:#fff;}
.sBus input::placeholder{color:#333;}
.listaScroll{flex:1;overflow-y:auto;padding-bottom:80px;}
.chatItem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#111;border-bottom:1px solid #1a1a1a;cursor:pointer;}
.chatItem:active{background:#1a1a1a;}
.chatItem.new{border-left:3px solid var(--O);}
.ciAv{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.ciDot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--G);border-radius:50%;border:2px solid #111;}
.ciInf{flex:1;min-width:0;}
.ciNom{font-size:0.88rem;font-weight:700;color:#fff;margin-bottom:2px;}
.ciMsg{font-size:0.74rem;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ciR{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ciHora{font-size:0.6rem;color:#333;}
.ciUnread{width:18px;height:18px;background:var(--O);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:800;color:#fff;}
.vacio{text-align:center;padding:60px 20px;color:#333;font-size:0.82rem;line-height:1.7;}
.cHead{background:#111;padding:44px 12px 12px;border-bottom:2.5px solid var(--O);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cBack{width:36px;height:36px;background:rgba(255,140,0,.12);border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cBack svg{width:18px;height:18px;stroke:var(--O);fill:none;stroke-width:2.5;}
.cAv{width:40px;height:40px;border-radius:12px;font-size:0.9rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cInf{flex:1;min-width:0;}
.cNom{font-size:0.9rem;font-weight:800;color:#fff;}
.cSub{font-size:0.68rem;color:var(--O);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cBts{display:flex;gap:6px;}
.cBt{width:32px;height:32px;border-radius:10px;background:rgba(255,140,0,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cBt svg{width:15px;height:15px;stroke:var(--O);fill:none;stroke-width:2;}
/* BANNER PRODUCTO — lo que pide el emprendedor */
.banProd{background:#111;border-bottom:2px solid rgba(255,140,0,0.4);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bpImg{width:48px;height:48px;border-radius:12px;background:#1a1a1a;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.bpImg img{width:100%;height:100%;object-fit:cover;}
.bpInf{flex:1;min-width:0;}
.bpNom{font-size:0.84rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bpPre{font-size:0.74rem;color:var(--O);font-weight:800;margin-top:1px;}
.bpTag{font-size:0.62rem;color:rgba(255,140,0,0.6);margin-top:2px;}
.bpOfBtn{padding:7px 12px;background:var(--G);border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:0.7rem;font-weight:800;color:#111;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.msgsArea{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px;background:var(--BG);display:flex;flex-direction:column;gap:5px;}
.inputArea{background:#111;border-top:1px solid #1e1e1e;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));flex-shrink:0;}
.extras{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;}
.extras::-webkit-scrollbar{display:none;}
.xBtn{padding:6px 12px;border-radius:20px;border:1.5px solid #222;background:#1a1a1a;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;color:#666;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.xBtn.g{border-color:var(--G);color:var(--G);background:rgba(168,230,61,.06);}
.xBtn.o{border-color:var(--O);color:var(--O);background:rgba(255,140,0,.06);}
.iRow{display:flex;align-items:flex-end;gap:8px;}
.iBox{flex:1;background:#1a1a1a;border-radius:22px;padding:10px 14px;border:1.5px solid #222;display:flex;align-items:flex-end;}
textarea#ta{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.9rem;color:#fff !important;-webkit-text-fill-color:#fff !important;resize:none;line-height:1.4;min-height:22px;max-height:120px;width:100%;display:block;caret-color:#fff;}
textarea#ta::placeholder{color:#444;}
.sBtn{width:42px;height:42px;background:var(--O);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sBtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;}
.msg{display:flex;flex-direction:column;}
.msg.yo{align-items:flex-end;}
.msg.el{align-items:flex-start;}
.bub{padding:10px 14px;border-radius:18px;font-size:0.88rem;line-height:1.5;max-width:80%;word-break:break-word;-webkit-user-select:none;user-select:none;cursor:pointer;}
.msg.yo .bub{background:var(--O);color:#fff;border-bottom-right-radius:4px;font-weight:500;}
.msg.el .bub{background:#1a1a1a;color:#fff;border-bottom-left-radius:4px;}
.mHora{font-size:0.6rem;color:#333;margin-top:3px;padding:0 4px;}
.mMenu{position:fixed;background:#1a1a1a;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:4px;z-index:700;border:1px solid #333;display:none;}
.mMenu.on{display:block;}
.mMenu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;background:transparent;border:none;font-family:'Inter',sans-serif;font-size:0.84rem;font-weight:600;color:var(--R);cursor:pointer;border-radius:8px;white-space:nowrap;}
.mMenu button svg{width:14px;height:14px;stroke:var(--R);fill:none;stroke-width:2.2;}
.mOv{position:fixed;inset:0;z-index:699;display:none;}
.mOv.on{display:block;}
.esp{display:flex;justify-content:center;width:100%;padding:4px 0;}
/* CARD PRODUCTO INTERÉS */
.prodIntC{background:#111;border:2px solid rgba(255,140,0,0.4);border-radius:18px;padding:14px;width:92%;max-width:340px;}
/* CARD OFERTA */
.ofertaC{background:#111;border:2px solid var(--G);border-radius:20px;padding:16px;width:94%;max-width:340px;box-shadow:0 4px 16px rgba(168,230,61,.08);}
.ofertaH{font-size:0.62rem;font-weight:800;color:var(--G);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.ofertaItem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e;}
.ofertaItem:last-of-type{border:none;}
.ofertaImg{width:38px;height:38px;border-radius:9px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.ofertaImg img{width:100%;height:100%;object-fit:cover;}
.ofertaNom{font-size:0.78rem;font-weight:600;color:#fff;}
.ofertaCant{font-size:0.64rem;color:#444;}
.ofertaOrig{font-size:0.68rem;color:#333;text-decoration:line-through;}
.ofertaNuevo{font-size:0.92rem;font-weight:900;color:var(--G);}
.ofertaTot{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px;background:rgba(168,230,61,.05);border-radius:12px;}
.ofertaTotL{font-size:0.8rem;font-weight:700;color:#fff;}
.ofertaTotV{font-size:1.1rem;font-weight:900;color:var(--G);}
.ofertaNota{font-size:0.76rem;color:#555;font-style:italic;padding:8px 10px;background:#1a1a1a;border-radius:10px;margin-bottom:12px;line-height:1.5;}
.ofertaSt{text-align:center;font-size:0.74rem;font-weight:700;padding:8px;border-radius:12px;margin-top:4px;}
.ofertaSt.aceptado{background:rgba(168,230,61,.1);color:var(--G);}
.ofertaSt.rechazado{background:rgba(255,77,77,.06);color:var(--R);}
.ofertaHr{font-size:0.58rem;color:#333;text-align:right;margin-top:8px;}
/* CARRITO */
.cartC{background:#111;border:1.5px solid #1e1e1e;border-radius:18px;padding:12px 14px;width:92%;max-width:340px;}
.cartH{font-size:0.63rem;font-weight:800;color:#444;text-transform:uppercase;margin-bottom:8px;}
.cartRow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1a1a1a;}
.cartRow:last-of-type{border:none;}
.cartImg{width:28px;height:28px;border-radius:7px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.cartImg img{width:100%;height:100%;object-fit:cover;}
/* MODAL OFERTA / CATÁLOGO */
.modOv{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;z-index:500;}
.modOv.on{display:flex;}
.modSh{background:#111;width:100%;border-radius:24px 24px 0 0;transform:translateY(100%);transition:.4s cubic-bezier(.16,1,.3,1);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid #1e1e1e;border-bottom:none;}
.modOv.on .modSh{transform:translateY(0);}
.drag{width:36px;height:4px;background:#222;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modH{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.modT{font-size:0.95rem;font-weight:800;color:#fff;}
.modX{width:28px;height:28px;background:#1a1a1a;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modX svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:2.5;}
.modB{overflow-y:auto;padding:14px;flex:1;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:0.65rem;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:4px;}
.fld input,.fld textarea{width:100%;padding:11px;background:#1a1a1a;border:1.5px solid #222;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.88rem;color:#fff;outline:none;resize:none;}
.fld input:focus,.fld textarea:focus{border-color:var(--G);}
.negItem{background:#1a1a1a;border-radius:14px;padding:12px;margin-bottom:10px;}
.niTop{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.niImg{width:38px;height:38px;border-radius:9px;background:#222;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.niImg img{width:100%;height:100%;object-fit:cover;}
.niNom{font-size:0.82rem;font-weight:700;color:#fff;}
.niPre{font-size:0.68rem;color:#555;}
.niRow{display:flex;align-items:center;gap:8px;}
.niInp{flex:1;padding:9px 12px;background:#222;border:2px solid var(--G);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:800;color:#fff;text-align:center;outline:none;}
.niCant{width:70px;padding:9px 8px;background:#222;border:1.5px solid #333;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.88rem;color:#fff;text-align:center;outline:none;}
.niU{font-size:0.68rem;color:#444;white-space:nowrap;}
.resNeg{background:rgba(168,230,61,.05);border:1px solid rgba(168,230,61,.15);border-radius:14px;padding:14px;margin-bottom:14px;}
.rRow{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:5px;}
.rLbl{color:#444;}
.rVal{font-weight:700;color:#fff;}
.rFin{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(168,230,61,.15);}
.rFinL{font-size:0.88rem;font-weight:800;color:#fff;}
.rFinV{font-size:1rem;font-weight:900;color:var(--G);}
.btn1{width:100%;padding:14px;background:var(--G);color:#111;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:800;cursor:pointer;margin-bottom:8px;}
.btn2{width:100%;padding:12px;background:#222;color:#fff;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;}
.catBus{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:20px;padding:10px 14px;border:1.5px solid #222;margin-bottom:12px;}
.catBus svg{width:14px;height:14px;stroke:#444;fill:none;stroke-width:2.5;flex-shrink:0;}
.catBus input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:0.86rem;color:#fff;}
.catBus input::placeholder{color:#333;}
.catGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.catCard{background:#1a1a1a;border-radius:14px;overflow:hidden;border:1px solid #222;cursor:pointer;}
.catCardImg{width:100%;height:90px;background:#222;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:2rem;}
.catCardImg img{width:100%;height:100%;object-fit:cover;}
.catCardBod{padding:8px;}
.catCardNom{font-size:.76rem;font-weight:700;color:#fff;margin-bottom:3px;}
.catCardPre{font-size:.86rem;font-weight:900;color:var(--O);}
.catCardBtn{width:100%;padding:6px;background:var(--G);color:#111;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:5px;}
.tabBar{background:#111;border-top:1px solid #1e1e1e;display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;padding:4px 0;}
.tab svg{width:22px;height:22px;stroke:#333;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:.55rem;font-weight:700;color:#333;text-transform:uppercase;}
.tab.on svg{stroke:var(--O);}
.tab.on span{color:var(--O);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;color:#fff;padding:10px 20px;border-radius:24px;font-size:.8rem;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:2000;white-space:nowrap;border:1px solid #333;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="pLista">
  <div class="hLista">
    <div class="hTop">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><polygon points="14,1.5 25,7.5 25,20.5 14,26.5 3,20.5 3,7.5" fill="#A8E63D"/><polyline points="8,14 12,18 20,10" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="hTit">PRO<b>VEED</b> · Chats</span>
    </div>
    <div class="sBus">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Buscar conversación..." oninput="filtrar(this.value)">
    </div>
  </div>
  <div class="listaScroll" id="lista"><div class="vacio">Cargando...</div></div>
  <nav class="tabBar">
    <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
    <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
    <a class="tab on"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chats</span></a>
    <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><span>Pedidos</span></a>
    <a class="tab" href="perfil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
  </nav>
</div>

<div id="pChat">
  <div class="cHead">
    <button class="cBack" onclick="volver()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="cAv" id="cAv">E</div>
    <div class="cInf"><div class="cNom" id="cNom">—</div><div class="cSub" id="cSub">—</div></div>
    <div class="cBts">
      <button class="cBt" onclick="abrirMiCatalogo()" title="Agregar mis productos a la oferta">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </button>
      <button class="cBt" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
    </div>
  </div>

  <!-- BANNER — muestra el producto que pidió el emprendedor -->
  <div class="banProd" id="banProd" style="display:none;">
    <div class="bpImg" id="bpImg">📦</div>
    <div class="bpInf">
      <div class="bpNom" id="bpNom">—</div>
      <div class="bpPre" id="bpPre">—</div>
      <div class="bpTag">📌 El emprendedor está interesado en este producto</div>
    </div>
    <button class="bpOfBtn" onclick="abrirOferta()">💰 Ofertar</button>
  </div>

  <div class="msgsArea" id="msgs"></div>

  <div class="inputArea">
    <div class="extras">
      <button class="xBtn o" onclick="abrirOferta()">💰 Hacer oferta</button>
      <button class="xBtn g" onclick="abrirMiCatalogo()">📦 Mi catálogo</button>
    </div>
    <div class="iRow">
      <div class="iBox">
        <textarea id="ta" placeholder="Escribe un mensaje..." rows="1"
          onkeydown="tecla(event)" oninput="crecer(this)"></textarea>
      </div>
      <button class="sBtn" onclick="enviar()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <nav class="tabBar">
    <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
    <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
    <a class="tab on"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chats</span></a>

  </nav>

<div class="mMenu" id="mMenu"><button onclick="borrar()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Eliminar mensaje</button></div>

<div class="modOv" id="modOferta" onclick="cmod('modOferta',event)">
  <div class="modSh"><div class="drag"></div>
    <div class="modH"><span class="modT">💰 Hacer oferta al emprendedor</span><button class="modX" onclick="Q('modOferta').classList.remove('on')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modB">
      <div id="ofItems"></div>
      <div class="resNeg">
        <div class="rRow"><span class="rLbl">Precio original</span><span class="rVal" id="rOrig">$0.00</span></div>
        <div class="rRow"><span class="rLbl">Tu oferta</span><span class="rVal" id="rOfer">$0.00</span></div>

  <div class="modSh"><div class="drag"></div>
    <div class="modH"><span class="modT">📦 Mi catálogo</span><button class="modX" onclick="Q('modCat').classList.remove('on')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modB">
      <div class="catBus">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Buscar en mis productos..." oninput="filtCat(this.value)">
      </div>
      <div class="catGrid" id="catGrid"><div style="grid-column:1/-1;text-align:center;padding:20px;color:#333;font-size:.8rem;">Cargando...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const db=createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
const Q=id=>document.getElementById(id);
let uid='',me={},chatAct=null,todos=[],msgsArr=[],canal=null,menuId=null;
let prodInteres=null; // producto que pidió el emprendedor
let ofItems={}; // items de la oferta actual
let catAll=[];
const QS=new URLSearchParams(location.search);

(async()=>{
  const {data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html';return;}
  uid=session.user.id;
  const {data:u}=await db.from('usuarios').select('*').eq('id',uid).single();
  if(u)me=u;
  await cargarChats();
  const cId=QS.get('chat_id');
  if(cId){const c=todos.find(x=>x.id===cId);if(c)abrirChat(c);}
})();

async function cargarChats(){
  const {data,error}=await db.from('chats').select('*').eq('proveedor_id',uid);
  if(error){Q('lista').innerHTML=`<div class="vacio">Error: ${error.message}</div>`;return;}
  todos=(data||[]).sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  pintarLista(todos);
}

function pintarLista(arr){
  const c=Q('lista');
  if(!arr.length){c.innerHTML='<div class="vacio">Sin conversaciones aún.</div>';return;}
  c.innerHTML='';
  arr.forEach(ch=>{
    const nom=ch.emprendedor_nombre||'Emprendedor';
    const hora=ch.created_at?new Date(ch.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}):'';
    const d=document.createElement('div');
    d.className='chatItem'+((ch.no_leido_prov||0)>0?' new':'');
    d.innerHTML=`<div class="ciAv" style="background:${pal(nom)};">${nom[0].toUpperCase()}<div class="ciDot"></div></div>
      <div class="ciInf"><div class="ciNom">${nom}</div>${ch.producto_nombre?`<div style="font-size:.64rem;color:var(--O);font-weight:600;margin-bottom:2px;">📦 ${ch.producto_nombre}</div>`:''}<div class="ciMsg">${ch.ultimo_mensaje||'Nueva conversación'}</div></div>
      <div class="ciR"><div class="ciHora">${hora}</div>${(ch.no_leido_prov||0)>0?`<div class="ciUnread">${ch.no_leido_prov}</div>`:''}</div>`;
    d.onclick=()=>abrirChat(ch);c.appendChild(d);
  });
}

window.filtrar=q=>{const ql=q.toLowerCase();pintarLista(todos.filter(c=>(c.emprendedor_nombre||'').toLowerCase().includes(ql)||(c.ultimo_mensaje||'').toLowerCase().includes(ql)));};

async function abrirChat(chat){
  chatAct=chat;msgsArr=[];prodInteres=null;ofItems={};
  Q('banProd').style.display='none';
  Q('pLista').style.display='none';Q('pChat').style.display='flex';
  Q('msgs').innerHTML='<div style="text-align:center;padding:40px;color:#333;font-size:.82rem;">Cargando...</div>';
  const nom=chat.emprendedor_nombre||'Emprendedor';
  Q('cAv').textContent=nom[0].toUpperCase();Q('cAv').style.background=pal(nom);
  Q('cNom').textContent=nom;
  Q('cSub').textContent=chat.producto_nombre?`Interés en: ${chat.producto_nombre}`:nom;
  await db.from('chats').update({no_leido_prov:0}).eq('id',chat.id);
  await cargarMsgs();
  suscribir();
}

async function cargarMsgs(){
  const {data,error}=await db.from('mensajes').select('*').eq('chat_id',chatAct.id).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  msgsArr=data||[];

  // Detectar producto de interés del emprendedor
  if(!prodInteres){
    for(let i=msgsArr.length-1;i>=0;i--){
      const m=msgsArr[i];
      if(m.data?.producto_id&&m.data?.producto_nombre){
        prodInteres={id:m.data.producto_id,nombre:m.data.producto_nombre,precio:m.data.producto_precio,imagen:m.data.producto_imagen||''};
        mostrarBannerProd();break;
      }
    }
    // También buscar en el registro del chat
    if(!prodInteres&&chatAct.producto_id&&chatAct.producto_nombre){
      // Obtener el producto de la BD
      const {data:p}=await db.from('productos').select('*').eq('id',chatAct.producto_id).single();
      if(p){prodInteres={id:p.id,nombre:p.nombre,precio:p.precio,imagen:p.imagenes?.[0]||p.imagen||''};mostrarBannerProd();}
    }
  }
  pintarMsgs();
}

function mostrarBannerProd(){
  if(!prodInteres)return;
  Q('banProd').style.display='flex';
  Q('bpImg').innerHTML=prodInteres.imagen?`<img src="${prodInteres.imagen}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:'📦';
  Q('bpNom').textContent=prodInteres.nombre||'Producto';
  Q('bpPre').textContent=`Precio actual: $${Number(prodInteres.precio||0).toFixed(2)}`;
}

function pintarMsgs(){
  const w=Q('msgs');
  if(!msgsArr.length){w.innerHTML='<div style="text-align:center;padding:50px 20px;color:#333;font-size:.84rem;">El emprendedor iniciará la conversación 💬</div>';return;}
  w.innerHTML='';
  msgsArr.forEach(m=>w.appendChild(mkBurbuja(m)));
  setTimeout(()=>w.scrollTop=w.scrollHeight,60);
}

function mkBurbuja(m){
  const yo=m.autor_id===uid;
  const hr=new Date(m.created_at).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  if(m.tipo==='negociacion')return mkOfertaBub(m,yo,hr);
  if(m.tipo==='carrito')return mkCarritoBub(m,yo,hr);
  if(m.tipo==='producto_interes')return mkProdInteres(m,yo,hr);
  const d=document.createElement('div');d.className=`msg ${yo?'yo':'el'}`;
  const b=document.createElement('div');b.className='bub';b.textContent=m.texto||'';
  if(yo){
    let pt;
    b.addEventListener('touchstart',e=>{pt=setTimeout(()=>showMenu(m.id,e.touches[0].clientX,e.touches[0].clientY),600);},{passive:true});
    b.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
    b.addEventListener('contextmenu',e=>{e.preventDefault();showMenu(m.id,e.clientX,e.clientY);});
  }
  const h=document.createElement('div');h.className='mHora';h.textContent=hr+(yo?' ✓✓':'');
  d.appendChild(b);d.appendChild(h);return d;
}

function mkProdInteres(m,yo,hr){
  const dat=m.data||{};
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='prodIntC';
  c.innerHTML=`<div style="font-size:.62rem;font-weight:800;color:var(--O);text-transform:uppercase;margin-bottom:10px;">📌 Producto solicitado por el emprendedor</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:52px;height:52px;border-radius:12px;background:#1a1a1a;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">
        ${dat.producto_imagen?`<img src="${dat.producto_imagen}" style="width:100%;height:100%;object-fit:cover;">`:'📦'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.86rem;font-weight:700;color:#fff;">${dat.producto_nombre||'Producto'}</div>
        <div style="font-size:.76rem;color:var(--O);font-weight:800;margin-top:2px;">$${Number(dat.producto_precio||0).toFixed(2)}</div>
        <div style="font-size:.64rem;color:#444;margin-top:2px;">Quiere una oferta para este producto</div>
      </div>
    </div>
    <button onclick="abrirOfertaDesde('${dat.producto_id}','${(dat.producto_nombre||'').replace(/'/g,'')}',${dat.producto_precio||0},'${dat.producto_imagen||''}')" style="width:100%;margin-top:10px;padding:10px;background:var(--G);color:#111;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;">💰 Hacer oferta para este producto</button>
    <div style="font-size:.58rem;color:#333;text-align:right;margin-top:6px;">${hr}</div>`;
  w.appendChild(c);return w;
}

function mkOfertaBub(m,yo,hr){
  const dat=m.data||{},est=dat.estado||'pendiente';
  let items='';
  (dat.items||[]).forEach(it=>{
    items+=`<div class="ofertaItem">
      <div class="ofertaImg">${it.imagen?`<img src="${it.imagen}">`:'📦'}</div>
      <div style="flex:1;min-width:0;"><div class="ofertaNom">${it.nombre}</div><div class="ofertaCant">×${it.cantidad||1}</div></div>
      <div style="text-align:right;"><div class="ofertaOrig">$${Number(it.precioOriginal||0).toFixed(2)}</div><div class="ofertaNuevo">$${Number(it.precioOfertado||0).toFixed(2)}</div></div>
    </div>`;
  });
  const tN=Number(dat.totalOfertado||0);
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='ofertaC';
  c.innerHTML=`<div class="ofertaH">💰 ${yo?'Tu oferta enviada':'Oferta del proveedor'}</div>
    ${items?`<div style="margin-bottom:4px;">${items}</div>`:''}
    <div class="ofertaTot"><span class="ofertaTotL">Total oferta</span><span class="ofertaTotV">$${tN.toFixed(2)}</span></div>
    ${dat.mensaje?`<div class="ofertaNota">"${esc(dat.mensaje)}"</div>`:''}
    <div class="ofertaSt ${est}">${est==='aceptado'?'✅ Emprendedor aceptó — pedido generado':est==='rechazado'?'❌ Emprendedor rechazó':'⏳ Esperando respuesta del emprendedor...'}</div>
    <div class="ofertaHr">${hr}</div>`;
  w.appendChild(c);return w;
}

function mkCarritoBub(m,yo,hr){
  const dat=m.data||{};let rows='';
  (dat.items||[]).forEach(it=>{rows+=`<div class="cartRow"><div class="cartImg">${it.imagen?`<img src="${it.imagen}">`:'📦'}</div><div style="flex:1;min-width:0;"><div style="font-size:.76rem;font-weight:600;color:#fff;">${it.nombre}</div><div style="font-size:.62rem;color:#444;">×${it.cantidad||1}</div></div><div style="font-size:.78rem;font-weight:800;color:var(--O);">$${Number(it.precio||0).toFixed(2)}</div></div>`;});
  const w=document.createElement('div');w.className='esp';
  const c=document.createElement('div');c.className='cartC';
  c.innerHTML=`<div class="cartH">📦 ${yo?'Tu oferta de carrito':'Carrito del emprendedor'}</div>${rows}<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid #1e1e1e;"><span style="font-size:.72rem;color:#444;">Total</span><span style="font-size:.9rem;font-weight:900;color:var(--G);">$${Number(dat.total||0).toFixed(2)}</span></div><div style="font-size:.58rem;color:#333;text-align:right;margin-top:4px;">${hr}</div>`;
  w.appendChild(c);return w;
}

// ABRIR OFERTA con producto del banner
window.abrirOferta=function(){
  if(!prodInteres){toast('No hay producto de interés en este chat');return;}
  abrirOfertaDesde(prodInteres.id,prodInteres.nombre,prodInteres.precio,prodInteres.imagen);
};
// ABRIR OFERTA desde un producto específico
window.abrirOfertaDesde=function(prodId,prodNom,prodPre,prodImg){
  ofItems={};
  ofItems[prodId]={nombre:prodNom,precio:Number(prodPre||0),oferta:Number(prodPre||0),cantidad:1,imagen:prodImg||''};
  pintarOfItems();calcRes();Q('ofNota').value='';
  Q('modOferta').classList.add('on');
};

function pintarOfItems(){
  const w=Q('ofItems');w.innerHTML='';
  Object.entries(ofItems).forEach(([id,it])=>{
    const d=document.createElement('div');d.className='negItem';
    d.innerHTML=`<div class="niTop">
      <div class="niImg">${it.imagen?`<img src="${it.imagen}">`:'📦'}</div>
      <div><div class="niNom">${it.nombre}</div><div class="niPre">Precio actual: $${Number(it.precio).toFixed(2)}</div></div>
    </div>
    <div class="niRow">
      <div style="flex:1;">
        <div style="font-size:.6rem;color:#444;margin-bottom:3px;">Tu precio oferta</div>
        <input class="niInp" type="number" value="${it.oferta}" min="0" step="0.01" oninput="updOf('${id}',this.value)">
      </div>
      <div>
        <div style="font-size:.6rem;color:#444;margin-bottom:3px;">Cantidad</div>
        <input class="niCant" type="number" value="${it.cantidad}" min="1" oninput="updCant('${id}',this.value)">
      </div>
      <span class="niU">und</span>
    </div>`;
    w.appendChild(d);
  });
}
window.updOf=(id,v)=>{if(ofItems[id])ofItems[id].oferta=parseFloat(v)||0;calcRes();};
window.updCant=(id,v)=>{if(ofItems[id])ofItems[id].cantidad=parseInt(v)||1;calcRes();};
function calcRes(){
  let o=0,f=0;Object.values(ofItems).forEach(p=>{o+=p.precio*p.cantidad;f+=p.oferta*p.cantidad;});
  Q('rOrig').textContent='$'+o.toFixed(2);Q('rOfer').textContent='$'+f.toFixed(2);
  const a=o-f;Q('rAho').textContent='$'+Math.abs(a).toFixed(2);Q('rAho').style.color=a>0?'var(--G)':'#444';
}

window.enviarOferta=async()=>{
  if(!chatAct)return;
  const items=Object.entries(ofItems).map(([id,p])=>({id,nombre:p.nombre,cantidad:p.cantidad,imagen:p.imagen,precioOriginal:p.precio,precioOfertado:p.oferta}));
  const tO=items.reduce((s,i)=>s+i.precioOriginal*i.cantidad,0);
  const tN=items.reduce((s,i)=>s+i.precioOfertado*i.cantidad,0);
  const nota=Q('ofNota').value.trim();
  await db.from('mensajes').insert({
    chat_id:chatAct.id,autor_id:uid,autor_nombre:me.empresa||me.nombre||'Proveedor',
    texto:`💰 Oferta especial: $${tN.toFixed(2)}`,tipo:'negociacion',
    data:{items,totalOriginal:tO,totalOfertado:tN,mensaje:nota,estado:'pendiente',
      producto_id:prodInteres?.id,producto_nombre:prodInteres?.nombre,
      producto_precio:prodInteres?.precio,producto_imagen:prodInteres?.imagen},
    created_at:new Date().toISOString()
  });
  await db.from('chats').update({
    ultimo_mensaje:`💰 Oferta $${tN.toFixed(2)}`,
    no_leido_emp:(chatAct.no_leido_emp||0)+1
  }).eq('id',chatAct.id);
  Q('modOferta').classList.remove('on');
  await cargarMsgs();toast('✓ Oferta enviada al emprendedor');
};

// MI CATÁLOGO — para agregar más productos a la oferta
window.abrirMiCatalogo=async()=>{
  Q('modCat').classList.add('on');
  Q('catGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#333;font-size:.8rem;">Cargando...</div>';
  const {data}=await db.from('productos').select('*').eq('proveedor_id',uid).eq('activo',true).order('created_at',{ascending:false});
  catAll=data||[];pintarCat(catAll);
};
function pintarCat(arr){
  const w=Q('catGrid');
  if(!arr.length){w.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#333;font-size:.8rem;">Sin productos en tu catálogo</div>';return;}
  w.innerHTML='';
  arr.forEach(p=>{
    const img=p.imagenes?.[0]||p.imagen||'';
    const d=document.createElement('div');d.className='catCard';
    d.innerHTML=`<div class="catCardImg">${img?`<img src="${img}" loading="lazy">`:'📦'}</div>
      <div class="catCardBod"><div class="catCardNom">${p.nombre||'Producto'}</div><div class="catCardPre">$${Number(p.precio||0).toFixed(2)}</div>
      <button class="catCardBtn" onclick="addACat('${p.id}','${(p.nombre||'').replace(/'/g,'')}',${p.precio||0},'${img}')">+ Agregar a oferta</button></div>`;
    w.appendChild(d);
  });
}
window.filtCat=q=>{const ql=q.toLowerCase();pintarCat(catAll.filter(p=>(p.nombre||'').toLowerCase().includes(ql)));};
// Agregar producto del catálogo a la oferta actual
window.addACat=(id,nombre,precio,imagen)=>{
  if(ofItems[id]){ofItems[id].cantidad++;toast(`+1 ${nombre.slice(0,20)}`);}
  else{ofItems[id]={nombre,precio:Number(precio),oferta:Number(precio),cantidad:1,imagen};}
  Q('modCat').classList.remove('on');
  // Abrir modal oferta con este producto agregado
  pintarOfItems();calcRes();Q('ofNota').value='';
  Q('modOferta').classList.add('on');
  toast(`✓ ${nombre.slice(0,20)} agregado a la oferta`);
};

window.enviar=async function(){
  const ta=Q('ta');const txt=ta.value.trim();
  if(!txt||!chatAct)return;ta.value='';crecer(ta);ta.focus();
  await db.from('mensajes').insert({
    chat_id:chatAct.id,autor_id:uid,autor_nombre:me.empresa||me.nombre||'Proveedor',
    texto:txt,tipo:'texto',created_at:new Date().toISOString()
  });
  await db.from('chats').update({ultimo_mensaje:txt.slice(0,60),no_leido_emp:(chatAct.no_leido_emp||0)+1}).eq('id',chatAct.id);
  await cargarMsgs();
};
window.tecla=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}};
window.crecer=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

function showMenu(id,x,y){menuId=id;const m=Q('mMenu');m.style.left=Math.min(x,window.innerWidth-170)+'px';m.style.top=Math.min(y,window.innerHeight-80)+'px';m.classList.add('on');Q('mOv').classList.add('on');}
window.cerrarMenu=()=>{Q('mMenu').classList.remove('on');Q('mOv').classList.remove('on');menuId=null;};
window.borrar=async()=>{if(!menuId)return;cerrarMenu();await db.from('mensajes').delete().eq('id',menuId);await cargarMsgs();toast('Mensaje eliminado');};

function suscribir(){
  if(canal)db.removeChannel(canal);
  canal=db.channel('chat-prov-'+chatAct.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'mensajes',filter:`chat_id=eq.${chatAct.id}`},async()=>{await cargarMsgs();})
    .subscribe();
}

function volver(){
  if(canal)db.removeChannel(canal);
  chatAct=null;prodInteres=null;ofItems={};msgsArr=[];
  Q('pChat').style.display='none';Q('pLista').style.display='flex';
  cargarChats();
}

const pal=n=>{const c=['#FF8C00','#007AFF','#A8E63D','#A855F7','#FF4D4D','#F59E0B'];return c[Math.abs((n||'').charCodeAt(0)||0)%c.length];};
window.cmod=(id,e)=>{if(e.target===Q(id))Q(id).classList.remove('on');};
const esc=t=>(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function toast(m){const t=Q('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
