<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Estadísticas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; --morado:#AF52DE; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:14px 16px 0; }
  .kpi-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; }
  .kpi-val{ font-size:1.5rem; font-weight:800; color:white; }
  .kpi-val.naranja{ color:var(--naranja); }
  .kpi-val.verde{ color:var(--verde); }
  .kpi-val.azul{ color:var(--azul); }
  .kpi-val.morado{ color:var(--morado); }
  .kpi-lbl{ font-size:0.65rem; color:#555; font-weight:600; text-transform:uppercase; margin-top:4px; }
  .kpi-trend{ font-size:0.7rem; color:var(--verde); margin-top:4px; }
  .section{ padding:16px 16px 0; }
  .section-title{ font-size:0.7rem; font-weight:700; color:#444; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .chart-wrap{ background:#111; border:1px solid #1e1e1e; border-radius:18px; padding:16px; }
  .chart-bars{ display:flex; align-items:flex-end; gap:6px; height:100px; }
  .chart-bar-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .chart-bar{ width:100%; border-radius:4px 4px 0 0; min-height:3px; background:linear-gradient(to top,var(--naranja),rgba(255,140,0,0.4)); }
  .chart-label{ font-size:0.55rem; color:#444; font-weight:600; }
  .chart-val{ font-size:0.6rem; color:#666; }
  .prod-rank{ background:#111; border:1px solid #1e1e1e; border-radius:18px; overflow:hidden; }
  .prod-rank-item{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid #161616; }
  .prod-rank-item:last-child{ border-bottom:none; }
  .prod-rank-num{ font-size:0.75rem; font-weight:800; color:#444; width:20px; text-align:center; }
  .prod-rank-img{ width:36px; height:36px; border-radius:10px; background:#1a1a1a; overflow:hidden; flex-shrink:0; }
  .prod-rank-img img{ width:100%; height:100%; object-fit:cover; }
  .prod-rank-info{ flex:1; }
  .prod-rank-nombre{ font-size:0.82rem; font-weight:600; color:white; }
  .prod-rank-vistas{ font-size:0.7rem; color:#555; margin-top:1px; }
  .prod-rank-val{ font-size:0.85rem; font-weight:700; color:var(--naranja); }
  .ciudad-row{ display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid #161616; }
  .ciudad-row:last-child{ border-bottom:none; }
  .ciudad-nombre{ flex:1; font-size:0.82rem; color:white; font-weight:600; }
  .ciudad-bar-wrap{ width:80px; }
  .ciudad-bar-track{ height:4px; background:#1e1e1e; border-radius:4px; overflow:hidden; }
  .ciudad-bar-fill{ height:100%; background:var(--naranja); border-radius:4px; }
  .ciudad-val{ font-size:0.72rem; color:var(--naranja); font-weight:700; width:30px; text-align:right; }
  .empty{ text-align:center; padding:24px; color:#444; font-size:0.82rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <div class="page-title">Estadísticas</div>
</div>

<div class="kpi-grid">
  <div class="kpi-card"><div class="kpi-val naranja" id="kpi-ventas">$0</div><div class="kpi-lbl">Ventas totales</div><div class="kpi-trend" id="kpi-ventas-trend">cargando...</div></div>
  <div class="kpi-card"><div class="kpi-val" id="kpi-pedidos">0</div><div class="kpi-lbl">Pedidos totales</div></div>
  <div class="kpi-card"><div class="kpi-val verde" id="kpi-productos">0</div><div class="kpi-lbl">Productos activos</div></div>
  <div class="kpi-card"><div class="kpi-val morado" id="kpi-vistas">0</div><div class="kpi-lbl">Vistas totales</div></div>
</div>

<div class="section" style="margin-top:4px;">
  <div class="section-title">Ventas últimos 7 días</div>
  <div class="chart-wrap">
    <div class="chart-bars" id="chart-bars">
      <div class="empty">Cargando...</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">Productos más vistos</div>
  <div class="prod-rank" id="prod-rank">
    <div class="empty">Cargando...</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Ciudades que más compran</div>
  <div class="prod-rank" id="ciudades-rank">
    <div class="empty">Cargando...</div>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="estadisticas.html"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Stats</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let empresa='';

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  const { data:u } = await sb.from('usuarios').select('empresa,nombre').eq('id',session.user.id).single();
  empresa=u?.empresa||u?.nombre||'';
  const uid=session.user.id;
  const [{ data:prods },{ data:pedidos }] = await Promise.all([
    sb.from('productos').select('*').eq('proveedor_id',uid),
    sb.from('pedidos').select('*').order('created_at',{ascending:false})
  ]);
  const misPedidos=(pedidos||[]).filter(p=>(p.items||[]).some(i=>i.proveedor===empresa));
  const totalVentas=misPedidos.reduce((s,p)=>s+(p.total||0),0);
  const totalVistas=(prods||[]).reduce((s,p)=>s+(p.vistas||0),0);
  const activos=(prods||[]).filter(p=>p.activo).length;
  document.getElementById('kpi-ventas').textContent='$'+totalVentas.toFixed(0);
  document.getElementById('kpi-pedidos').textContent=misPedidos.length;
  document.getElementById('kpi-productos').textContent=activos;
  document.getElementById('kpi-vistas').textContent=totalVistas;
  document.getElementById('kpi-ventas-trend').textContent=misPedidos.length>0?`↑ promedio $${(totalVentas/misPedidos.length).toFixed(0)}`:'— sin ventas aún';

  // Gráfico 7 días
  const dias=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const label=d.toLocaleDateString('es-EC',{weekday:'short'});
    const total=misPedidos.filter(p=>{
      const f=new Date(p.created_at);
      return f.toDateString()===d.toDateString();
    }).reduce((s,p)=>s+(p.total||0),0);
    dias.push({label,total});
  }
  const maxTotal=Math.max(...dias.map(d=>d.total),1);
  document.getElementById('chart-bars').innerHTML=dias.map(d=>`
    <div class="chart-bar-wrap">
      <div class="chart-val">${d.total>0?'$'+d.total.toFixed(0):''}</div>
      <div class="chart-bar" style="height:${Math.max(d.total/maxTotal*100,3)}%"></div>
      <div class="chart-label">${d.label}</div>
    </div>`).join('');

  // Top productos
  const topProds=[...(prods||[])].sort((a,b)=>(b.vistas||0)-(a.vistas||0)).slice(0,5);
  document.getElementById('prod-rank').innerHTML=topProds.length?topProds.map((p,i)=>`
    <div class="prod-rank-item">
      <div class="prod-rank-num">${i+1}</div>
      <div class="prod-rank-img">${p.imagenes?.[0]||p.imagen?`<img src="${p.imagenes?.[0]||p.imagen}" alt="">`:''}</div>
      <div class="prod-rank-info"><div class="prod-rank-nombre">${p.nombre||'Producto'}</div><div class="prod-rank-vistas">👁 ${p.vistas||0} vistas</div></div>
      <div class="prod-rank-val">$${Number(p.precio||0).toFixed(2)}</div>
    </div>`).join(''):'<div class="empty">Sin datos aún</div>';

  // Ciudades
  const ciudadCount={};
  misPedidos.forEach(p=>{ const c=p.entrega?.ciudad||'Sin ciudad'; ciudadCount[c]=(ciudadCount[c]||0)+1; });
  const topCiudades=Object.entries(ciudadCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxC=Math.max(...topCiudades.map(c=>c[1]),1);
  document.getElementById('ciudades-rank').innerHTML=topCiudades.length?topCiudades.map(([ciudad,cnt])=>`
    <div class="ciudad-row">
      <div class="ciudad-nombre">${ciudad}</div>
      <div class="ciudad-bar-wrap"><div class="ciudad-bar-track"><div class="ciudad-bar-fill" style="width:${cnt/maxC*100}%"></div></div></div>
      <div class="ciudad-val">${cnt}</div>
    </div>`).join(''):'<div class="empty">Sin datos aún</div>';
})();
</script>
</body>
</html>
