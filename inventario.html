<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --gris:#F5F6F2; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nuevo{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 0; }
  .stat-box{ background:#111; border-radius:16px; padding:14px 10px; text-align:center; border:1px solid #1e1e1e; }
  .stat-val{ font-size:1.3rem; font-weight:800; color:white; }
  .stat-val.naranja{ color:var(--naranja); }
  .stat-val.rojo{ color:var(--rojo); }
  .stat-val.verde{ color:var(--verde); }
  .stat-lbl{ font-size:0.6rem; color:#555; font-weight:600; text-transform:uppercase; margin-top:3px; }
  .search-wrap{ margin:14px 16px 0; background:#111; border:1px solid #1e1e1e; border-radius:13px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  .search-wrap input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'Inter',sans-serif; font-size:0.9rem; }
  .search-wrap input::placeholder{ color:#444; }
  .search-wrap svg{ width:16px; height:16px; stroke:#444; fill:none; stroke-width:2.5; flex-shrink:0; }
  .tabs-row{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:7px 14px; border-radius:20px; border:1px solid #222; background:transparent; font-size:0.76rem; font-weight:600; color:#555; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .inv-lista{ padding:0 16px; }
  .inv-item{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; transition:0.2s; }
  .inv-item:hover{ border-color:#333; }
  .inv-img{ width:52px; height:52px; border-radius:12px; background:#1a1a1a; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .inv-img img{ width:100%; height:100%; object-fit:cover; }
  .inv-img svg{ width:20px; height:20px; stroke:#333; fill:none; }
  .inv-info{ flex:1; min-width:0; }
  .inv-nombre{ font-size:0.88rem; font-weight:600; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .inv-cat{ font-size:0.7rem; color:#555; margin-top:2px; }
  .inv-stock-wrap{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .inv-stock-bar{ flex:1; height:4px; background:#1e1e1e; border-radius:4px; overflow:hidden; }
  .inv-stock-fill{ height:100%; border-radius:4px; }
  .inv-stock-num{ font-size:0.72rem; font-weight:700; white-space:nowrap; }
  .inv-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
  .inv-precio{ font-size:0.88rem; font-weight:700; color:var(--naranja); }
  .btn-edit-stock{ background:#1e1e1e; color:#aaa; border:none; padding:5px 10px; border-radius:8px; font-size:0.7rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .alerta-stock{ background:rgba(255,77,77,0.1); border:1px solid rgba(255,77,77,0.2); border-radius:12px; padding:12px 14px; margin:12px 16px 0; display:flex; align-items:center; gap:10px; }
  .alerta-stock svg{ width:18px; height:18px; stroke:var(--rojo); fill:none; stroke-width:2; flex-shrink:0; }
  .alerta-stock p{ font-size:0.78rem; color:var(--rojo); }
  .empty{ text-align:center; padding:48px 20px; color:#444; }
  .empty svg{ width:52px; height:52px; stroke:#333; fill:none; stroke-width:1.2; margin:0 auto 14px; display:block; }
  .empty p{ font-size:0.85rem; }

  /* MODAL EDITAR STOCK */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); border:1px solid #1e1e1e; border-bottom:none; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; margin-bottom:6px; }
  .modal-prod-name{ font-size:0.82rem; color:#555; margin-bottom:20px; }
  .stock-controls{ display:flex; align-items:center; gap:16px; justify-content:center; margin-bottom:20px; }
  .stock-btn{ width:48px; height:48px; border-radius:14px; background:#1e1e1e; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .stock-btn svg{ width:20px; height:20px; stroke:white; fill:none; stroke-width:2.5; }
  .stock-display{ font-size:2rem; font-weight:800; color:white; min-width:80px; text-align:center; }
  .stock-input{ background:#1a1a1a; border:1.5px solid #222; border-radius:12px; padding:12px 14px; color:white; font-family:'Inter',sans-serif; font-size:1rem; outline:none; width:100%; text-align:center; margin-bottom:16px; }
  .stock-input:focus{ border-color:var(--naranja); }
  .btn-guardar-stock{ width:100%; padding:14px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; }

  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Inventario</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-val verde" id="st-total">—</div><div class="stat-lbl">Productos</div></div>
  <div class="stat-box"><div class="stat-val naranja" id="st-stock">—</div><div class="stat-lbl">Stock total</div></div>
  <div class="stat-box"><div class="stat-val rojo" id="st-bajo">—</div><div class="stat-lbl">Stock bajo</div></div>
</div>

<div id="alerta-wrap"></div>

<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" placeholder="Buscar producto..." oninput="buscar(this.value)">
</div>

<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todos</div>
  <div class="vtab" onclick="filtrar('bajo',this)">Stock bajo</div>
  <div class="vtab" onclick="filtrar('agotado',this)">Agotados</div>
  <div class="vtab" onclick="filtrar('ok',this)">En stock</div>
</div>

<div class="inv-lista" id="inv-lista">
  <div class="empty"><p>Cargando inventario...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-title">Editar stock</div>
    <div class="modal-prod-name" id="modal-prod-name">Producto</div>
    <div class="stock-controls">
      <button class="stock-btn" onclick="cambiarStock(-1)"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <div class="stock-display" id="stock-display">0</div>
      <button class="stock-btn" onclick="cambiarStock(1)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
    <input type="number" class="stock-input" id="stock-input" placeholder="O escribe la cantidad" oninput="stockManual(this.value)">
    <button class="btn-guardar-stock" onclick="guardarStock()">GUARDAR STOCK</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="inventario.html"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Inventario</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', todosProds=[], filtroActual='todos', busquedaActual='';
let editandoId='', stockActual=0;
const STOCK_BAJO = 10;

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  cargarInventario();
})();

async function cargarInventario(){
  const { data } = await sb.from('productos').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  todosProds=data||[];
  const stockTotal=todosProds.reduce((s,p)=>s+(p.stock||0),0);
  const stockBajo=todosProds.filter(p=>(p.stock||0)<=STOCK_BAJO).length;
  document.getElementById('st-total').textContent=todosProds.length;
  document.getElementById('st-stock').textContent=stockTotal;
  document.getElementById('st-bajo').textContent=stockBajo;
  if(stockBajo>0){
    document.getElementById('alerta-wrap').innerHTML=`<div class="alerta-stock"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><p>${stockBajo} producto${stockBajo>1?'s':''} con stock bajo o agotado</p></div>`;
  }
  renderLista();
}

function renderLista(){
  let lista=[...todosProds];
  if(filtroActual==='bajo') lista=lista.filter(p=>(p.stock||0)>0&&(p.stock||0)<=STOCK_BAJO);
  if(filtroActual==='agotado') lista=lista.filter(p=>(p.stock||0)===0);
  if(filtroActual==='ok') lista=lista.filter(p=>(p.stock||0)>STOCK_BAJO);
  if(busquedaActual) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(busquedaActual));
  const cont=document.getElementById('inv-lista');
  if(!lista.length){ cont.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg><p>Sin productos en esta categoría</p></div>'; return; }
  cont.innerHTML='';
  lista.forEach(p=>{
    const stock=p.stock||0;
    const maxStock=100;
    const pct=Math.min(stock/maxStock*100,100);
    const color=stock===0?'var(--rojo)':stock<=STOCK_BAJO?'var(--naranja)':'var(--verde)';
    const img=p.imagenes?.[0]||p.imagen||'';
    const div=document.createElement('div'); div.className='inv-item';
    div.innerHTML=`
      <div class="inv-img">${img?`<img src="${img}" alt="" loading="lazy">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}</div>
      <div class="inv-info">
        <div class="inv-nombre">${p.nombre||'Producto'}</div>
        <div class="inv-cat">${p.categoria||'Sin categoría'} · ${p.unidad||'unidad'}</div>
        <div class="inv-stock-wrap">
          <div class="inv-stock-bar"><div class="inv-stock-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="inv-stock-num" style="color:${color}">${stock} und.</div>
        </div>
      </div>
      <div class="inv-actions">
        <div class="inv-precio">$${Number(p.precio||0).toFixed(2)}</div>
        <button class="btn-edit-stock" onclick="abrirEditStock('${p.id}','${(p.nombre||'').replace(/'/g,"\\'")}',${stock})">Editar stock</button>
      </div>`;
    cont.appendChild(div);
  });
}

window.filtrar=(f,el)=>{ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderLista(); };
window.buscar=v=>{ busquedaActual=v.toLowerCase(); renderLista(); };

window.abrirEditStock=function(id,nombre,stock){
  editandoId=id; stockActual=stock;
  document.getElementById('modal-prod-name').textContent=nombre;
  document.getElementById('stock-display').textContent=stock;
  document.getElementById('stock-input').value=stock;
  document.getElementById('modal-overlay').classList.add('show');
};

window.cambiarStock=function(delta){
  stockActual=Math.max(0,stockActual+delta);
  document.getElementById('stock-display').textContent=stockActual;
  document.getElementById('stock-input').value=stockActual;
};

window.stockManual=function(v){
  stockActual=Math.max(0,parseInt(v)||0);
  document.getElementById('stock-display').textContent=stockActual;
};

window.guardarStock=async function(){
  await sb.from('productos').update({stock:stockActual}).eq('id',editandoId);
  document.getElementById('modal-overlay').classList.remove('show');
  cargarInventario();
};

window.cerrarModal=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };
</script>
</body>
</html>
