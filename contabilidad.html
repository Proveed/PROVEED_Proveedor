<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED — Contabilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --naranja:#FF8C00; --verde:#A8E63D; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .header{ background:var(--negro); padding:44px 16px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #1e1e1e; }
  .h-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; background:rgba(255,255,255,0.08); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .back-btn svg{ width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; }
  .page-title{ font-size:1.1rem; font-weight:700; color:white; }
  .btn-nueva{ background:var(--naranja); color:#000; border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .balance-card{ margin:14px 16px; background:linear-gradient(135deg,#1a0a00,#2a1200); border:1px solid rgba(255,140,0,0.2); border-radius:20px; padding:20px; }
  .balance-label{ font-size:0.72rem; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .balance-val{ font-size:2rem; font-weight:800; color:var(--naranja); margin-bottom:4px; }
  .balance-sub{ font-size:0.78rem; color:#555; }
  .balance-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .balance-mini{ background:rgba(0,0,0,0.3); border-radius:12px; padding:12px; }
  .balance-mini-val{ font-size:1rem; font-weight:800; }
  .balance-mini-lbl{ font-size:0.62rem; color:#555; margin-top:3px; }
  .tabs-row{ display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto; scrollbar-width:none; }
  .tabs-row::-webkit-scrollbar{ display:none; }
  .vtab{ padding:7px 14px; border-radius:20px; border:1px solid #222; background:transparent; font-size:0.76rem; font-weight:600; color:#555; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .movimientos-lista{ padding:0 16px; }
  .mov-item{ display:flex; align-items:center; gap:12px; background:#111; border:1px solid #1e1e1e; border-radius:14px; padding:14px; margin-bottom:8px; }
  .mov-icon{ width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .mov-icon svg{ width:18px; height:18px; fill:none; stroke-width:2; }
  .mov-ingreso .mov-icon{ background:rgba(168,230,61,0.12); }
  .mov-ingreso .mov-icon svg{ stroke:var(--verde); }
  .mov-egreso .mov-icon{ background:rgba(255,77,77,0.12); }
  .mov-egreso .mov-icon svg{ stroke:var(--rojo); }
  .mov-info{ flex:1; }
  .mov-desc{ font-size:0.85rem; font-weight:600; color:white; }
  .mov-fecha{ font-size:0.7rem; color:#555; margin-top:2px; }
  .mov-cat{ font-size:0.65rem; color:#444; margin-top:1px; }
  .mov-val{ font-size:0.92rem; font-weight:800; white-space:nowrap; }
  .mov-ingreso .mov-val{ color:var(--verde); }
  .mov-egreso .mov-val{ color:var(--rojo); }
  .empty{ text-align:center; padding:48px 20px; color:#444; }
  .empty p{ font-size:0.85rem; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); border:1px solid #1e1e1e; border-bottom:none; max-height:85vh; overflow-y:auto; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; margin-bottom:20px; }
  .tipo-selector{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .tipo-btn{ padding:12px; border-radius:12px; border:1.5px solid #222; background:transparent; font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; transition:0.2s; }
  .tipo-btn.ingreso.selected{ border-color:var(--verde); background:rgba(168,230,61,0.08); color:var(--verde); }
  .tipo-btn.egreso.selected{ border-color:var(--rojo); background:rgba(255,77,77,0.08); color:var(--rojo); }
  .tipo-btn:not(.selected){ color:#555; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; -webkit-appearance:none; }
  .field input:focus{ border-color:var(--naranja); }
  .field input::placeholder{ color:#444; }
  .field select option{ background:#1a1a1a; }
  .btn-guardar{ width:100%; padding:14px; background:var(--naranja); color:#000; border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--naranja); }
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:0.56rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="page-title">Contabilidad</div>
  </div>
  <button class="btn-nueva" onclick="abrirModal()">+ Registrar</button>
</div>

<div class="balance-card">
  <div class="balance-label">Balance total</div>
  <div class="balance-val" id="balance-total">$0.00</div>
  <div class="balance-sub">Ingresos menos egresos registrados</div>
  <div class="balance-row">
    <div class="balance-mini"><div class="balance-mini-val" id="total-ingresos" style="color:var(--verde)">$0</div><div class="balance-mini-lbl">Total ingresos</div></div>
    <div class="balance-mini"><div class="balance-mini-val" id="total-egresos" style="color:var(--rojo)">$0</div><div class="balance-mini-lbl">Total egresos</div></div>
  </div>
</div>

<div class="tabs-row">
  <div class="vtab active" onclick="filtrar('todos',this)">Todos</div>
  <div class="vtab" onclick="filtrar('ingreso',this)">Ingresos</div>
  <div class="vtab" onclick="filtrar('egreso',this)">Egresos</div>
</div>

<div class="movimientos-lista" id="movimientos-lista">
  <div class="empty"><p>Cargando movimientos...</p></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-title">Registrar movimiento</div>
    <div class="tipo-selector">
      <button class="tipo-btn ingreso selected" id="btn-ingreso" onclick="selTipo('ingreso')">↑ Ingreso</button>
      <button class="tipo-btn egreso" id="btn-egreso" onclick="selTipo('egreso')">↓ Egreso</button>
    </div>
    <div class="field"><label>Descripción *</label><input type="text" id="f-desc" placeholder="Ej: Venta de productos textiles"></div>
    <div class="field"><label>Monto *</label><input type="number" id="f-monto" placeholder="0.00" min="0" step="0.01"></div>
    <div class="field">
      <label>Categoría</label>
      <select id="f-cat">
        <option value="ventas">Ventas</option>
        <option value="servicios">Servicios</option>
        <option value="inventario">Inventario</option>
        <option value="nomina">Nómina</option>
        <option value="arriendo">Arriendo</option>
        <option value="servicios_basicos">Servicios básicos</option>
        <option value="marketing">Marketing</option>
        <option value="otros">Otros</option>
      </select>
    </div>
    <div class="field"><label>Fecha</label><input type="date" id="f-fecha"></div>
    <div class="field"><label>Notas</label><input type="text" id="f-notas" placeholder="Observaciones opcionales"></div>
    <button class="btn-guardar" onclick="guardarMovimiento()">REGISTRAR →</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Panel</span></a>
  <a class="tab" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Productos</span></a>
  <a class="tab active" href="contabilidad.html"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Contabilidad</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/></svg><span>Pedidos</span></a>
  <a class="tab" href="plugins.html"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/></svg><span>Plugins</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://hfmsyrmkewscnvwynzfq.supabase.co','sb_publishable_d1oLsq70a6ZV33vW3XkRgw_nYcN2Z9v');
let userId='', movimientos=[], filtroActual='todos', tipoActual='ingreso';

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  userId=session.user.id;
  document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
  cargarMovimientos();
})();

async function cargarMovimientos(){
  const { data } = await sb.from('contabilidad').select('*').eq('proveedor_id',userId).order('created_at',{ascending:false});
  movimientos=data||[];
  const ingresos=movimientos.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+(m.monto||0),0);
  const egresos=movimientos.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+(m.monto||0),0);
  document.getElementById('total-ingresos').textContent='$'+ingresos.toFixed(0);
  document.getElementById('total-egresos').textContent='$'+egresos.toFixed(0);
  document.getElementById('balance-total').textContent='$'+(ingresos-egresos).toFixed(2);
  renderMovimientos();
}

function renderMovimientos(){
  let lista=[...movimientos];
  if(filtroActual!=='todos') lista=lista.filter(m=>m.tipo===filtroActual);
  const cont=document.getElementById('movimientos-lista');
  if(!lista.length){ cont.innerHTML='<div class="empty"><p>Sin movimientos registrados</p></div>'; return; }
  cont.innerHTML='';
  lista.forEach(m=>{
    const div=document.createElement('div');
    div.className=`mov-item mov-${m.tipo}`;
    const fecha=new Date(m.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});
    const icono=m.tipo==='ingreso'?'<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>':'<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>';
    div.innerHTML=`
      <div class="mov-icon"><svg viewBox="0 0 24 24">${icono}</svg></div>
      <div class="mov-info"><div class="mov-desc">${m.descripcion}</div><div class="mov-cat">${m.categoria||'—'}</div><div class="mov-fecha">${fecha}</div></div>
      <div class="mov-val">${m.tipo==='ingreso'?'+':'-'}$${Number(m.monto||0).toFixed(2)}</div>`;
    cont.appendChild(div);
  });
}

window.filtrar=(f,el)=>{ filtroActual=f; document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderMovimientos(); };
window.selTipo=function(tipo){ tipoActual=tipo; document.getElementById('btn-ingreso').classList.toggle('selected',tipo==='ingreso'); document.getElementById('btn-egreso').classList.toggle('selected',tipo==='egreso'); };
window.abrirModal=()=>document.getElementById('modal-overlay').classList.add('show');
window.cerrarModal=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };

window.guardarMovimiento=async function(){
  const desc=document.getElementById('f-desc').value.trim();
  const monto=parseFloat(document.getElementById('f-monto').value);
  if(!desc||!monto||monto<=0){ alert('Completa descripción y monto'); return; }
  await sb.from('contabilidad').insert({
    proveedor_id:userId, tipo:tipoActual,
    descripcion:desc, monto,
    categoria:document.getElementById('f-cat').value,
    fecha:document.getElementById('f-fecha').value,
    notas:document.getElementById('f-notas').value.trim()
  });
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('f-desc').value='';
  document.getElementById('f-monto').value='';
  document.getElementById('f-notas').value='';
  cargarMovimientos();
};
</script>
</body>
</html>
